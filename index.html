<!-- Hard version gate — unregisters stale SW and forces fresh load when code changes -->
<script>
(function(){
  var V = '42';
  if (localStorage.getItem('4s_code_v') !== V) {
    // Preserve user config / session / unsynced work across the cache-busting
    // wipe. Only re-syncable caches (items, orders) are dropped.
    var KEEP = ['4s_api_url','4s_review_url','4s_user','4s_queue','4s_draft'];
    var saved = {};
    for (var ki = 0; ki < KEEP.length; ki++) {
      try { var kv = localStorage.getItem(KEEP[ki]); if (kv !== null) saved[KEEP[ki]] = kv; } catch(e) {}
    }
    try { localStorage.clear(); } catch(e) {}
    for (var kk in saved) { try { localStorage.setItem(kk, saved[kk]); } catch(e) {} }
    localStorage.setItem('4s_code_v', V); // re-set after clear
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
      }).then(function(){
        // Also clear all SW caches
        if (window.caches) {
          caches.keys().then(function(keys){
            return Promise.all(keys.map(function(k){ return caches.delete(k); }));
          }).then(function(){ location.reload(true); });
        } else { location.reload(true); }
      });
    } else {
      location.reload(true);
    }
  }
})();
</script>

<script type="text/babel">
// ═══════════════════════════════════════════════════════════
// DESIGN TOKENS
// ═══════════════════════════════════════════════════════════
const T = {
  paper:'#f4f2ee', paper2:'#ebe8e2', ink:'#0a0f0d', ink2:'#1f2624', ink3:'#404b47', ink4:'#6b7672',
  line:'#d9d5cc', line2:'#c7c2b7', card:'#ffffff',
  green:'#F04040', greenDeep:'#c0302f', greenSoft:'#fff0f0', greenLine:'#f4bbbb',
  ok:'#1f7a4d', okSoft:'#deefe3',
  warn:'#a6610b', warnSoft:'#f7e9cf',
  bad:'#9b2917', badSoft:'#f2d9d2',
  sans:"'Inter',system-ui,sans-serif",
  mono:"'JetBrains Mono',ui-monospace,'SF Mono',monospace",
};

// ═══════════════════════════════════════════════════════════
// BRAND / PDF ASSETS
// Drop these PNG files next to index.html to have them embedded in the
// PDF exactly (otherwise the PDF falls back to drawn graphics / a
// generated QR):
//   interio-logo.png  → the "interio by Godrej" logo (PDF header)
//   fs-logo.png        → the 4S Interiors logo (store address block)
//   review-qr.png      → your Google review QR (the "Scan to review us" box)
// ═══════════════════════════════════════════════════════════
const PDF_ASSETS = {};   // key -> { data:<pngDataURL>, w, h }
// Bump ASSET_VERSION whenever a brand PNG (logo / review QR) is replaced —
// it cache-busts the HTTP + service-worker caches so the new image loads.
const ASSET_VERSION = 'v21';
function _loadImageAsset(key, url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      PDF_ASSETS[key] = { data: c.toDataURL('image/png'), w: img.naturalWidth, h: img.naturalHeight };
    } catch (e) { /* tainted or unsupported — skip, fall back to drawn version */ }
  };
  img.onerror = () => {};
  img.src = url;
}
function preloadPdfAssets() {
  const v = '?a=' + ASSET_VERSION;
  _loadImageAsset('interio', 'interio-logo.png' + v);
  _loadImageAsset('fs',      'fs-logo.png' + v);
  _loadImageAsset('reviewQR','review-qr.png' + v);
}
preloadPdfAssets();

function getReviewUrl() {
  return localStorage.getItem('4s_review_url') ||
    'https://www.google.com/search?q=4S+Interiors+Patia+Bhubaneswar+reviews';
}
// Generate a QR PNG data URL synchronously via qrcodejs (canvas backend)
function makeQrDataUrl(text, size = 160) {
  try {
    const div = document.createElement('div');
    new window.QRCode(div, { text, width: size, height: size, correctLevel: window.QRCode.CorrectLevel.M });
    const cv = div.querySelector('canvas');
    if (cv) return cv.toDataURL('image/png');
    const im = div.querySelector('img');
    if (im && im.src) return im.src;
  } catch (e) {}
  return null;
}

// ═══════════════════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════════════════
function getApiUrl() { return localStorage.getItem('4s_api_url') || ''; }

async function apiGet(action, params = {}, timeoutMs = 15000) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured. Go to Settings.');
  const cb  = 'cb' + Date.now();
  const qs  = new URLSearchParams({ action, callback: cb, ...params }).toString();
  return new Promise((res, rej) => {
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); rej(new Error('Request timed out after ' + Math.round(timeoutMs/1000) + 's.')); }, timeoutMs);
    function cleanup() { clearTimeout(timeout); delete window[cb]; script.remove(); }
    window[cb] = (data) => { cleanup(); res(data); };
    script.onerror = () => { cleanup(); rej(new Error('Network error — check API URL.')); };
    script.src = url + '?' + qs;
    document.head.appendChild(script);
  });
}

async function apiPost(body, tries = 3) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured.');
  let lastErr;
  for (let attempt = 1; attempt <= tries; attempt++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 45000);
      const r = await fetch(url, {
        method: 'POST',
        body: JSON.stringify(body),
        headers: { 'Content-Type': 'text/plain' }, // avoid CORS preflight
        redirect: 'follow',
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (!r.ok) throw new Error('Server error: ' + r.status);
      return await r.json();
    } catch (e) {
      lastErr = e;
      if (attempt < tries) await new Promise(res => setTimeout(res, 800 * attempt)); // backoff, then retry
    }
  }
  throw lastErr || new Error('Network error');
}

// ═══════════════════════════════════════════════════════════
// PRICE LIST — loaded via Apps Script (action=priceList)
// All tabs in OPS sheet are scanned server-side; result is
// cached locally for 6 hours.
// ═══════════════════════════════════════════════════════════
const OPS_SHEET_ID = '12RtOVqlOicoGlF2oLRBv3wB9eeludiz08AFKbhPcNqs';

async function loadPriceListItems(forceFresh = false) {
  const CACHE_KEY = '4s_price_items_v9';
  const CACHE_TS  = '4s_price_items_v9_ts';
  const AGE_MS    = 6 * 60 * 60 * 1000; // 6 hours

  // Serve from the local cache if fresh (skipped on a manual Sync)
  if (!forceFresh) {
    const cached   = localStorage.getItem(CACHE_KEY);
    const cachedAt = localStorage.getItem(CACHE_TS);
    if (cached && cachedAt && Date.now() - Number(cachedAt) < AGE_MS) {
      try { const p = JSON.parse(cached); if (p.length > 0) return p; } catch {}
    }
  }

  const apiUrl = getApiUrl();
  if (!apiUrl) {
    throw new Error('NO_URL: No Apps Script URL saved. Go to Settings → paste your Apps Script URL → Save URL.');
  }

  // On a manual sync, ask the server to bypass its cache too.
  const params = forceFresh ? { fresh: '1' } : {};
  let res;
  try {
    // One automatic retry so a slow cold-start doesn't surface as an error.
    res = await apiGet('priceList', params, 60000);
  } catch (e1) {
    const m1 = e1.message || '';
    if (m1.includes('timed out')) {
      try { res = await apiGet('priceList', params, 60000); }
      catch (e2) { throw new Error('Sync timed out twice — the sheet may be busy. Please tap Sync to retry.'); }
    } else {
      throw new Error('Network error: ' + m1);
    }
  }

  if (!res || !res.ok) {
    const err   = (res && res.error)     || 'Unknown error from Apps Script';
    const code  = (res && res.errorCode) || '';
    if (code === 'SETUP_NEEDED') throw new Error('SETUP_NEEDED: ' + err);
    // Only a genuine "Unknown action" means the deployed script is too old to
    // handle this request — never guess "old version" just from a missing field,
    // as that produced false "update Code.gs" alarms on perfectly good deploys.
    if (err.includes('Unknown action')) throw new Error('REDEPLOY_NEEDED: Apps Script is outdated. Go to Apps Script → paste the latest Code.gs → Save → Deploy → Manage deployments → Edit → New version → Deploy.');
    if (/timed out|timeout/i.test(err)) throw new Error('Sync timed out — the sheet may be busy. Tap Sync to retry.');
    throw new Error('API_ERROR: ' + err);
  }

  // Any response with items is good — we do NOT gate on scriptVersion here.
  if (!Array.isArray(res.items) || res.items.length === 0) {
    const errs = res.tabErrors ? '\n\nTab errors:\n' + res.tabErrors.join('\n') : '';
    throw new Error('SETUP_NEEDED: 0 items were read from the price sheet.' + errs +
      '\n\nCheck that each price tab has a valid header row (ITEM_CODE + DESCRIPTION, or LN CODE).');
  }

  localStorage.setItem(CACHE_KEY, JSON.stringify(res.items));
  localStorage.setItem(CACHE_TS,  String(Date.now()));
  return res.items;
}

// Search — strict tiered matching. Best tier wins exclusively; no mixing tiers.
// Tiers (descending priority):
//   S4 (100) — full typed query is a direct substring of name or code  → show all S4 only
//   S3  (90) — every meaningful word (≥2 chars) found in name or code  → show all S3 only
//   S2  (50) — majority of words (≥3 chars) found (>50%)               → show all S2 only
//   S1  (25) — any single long word (≥4 chars) found                   → show top 20
//   S0  (20) — item code starts with the query prefix (≥4 chars)       → show top 20
//
// Single-char tokens ("M" in "osiris M") are stripped before multi-word scoring
// so they don't dilute results. The full raw query still runs S4 to catch codes.
function fuzzySearch(allItems, query) {
  if (!query.trim()) return { results: allItems, mode: 'all' };
  const q = query.toLowerCase().trim();

  // Meaningful words only (≥2 chars) used for multi-word scoring
  const words = q.split(/\s+/).filter(w => w.length >= 2);

  function score(it) {
    // Search string built directly from [cat,item,name] — never from searchName
    // which may carry extra colour/finish codes causing false-positive matches.
    // Use the pre-lowercased fields attached at load time when present (fast path).
    const nm = (it._s != null) ? it._s : ([it.cat, it.item, it.name].filter(Boolean).join(' ')).toLowerCase();
    const cd = (it._c != null) ? it._c : (it.code || '').toLowerCase();

    // S4: entire typed query is a substring of name or code
    if (nm.includes(q) || cd.includes(q)) return 100;

    // No meaningful words after stripping single chars
    if (words.length === 0) return 0;

    // S3: every meaningful word (≥2 chars) found somewhere in name or code
    if (words.length > 1 && words.every(w => nm.includes(w) || cd.includes(w))) return 90;

    // S2: majority (>50%) of words with ≥3 chars found — avoids false positives
    const longWords = words.filter(w => w.length >= 3);
    if (longWords.length > 0) {
      const hits = longWords.filter(w => nm.includes(w) || cd.includes(w));
      if (hits.length > 0 && hits.length / longWords.length > 0.5) return 50;
    }

    // S1: at least one word with ≥4 chars found
    if (words.some(w => w.length >= 4 && (nm.includes(w) || cd.includes(w)))) return 25;

    // S0: item code starts with the query prefix (min 4 chars typed)
    if (q.length >= 4 && cd.startsWith(q.slice(0, Math.min(q.length, 8)))) return 20;

    return 0;
  }

  // Score everything, drop zeros, sort best-first
  const scored = allItems
    .map(it => ({ it, s: score(it) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s);

  if (!scored.length) return { results: [], mode: 'none' };

  const best = scored[0].s;

  // S4/S3 → exact match: show ONLY those items, no noise from lower tiers
  if (best >= 90) return { results: scored.filter(x => x.s >= 90).map(x => x.it), mode: 'exact' };

  // S2 → majority-word match
  if (best >= 50) return { results: scored.filter(x => x.s >= 50).map(x => x.it), mode: 'near' };

  // S1/S0 → loose single-word match, cap at 20
  return { results: scored.slice(0, 20).map(x => x.it), mode: 'far' };
}

// ═══════════════════════════════════════════════════════════
// ORDER TOTALS — single source of truth used by the form, the
// on-screen preview, the PDF and the save call so they never drift.
//   • Each item.total is already net of that item's own discount.
//   • orderDiscount is an extra order-wide discount, entered as a %.
//   • GST = CGST 9% + SGST 9% on the taxable (after-discount) value.
// ═══════════════════════════════════════════════════════════
// ── Field-format validators ───────────────────────────────────────────────
// Email: a basic but strict-enough shape (name@domain.tld).
function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v || '').trim()); }
// Indian mobile: 10 digits starting 6-9, optionally with +91 / 0 prefix.
function isValidPhone(v) {
  const d = String(v || '').replace(/[\s\-()]/g, '').replace(/^(\+?91|0)/, '');
  return /^[6-9]\d{9}$/.test(d);
}

// The app stores order dates as "dd.mm.yy" (matching the CRM sheet), but the
// native date picker works in ISO "yyyy-mm-dd". These convert between the two so
// a manually-set Booking Date round-trips through both.
function dmyToISO(dmy) {
  const p = String(dmy || '').trim().split('.');
  if (p.length !== 3) return '';
  let [d, m, y] = p;
  if (!d || !m || !y) return '';
  if (y.length === 2) y = '20' + y;
  return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}
function isoToDMY(iso) {
  const p = String(iso || '').trim().split('-');
  if (p.length !== 3) return '';
  const [y, m, d] = p;
  if (!y || !m || !d) return '';
  return String(Number(d)).padStart(2, '0') + '.' + String(Number(m)).padStart(2, '0') + '.' + y.slice(2);
}

// Effective per-unit selling price for one line (matches the order form's
// on-screen "Disc. Price"): an explicit unitPrice wins, else MRP after item disc.
function itemUnitPrice(it) {
  const mrpVal  = Number(it.mrp) || Number(it.cpl) || 0;
  const discPct = parseFloat(it.disc || '0') / 100;
  return (it.unitPrice > 0) ? it.unitPrice : (mrpVal > 0 ? Math.round(mrpVal * (1 - discPct)) : 0);
}
// ── GST-inclusive pricing (MRP) ────────────────────────────────
// Every price shown in the app is the MRP = list price (CPL) + 18% GST, baked
// in once at the point of display. The GST is ALREADY inside the price, so it is
// never added again on top: the order total is simply the sum of the MRP lines,
// and CGST/SGST on the bill are BACK-CALCULATED out of that inclusive total (for
// a valid tax breakup) — never added to it. Editing an item's price does not
// re-apply GST; the entered value is treated as the final MRP.
const GST_RATE = 0.18;
// Per-unit MRP = the (possibly edited / discounted) list price with 18% GST in it.
function gstInclUnit(it) { return Math.round(itemUnitPrice(it) * (1 + GST_RATE)); }
function gstInclLine(it) { return gstInclUnit(it) * (Number(it.qty) || 0); }

function orderTotals(o) {
  const items         = o.items || [];
  // Each line is the GST-inclusive MRP × qty. The subtotal already includes GST.
  const itemsSubtotal = items.reduce((s, i) => s + gstInclLine(i), 0);
  const orderDiscPct  = Math.max(0, parseFloat(o.orderDiscount) || 0) / 100;
  const orderDiscAmt  = rnd(itemsSubtotal * orderDiscPct);
  // Total = MRP subtotal less any order-wide discount. GST is NOT added on top —
  // it is already part of every MRP line.
  const total         = itemsSubtotal - orderDiscAmt;
  // Carve the 18% GST already contained in the total back out, so the bill can
  // still show a CGST/SGST breakup without ever inflating the amount payable.
  const taxable       = Math.round(total / (1 + GST_RATE));
  const gstTotal      = total - taxable;
  const cgst          = Math.round(gstTotal / 2);
  const sgst          = gstTotal - cgst;
  // MRPs are GST-inclusive and every line is rounded to the whole rupee, so a
  // "paid in full" amount can land a rupee or two under the rounded total. Treat
  // a residual of up to ₹2 as fully paid so the customer who paid the whole
  // amount never sees the received amount short by a rupee or a phantom balance.
  const earnestRaw    = Number(o.earnest) || 0;
  const balanceRaw    = total - earnestRaw;
  const paidInFull    = earnestRaw > 0 && balanceRaw > 0 && balanceRaw <= 2;
  const earnest       = paidInFull ? total : earnestRaw;
  const balance       = total - earnest;
  return { itemsSubtotal, orderDiscPct, orderDiscAmt, taxable, cgst, sgst, total, earnest, balance, manual: !!o.manualOrder };
}

// ─── ROLE-BASED ACCESS ──────────────────────────────────────
// Sales = base access. Manager / Admin unlock extra, sensitive
// detail (cost price, margins, …). Gate any privileged UI behind
// hasManagerAccess(user); everything else stays visible to all.
const PRIVILEGED_ROLES = ['manager','admin'];
function normRole(role) {
  const r = String(role||'sales').toLowerCase().trim();
  return PRIVILEGED_ROLES.indexOf(r) >= 0 ? r : (r === 'sales' ? 'sales' : r || 'sales');
}
function hasManagerAccess(user) {
  return PRIVILEGED_ROLES.indexOf(normRole(user && user.role)) >= 0;
}

// ═══════════════════════════════════════════════════════════
// ICONS (SVG)
// ═══════════════════════════════════════════════════════════
const Icon = {
  home: (c='currentColor',s=20) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1z" stroke={c} strokeWidth="2" strokeLinejoin="round"/></svg>,
  search: (c='currentColor',s=20) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke={c} strokeWidth="2"/><path d="M20 20l-4-4" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg>,
  plus: (c='currentColor',s=20) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={c} strokeWidth="2.4" strokeLinecap="round"/></svg>,

// A numeric text box that stays fully editable: it keeps its own draft string
// so the field can be cleared completely (and typed fresh) instead of snapping
// back to "0". The parsed value is pushed to the parent on every keystroke; the
// box re-syncs from the parent's value only while it is NOT being edited (so a
// change driven by a sibling field — e.g. discount ↔ price — updates it).
function NumBox({value, onInput, style, placeholder}) {
  const fmt = v => (v === null || v === undefined || v === '') ? '' : String(v);
  const [txt, setTxt] = React.useState(() => fmt(value));
  const editing = React.useRef(false);
  React.useEffect(() => { if (!editing.current) setTxt(fmt(value)); }, [value]);
  return (
    <input
      value={txt}
      inputMode="decimal"
      placeholder={placeholder}
      onFocus={() => { editing.current = true; }}
      onBlur={() => { editing.current = false; setTxt(fmt(value)); }}
      onChange={e => {
        const t = e.target.value;
        if (!/^\d*\.?\d*$/.test(t)) return;   // digits + at most one dot; empty allowed
        setTxt(t);
        onInput(t);
      }}
      style={style}
    />
  );
}

// ── Measurements: cm ↔ feet/inches ──────────────────────────────
// Everything is STORED in centimetres (so the sheet & PDF stay in cm). The
// ft/in inputs are just an entry convenience — 1 in = 2.54 cm, 1 ft = 30.48 cm.
function cmToFtIn(cmVal){
  const s = String(cmVal==null?'':cmVal).trim();
  if(s==='') return {ft:'',inch:''};
  const cm = parseFloat(s); if(!isFinite(cm)) return {ft:'',inch:''};
  const totalIn = cm/2.54;
  const ft = Math.floor(totalIn/12);
  const inch = Math.round((totalIn - ft*12)*10)/10;   // 1-decimal inch
  return {ft:String(ft), inch:String(inch)};
}
function ftInToCm(ft,inch){
  const fS=String(ft==null?'':ft).trim(), iS=String(inch==null?'':inch).trim();
  if(fS==='' && iS==='') return '';                   // both blank → clear the field
  const cm = (parseFloat(fS)||0)*30.48 + (parseFloat(iS)||0)*2.54;
  return String(Math.round(cm));                      // stored as whole cm
}
// A single measurement input. In 'cm' mode it's the normal cm box; in 'ft' mode
// it shows feet + inches and writes the converted whole-cm value back via onChange.
function MeasureField({label,value,onChange,unit,required,hint,placeholder}){
  if(unit!=='ft'){
    return <Field label={label+' (cm)'} value={value} onChange={onChange} mono required={required} type="tel" hint={hint} placeholder={placeholder}/>;
  }
  const fi = cmToFtIn(value);
  const hasVal = !(value===''||value==null||String(value).trim()==='');
  const cmShown = hasVal ? (Math.round(parseFloat(value)||0).toLocaleString('en-IN')+' cm') : '';
  const box = {width:60,border:`1px solid ${T.line}`,borderRadius:4,padding:'4px 8px',fontFamily:T.mono,fontSize:14,fontWeight:600,textAlign:'right',color:T.ink};
  return (
    <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
      <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>{label} (ft / in){required&&<span style={{color:T.bad,marginLeft:3}}>*</span>}</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <NumBox value={fi.ft}   placeholder="0" onInput={t=>onChange(ftInToCm(t,fi.inch))} style={box}/>
        <span style={{fontSize:12,color:T.ink4,fontWeight:600}}>ft</span>
        <NumBox value={fi.inch} placeholder="0" onInput={t=>onChange(ftInToCm(fi.ft,t))} style={box}/>
        <span style={{fontSize:12,color:T.ink4,fontWeight:600}}>in</span>
        {cmShown&&<span style={{marginLeft:'auto',fontSize:12,color:T.ink3,fontFamily:T.mono,fontWeight:700}}>= {cmShown}</span>}
      </div>
      {hint&&<div style={{fontSize:11,color:T.ink4,marginTop:4}}>{hint}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PDF GENERATOR  — matches physical Order Confirmation Form
// ═══════════════════════════════════════════════════════════
// Collapse modular-product items (Kalista / Kreation X2 / X3 / Upmods) into a
// single line per family — used for the CUSTOMER copy of the PDF only. The
// summed line total is preserved, so order totals never change.
function customerCopyItems(items) {
  const out = [], groupIndex = {};
  (items || []).forEach(it => {
    const fam = modularFamilyOf(it);
    if (!fam) { out.push(it); return; }
    if (groupIndex[fam.key] === undefined) {
      groupIndex[fam.key] = out.length;
      out.push({ code:'', name:fam.label, qty:0, mrp:0, disc:'', unitPrice:0, total:0, _group:true, _grossMrp:0, _children:[] });
    }
    const g = out[groupIndex[fam.key]];
    const qty = Number(it.qty) || 0;
    g.qty       += qty;
    g.total     += Number(it.total) || 0;
    g._grossMrp += (Number(it.mrp) || Number(it.cpl) || 0) * qty;   // gross (pre-discount) price
    // Keep each underlying item (code + name + qty) so the customer copy can
    // still list them under the family heading, even though the family is
    // priced as a single line.
    g._children.push({ code: it.code || '', name: it.name || it.item || '', qty: qty });
  });
  // For each collapsed family, show on one line: the total price in the MRP
  // column, the overall (average) discount % in the Disc column, and the net
  // total in the Disc. Price + Total columns.
  out.forEach(g => {
    if (!g._group) return;
    const gross   = g._grossMrp || 0;
    const discPct = gross > 0 ? rnd((gross - g.total) / gross * 100) : 0;
    g.mrp       = gross;
    g.disc      = discPct > 0 ? String(discPct) : '';
    g.unitPrice = g.total;   // Disc. Price column → net total for the family
  });
  return out;
}

// copyType: 'sales' (default, fully itemised) or 'customer' (modular families
// collapsed to one line each).
function generatePDF(order, copyType) {
  const isCustomer = copyType === 'customer';
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF({ unit:'mm', format:'a4' });
  const pw   = 210;
  const ph   = 297;
  const ml   = 10;
  const mr   = 10;
  const cw   = pw - ml - mr;          // 190 mm usable width

  // Single source of truth for money (items subtotal → order discount → GST)
  const T2       = orderTotals(order);
  const subtotal = T2.itemsSubtotal;
  const cgst     = T2.cgst;
  const sgst     = T2.sgst;
  const totalAmt = T2.total;
  const earnest  = T2.earnest;
  const balance  = T2.balance;
  const orderDiscPct = T2.orderDiscPct;
  const orderDiscAmt = T2.orderDiscAmt;
  const taxable      = T2.taxable;

  // Order number: <Sl No>/<Receipt No> in red
  const slNo     = order.slNo||order.internalNo||'—';
  const rcptNo   = order.orderFormReceiptNo || order.internalNo || '—';
  const orderRef = slNo + ' / ' + rcptNo;
  const oDate    = order.date||new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'});

  const DRED=[180,0,0], NAVY=[20,20,80], INK=[20,20,20], BLK=[0,0,0], GR=[120,120,120], LGR=[200,200,200];

  const lw0 = ()          => { doc.setLineWidth(0.25); doc.setDrawColor(...LGR); };
  const brd = (x,y,w,h)  => { lw0(); doc.rect(x,y,w,h,'S'); };
  const hln = (x,y,x2)   => { lw0(); doc.line(x,y,x2,y); };
  const vln = (x,y,y2)   => { lw0(); doc.line(x,y,x,y2); };
  const lbl = (x,y,t,sz=6)                 => { doc.setFont('helvetica','normal'); doc.setFontSize(sz); doc.setTextColor(...GR);  doc.text(t,x,y); };
  const val = (x,y,t,sz=8,bold=false,clr=INK) => { doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr); doc.text(String(t||''),x,y); };
  const rval= (x,y,t,sz=8,bold=false,clr=INK) => { doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr); doc.text(String(t||''),x,y,{align:'right'}); };
  // fit1: clamps text to one line within width w
  const fit1= (t,w,sz=8) => { doc.setFontSize(sz); return (doc.splitTextToSize(String(t||''),w)[0])||''; };
  // drawFull: renders the ENTIRE string centred at (cx,cy), shrinking the font
  // until it fits width w so nothing is ever truncated (item codes must always
  // appear in full). Only if the string is still too wide at the minimum size
  // does it wrap onto multiple lines, centred vertically about cy.
  const drawFull = (t, cx, cy, w, sz=7, min=4) => {
    t = String(t||''); if (!t) return;
    doc.setFont('helvetica','normal'); doc.setFontSize(sz);
    while (sz > min && doc.getTextWidth(t) > w) { sz -= 0.25; doc.setFontSize(sz); }
    if (doc.getTextWidth(t) <= w) { doc.text(t, cx, cy, {align:'center'}); return; }
    const lines = doc.splitTextToSize(t, w);
    const lh = sz * 0.4;
    const sy = cy - (lines.length - 1) * lh / 2;
    lines.forEach((ln,i) => doc.text(ln, cx, sy + i*lh, {align:'center'}));
  };
  // Use 'Rs.' instead of Rs symbol — jsPDF Helvetica is Latin-1 only,
  // the Unicode rupee glyph (U+20B9) produces wrong metrics and overflows.
  const inr = (n) => 'Rs.' + n.toLocaleString('en-IN');

  // Items table columns (MRP → per-item Disc → discounted price → total)
  const tC = {
    code:{ x:ml,          w:22, t:'Item Code' },
    qty: { x:ml+22,       w:10, t:'Qty' },
    desc:{ x:ml+32,       w:cw-32-22-14-26-24, t:'Product Description' },
    mrp: { x:ml+cw-86,    w:22, t:'MRP' },
    disc:{ x:ml+cw-64,    w:14, t:'Disc' },
    cpl: { x:ml+cw-50,    w:26, t:'Disc. Price' },
    tot: { x:ml+cw-24,    w:24, t:'Total (Rs.)' },
  };
  const thH = 8;    // items header height
  const rH  = 11;   // items row height

  // Footer sits at a fixed position on EVERY page; items never cross into it.
  const ftH     = 26;
  const footerY = ph - ftH - 4;
  const itemAreaBottom = footerY - 2;

  // ── HEADER BAND (drawn at top of every page) ──────────────
  function drawHeaderBand(y) {
    const hH = 20, leftW = 105, rightW = cw - leftW;
    doc.setFillColor(...DRED);
    doc.rect(ml, y, leftW, hH, 'F');
    doc.setFont('times','bolditalic'); doc.setFontSize(15); doc.setTextColor(255,255,255);
    doc.text('Order Confirmation Form', ml + leftW/2, y + hH/2 + 2, {align:'center'});
    doc.setFillColor(255,255,255);
    doc.rect(ml+leftW, y, rightW, hH, 'F');
    // Use the exact interio logo image if the PNG was supplied; else draw text.
    // Larger logo: fill almost the whole right cell (minimal padding).
    const A = PDF_ASSETS.interio;
    if (A && A.data) {
      const boxW = rightW-3, boxH = hH-2, ar = A.w/A.h;
      let w = boxW, h = w/ar;
      if (h > boxH) { h = boxH; w = h*ar; }
      try { doc.addImage(A.data,'PNG', ml+leftW+(rightW-w)/2, y+(hH-h)/2, w, h, 'interio', 'FAST'); } catch(e) { _interioText(y, leftW); }
    } else {
      _interioText(y, leftW);
    }
    lw0(); doc.rect(ml, y, cw, hH, 'S');
    vln(ml+leftW, y, y+hH);
    return y + hH;
  }
  function _interioText(y, leftW) {
    const lx = ml + leftW + 5;
    // Larger + bolder interio wordmark
    doc.setFont('times','bolditalic'); doc.setFontSize(23); doc.setTextColor(...DRED);
    doc.text('interio', lx, y + 11);
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...NAVY);
    doc.text('by Godrej', lx, y + 17.5);
    doc.setFontSize(6); doc.text('®', lx + 32, y + 15);
  }

  // ── TOP BLOCK (page 1 only): store / customer / instructions ─
  function drawTopBlock(y) {
    // Store + WON + Order row (taller to fit the 4S logo + full address)
    const r1H = 22, c1w = 74, c2w = 56, c3w = cw - c1w - c2w;
    brd(ml,y,cw,r1H); vln(ml+c1w, y, y+r1H); vln(ml+c1w+c2w, y, y+r1H);
    lbl(ml+1, y+3.5, 'Store Address :');
    // 4S Interiors logo (image if supplied)
    let tx = ml+1;
    const F = PDF_ASSETS.fs;
    if (F && F.data) {
      const s = 13, ar = F.w/F.h; let w = s*ar, h = s;
      if (w > 15) { w = 15; h = w/ar; }
      try { doc.addImage(F.data,'PNG', ml+1, y+5.5, w, h, 'fslogo', 'MEDIUM'); tx = ml+1+w+2; } catch(e) {}
    }
    val(tx, y+8, fit1('4S Interiors', c1w-(tx-ml)-2, 7.5), 7.5, true);
    doc.setFont('helvetica','normal'); doc.setFontSize(5.4); doc.setTextColor(...INK);
    doc.splitTextToSize('Plot No 193, beside Croma, Gayatri Vihar, Kanan Vihar, Patia, Bhubaneswar, Odisha 751024', c1w-(tx-ml)-2)
       .slice(0,3).forEach((ln,i)=>doc.text(ln, tx, y+11.5+i*2.8));
    val(tx, y+r1H-2, 'Ph: 08291957842', 6, true);
    lbl(ml+c1w+1, y+3.5, 'WON No.');
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...DRED);
    doc.text(fit1(order.won||'Pending', c2w-3, 10), ml+c1w+1, y+11);
    lbl(ml+c1w+1, y+16.5, 'Date :');
    val(ml+c1w+11, y+16.5, fit1(oDate, c2w-14, 7.5), 7.5);
    const ox = ml+c1w+c2w;
    lbl(ox+1, y+3.5, 'Order No. (Sl / Receipt)');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...DRED);
    doc.text(fit1(orderRef, c3w-3, 9), ox+1, y+12);
    y += r1H;

    // Billing / Delivery header
    const bhH = 6;
    [[ml,cw/2,'Billing Address'],[ml+cw/2,cw/2,'Delivery Address']].forEach(([x,w,txt]) => {
      doc.setFillColor(245,245,245); doc.rect(x,y,w,bhH,'F'); brd(x,y,w,bhH);
      doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
      doc.text(txt, x+w/2, y+4.3, {align:'center'});
    });
    y += bhH;

    // Customer details
    const cdH = 46, hw = cw/2;
    brd(ml,y,hw,cdH); brd(ml+hw,y,hw,cdH);
    hln(ml,y+6,ml+hw);
    lbl(ml+1,y+3.5,'P.O. Ref. No. :');
    val(ml+25,y+3.5, fit1(order.poRef||'',hw-27), 7.5);
    hln(ml,y+17,ml+hw);
    lbl(ml+1,y+10,'Customer Name :');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
    doc.text(fit1(order.customer||'',hw-3,9), ml+1, y+16);
    hln(ml,y+33,ml+hw);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.splitTextToSize(order.billing||order.delivery||'',hw-3).slice(0,3).forEach((ln,i)=>doc.text(ln,ml+1,y+21+i*4));
    hln(ml,y+38,ml+hw);
    lbl(ml+1,y+36,'Ph. :'); val(ml+9,y+36, fit1(order.phone||'',hw-11), 7.5);
    hln(ml,y+43,ml+hw);
    lbl(ml+1,y+41,'M. :');  val(ml+9,y+41, fit1(order.alt||'',hw-11), 7.5);
    const dx = ml+hw;
    lbl(dx+1,y+3.5,'Delivery Address :');
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    const liftTypesTxt = Array.isArray(order.liftTypes) ? order.liftTypes.join(', ') : '';
    const delvText = [order.delivery||order.billing||'',
      order.floor    ? 'Floor: '    + order.floor    : '',
      order.landmark ? 'Landmark: ' + order.landmark : '',
      order.liftAvailable ? 'Lift: ' + order.liftAvailable + (liftTypesTxt ? ' (' + liftTypesTxt + ')' : '') : '']
      .filter(Boolean).join('\n');
    doc.splitTextToSize(delvText,hw-3).slice(0,6).forEach((ln,i)=>doc.text(ln,dx+1,y+8+i*4));
    hln(dx,y+27,dx+hw);
    lbl(dx+1,y+30.5,'E-Mail :'); val(dx+14,y+30.5, fit1(order.email||'',hw-16), 7.5);
    hln(dx,y+33,dx+hw);
    // Contact person (for orders bought on behalf of someone else)
    lbl(dx+1,y+36,'Contact :'); val(dx+15,y+36, fit1(order.contactPersonName||'',hw-17), 7.5);
    hln(dx,y+39,dx+hw);
    lbl(dx+1,y+42,'Ph. :'); val(dx+9,y+42, fit1(order.contactNumber||'',hw-11), 7.5);
    y += cdH;

    // Instruction + discount
    const siH=28, lw5=cw*0.55, rw5=cw*0.45, rx5=ml+lw5;
    brd(ml,y,lw5,siH); brd(rx5,y,rw5,siH);
    doc.setFillColor(248,248,248); doc.rect(ml,y,lw5,7,'F'); doc.rect(rx5,y,rw5,7,'F');
    hln(ml,y+7,ml+lw5); hln(rx5,y+7,rx5+rw5);
    lbl(ml+2,y+5,'Specific Instruction',7);
    lbl(rx5+2,y+5,'HFP / HFC / HFS / RFD',7);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.splitTextToSize(order.installNote||'',lw5-4).slice(0,4).forEach((ln,i)=>doc.text(ln,ml+2,y+11+i*4));
    vln(rx5+rw5*0.5,y+7,y+siH);
    const r5=(l,v,ry)=>{ hln(rx5,y+ry,rx5+rw5); lbl(rx5+2,y+ry-5.5,l); val(rx5+rw5*0.5+2,y+ry-1.5,fit1(v,rw5*0.48,8.5),8.5,true); };
    r5('Planned Dly Schedule', order.plannedDly||'',   16);
    r5('Reference no.',        order.poRef||'',        siH);
    y += siH;

    // Salesman row
    const scH=7;
    brd(ml,y,cw,scH); vln(ml+28,y,y+scH);
    lbl(ml+2,y+5,'Salesman Code',7);
    val(ml+30,y+5, fit1(order.salesExec||'',cw-32,7.5), 7.5);
    y += scH;

    // Site measurements row — printed on BOTH the customer and sales copies.
    // Sofa and modular-wardrobe (Kalista / Kreation X2 / X3) dims are mandatory
    // when such an item is ordered; plus any other site-access measurements.
    const measParts = [];   // all values in cm
    if (order.sofaWidth||order.sofaHeight||order.sofaDepth)
      measParts.push('Sofa (W x H x D, cm): ' + [order.sofaWidth,order.sofaHeight,order.sofaDepth].map(v=>v||'-').join(' x '));
    // Modular-furniture blocks (one per modular wardrobe): wardrobe dims.
    const pdfWardrobes = (Array.isArray(order.wardrobes) && order.wardrobes.length)
      ? order.wardrobes
      : ((order.wardrobeLength||order.wardrobeWidth||order.wardrobeHeight)
          ? [{name:'',length:order.wardrobeLength,width:order.wardrobeWidth,height:order.wardrobeHeight}]
          : []);
    pdfWardrobes.forEach((w,wi)=>{
      const nm = w.name ? ' ' + w.name : '';
      if (w.length||w.width||w.height)
        measParts.push('Furniture ' + (wi+1) + nm + ' (L x W x H, cm): ' + [w.length,w.width,w.height].map(v=>v||'-').join(' x '));
    });
    // Room blocks (one per room).
    (Array.isArray(order.rooms)?order.rooms:[]).forEach((r,ri)=>{
      if (r.width||r.height||r.depth||r.name)
        measParts.push((r.name||('Room ' + (ri+1))) + ' (W x H x D, cm): ' + [r.width,r.height,r.depth].map(v=>v||'-').join(' x '));
    });
    // Staircase — sofa-only, no-lift site measurement: staircase width + landing area L x W x D.
    if (order.staircaseWidth||order.landingLength||order.landingWidth||order.landingDepth)
      measParts.push('Staircase W (cm): ' + (order.staircaseWidth||'-') + ' | Landing Area (L x W x D, cm): ' + [order.landingLength,order.landingWidth,order.landingDepth].map(v=>v||'-').join(' x '));
    if (order.entryDoorWidth||order.entryDoorHeight)
      measParts.push('Entry Door (W x H, cm): ' + [order.entryDoorWidth,order.entryDoorHeight].map(v=>v||'-').join(' x '));
    if (measParts.length) {
      doc.setFontSize(7);
      const mLines = doc.splitTextToSize(measParts.join('     |     '), cw-32);
      const mH = 4 + mLines.length*3.4;
      brd(ml,y,cw,mH); vln(ml+28,y,y+mH);
      lbl(ml+2,y+5,'Site Meas.',7);
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...INK);
      mLines.forEach((ln,i)=>doc.text(ln, ml+30, y+4.2+i*3.4));
      y += mH;
    }
    return y;
  }

  // ── CONTINUATION BANNER (top of pages 2+) ─────────────────
  function drawContinuationBanner(y, pageNo) {
    const bh = 7;
    doc.setFillColor(248,248,248); doc.rect(ml,y,cw,bh,'F'); brd(ml,y,cw,bh);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.text('Order No. ' + orderRef + '  —  continued', ml+2, y+4.7);
    doc.setFont('helvetica','normal'); doc.setTextColor(...GR);
    doc.text('Page ' + pageNo, ml+cw-2, y+4.7, {align:'right'});
    return y + bh;
  }

  // ── ITEMS TABLE HEADER ────────────────────────────────────
  function drawItemsHeader(y) {
    doc.setFillColor(240,240,240); doc.rect(ml,y,cw,thH,'F');
    brd(ml,y,cw,thH);
    Object.values(tC).forEach(c=>vln(c.x+c.w,y,y+thH));
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
    Object.values(tC).forEach(c=>doc.text(c.t, c.x+c.w/2, y+5.5, {align:'center'}));
    return y + thH;
  }

  // Row height. A collapsed modular family lists its child items under the
  // family heading, so it grows with the number of children (customer copy).
  const childLineH = 3.5;
  function rowHeight(it) {
    if (it && it._group && it._children && it._children.length)
      return Math.max(rH, 6.2 + it._children.length * childLineH + 1.5);
    return rH;
  }

  // ── ONE ITEM ROW ──────────────────────────────────────────
  function drawItemRow(y, it, idx) {
    const h = rowHeight(it);
    if(idx%2===1){ doc.setFillColor(252,252,252); doc.rect(ml,y,cw,h,'F'); }
    brd(ml,y,cw,h);
    Object.values(tC).forEach(c=>vln(c.x+c.w,y,y+h));
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...INK);
    // Full item code, never truncated — shrinks/wraps to fit the column.
    drawFull(it.code||'', tC.code.x+tC.code.w/2, y+7, tC.code.w-2, 7);
    doc.setFontSize(7);
    doc.text(String(it.qty), tC.qty.x+tC.qty.w/2, y+7, {align:'center'});
    if (it._group && it._children && it._children.length) {
      // Family heading, then every underlying item + its code listed below it.
      doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
      doc.text(fit1(it.name||'', tC.desc.w-2, 7.5), tC.desc.x+1.5, y+4.5);
      let ly = y + 8.2;
      doc.setFont('helvetica','normal'); doc.setFontSize(6.3); doc.setTextColor(...GR);
      it._children.forEach(ch => {
        const parts = [];
        if (ch.code) parts.push(ch.code);
        if (ch.name) parts.push(ch.name);
        let line = parts.join(' - ');
        if (ch.qty > 1) line += '  (' + ch.qty + ' nos)';
        doc.text(fit1(line, tC.desc.w-3, 6.3), tC.desc.x+2.5, ly);
        ly += childLineH;
      });
    } else {
      doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
      const nm = doc.splitTextToSize(it.name||'', tC.desc.w-2);
      doc.text(nm[0]||'', tC.desc.x+1.5, y+4.5);
      // Sales copy: list every scheme applied to this item (Ageing / Sweetner /
      // Other), with the scheme code spelled out when "Other" is selected.
      let schemeLine = '';
      if (!isCustomer) {
        const sch = [];
        if (it.ageing)   sch.push('Ageing');
        if (it.sweetner) sch.push('Sweetner');
        if (it.other)    sch.push(it.schemeCode ? ('Other: ' + it.schemeCode) : 'Other');
        if (sch.length)  schemeLine = 'Scheme: ' + sch.join(', ');
      }
      if (schemeLine) {
        doc.setFont('helvetica','bold'); doc.setFontSize(6.2); doc.setTextColor(30,90,160);
        doc.text(fit1(schemeLine, tC.desc.w-2, 6.2), tC.desc.x+1.5, y+9);
      } else if (nm[1]) {
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR); doc.text(nm[1], tC.desc.x+1.5, y+9);
      }
    }
    // MRP — the (possibly edited) list price per unit, shown WITH 18% GST in it.
    const incl = (n) => Math.round((Number(n) || 0) * (1 + GST_RATE));
    const mrpV = it.mrp||it.cpl||0;                       // pre-GST base (per unit, or line-gross for a collapsed family)
    const dPct = parseFloat(it.disc)||0;
    // Disc. Price — MRP after the per-item discount
    const cplV = it.unitPrice>0?it.unitPrice:(mrpV>0?mrpV*(1-dPct/100):0);
    const mrpShown = incl(mrpV);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...INK);
    rval(tC.mrp.x+tC.mrp.w-1.5, y+7, mrpShown>0?mrpShown.toLocaleString('en-IN'):'—');
    // Disc — per-item discount %
    doc.setFontSize(7.5); doc.setTextColor(...(dPct>0?DRED:GR));
    doc.text(dPct>0?dPct+'%':'—', tC.disc.x+tC.disc.w/2, y+7, {align:'center'});
    // Every price column is GST-inclusive (18% baked into each MRP). GST is never
    // added on top; it is carved back out in the totals block only for the breakup.
    const cplShown  = incl(cplV);
    const totShown  = it._group ? incl(it.total) : gstInclLine(it);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...INK);
    rval(tC.cpl.x+tC.cpl.w-1.5, y+7, cplShown>0?cplShown.toLocaleString('en-IN'):'—');
    doc.setFont('helvetica','bold'); doc.setTextColor(...INK);
    rval(tC.tot.x+tC.tot.w-1.5, y+7, totShown.toLocaleString('en-IN'));
    return y + h;
  }

  // ── TOTALS + RECEIPT + SIGNATURE (final page only) ────────
  function drawTotalsBlock(y) {
    // Every MRP already includes 18% GST, so the subtotal is GST-inclusive. The
    // CGST/SGST rows are carved OUT of that inclusive amount (taxable + CGST +
    // SGST = Total) — the GST is shown for the breakup but never added on top.
    const fRows = [['Sub Total (incl. GST)', inr(subtotal), false]];
    if (orderDiscAmt > 0) {
      fRows.push(['Order Disc. @' + (orderDiscPct*100).toLocaleString('en-IN') + '%', '- ' + inr(orderDiscAmt), false]);
    }
    fRows.push(['Taxable Value',  inr(taxable), false]);
    fRows.push(['CGST @ 9%',   inr(cgst),     false]);
    fRows.push(['SGST @ 9%',   inr(sgst),     false]);
    fRows.push(['Total Amt. (incl. GST)',  inr(totalAmt), true ]);
    fRows.push(['Earnest Amt.',inr(earnest),  false]);
    fRows.push(['Balance Amt.',inr(balance),  true ]);

    const tsH = Math.max(5.7*fRows.length, 44), tsLW = cw*0.55, tsRW = cw*0.45, tsRX = ml+tsLW;
    brd(ml,y,tsLW,tsH); brd(tsRX,y,tsRW,tsH);
    lbl(ml+2,y+5,'(Invoice / billing details to be filled after order processing)',6.5);
    if (order.gstNumber) {
      lbl(ml+2, y+11, 'Customer GSTIN :', 7);
      val(ml+2, y+15.5, fit1(order.gstNumber, tsLW-4, 8.5), 8.5, true);
    }
    // "Scan to review us" QR — customer copy only (never on the sales copy).
    // Uses the supplied review-qr.png if present, else a QR from the saved URL.
    const qrData = isCustomer
      ? ((PDF_ASSETS.reviewQR && PDF_ASSETS.reviewQR.data) || makeQrDataUrl(getReviewUrl(), 200))
      : null;
    if (qrData) {
      const qs = 22, qx = ml+2, qy = y+tsH-qs-2;
      try {
        doc.addImage(qrData,'PNG', qx, qy, qs, qs, 'reviewqr', 'MEDIUM');
        doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...DRED);
        doc.text('Scan to review us', qx+qs+3, qy+qs/2-1);
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...GR);
        doc.text('on Google — we value your feedback!', qx+qs+3, qy+qs/2+3.5);
      } catch(e) {}
    }
    // Sales copy: the review-QR area is free, so list every scheme applied here
    // (with the scheme code spelled out when "Other" is selected).
    if (!isCustomer) {
      const schemeRows = [];
      (order.items||[]).forEach(it => {
        const s = [];
        if (it.ageing)   s.push('Ageing');
        if (it.sweetner) s.push('Sweetner');
        if (it.other)    s.push(it.schemeCode ? ('Other: ' + it.schemeCode) : 'Other');
        if (s.length) schemeRows.push('• ' + (it.name || it.code || 'Item') + ' — ' + s.join(', '));
      });
      const sy = order.gstNumber ? y+19 : y+11;
      doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...DRED);
      doc.text('Schemes Applied', ml+2, sy);
      if (schemeRows.length) {
        doc.setFont('helvetica','normal'); doc.setFontSize(6.3); doc.setTextColor(...INK);
        let ly = sy+4; const maxY = y+tsH-2;
        for (let si=0; si<schemeRows.length && ly<=maxY; si++) {
          const lines = doc.splitTextToSize(schemeRows[si], tsLW-4);
          for (let li=0; li<lines.length && ly<=maxY; li++) { doc.text(lines[li], ml+2, ly); ly += 3.2; }
        }
      } else {
        doc.setFont('helvetica','normal'); doc.setFontSize(6.3); doc.setTextColor(...GR);
        doc.text('None', ml+2, sy+4);
      }
    }
    const vSp = tsRX+tsRW*0.54;
    vln(vSp,y,y+tsH);
    const rs = tsH/fRows.length;
    const valColW = tsRX+tsRW-3-vSp, lblColW = vSp-tsRX-4;
    fRows.forEach(([l,v,bold],i)=>{
      hln(tsRX,y+rs*(i+1),tsRX+tsRW);
      const sz  = bold ? 8.5 : 7.5, clr = bold ? DRED : INK;
      doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr);
      doc.text(fit1(l,lblColW,sz), tsRX+2, y+rs*i+rs*0.72);
      doc.setTextColor(...INK);
      doc.text(fit1(v,valColW,sz), tsRX+tsRW-2, y+rs*i+rs*0.72, {align:'right'});
    });
    y += tsH;

    const receipts = (order.moneyReceipts && order.moneyReceipts.length)
      ? order.moneyReceipts : [{no:order.receiptNo||'',date:''}];
    const rcH=8;
    for(let r=0;r<3;r++){
      const mr = receipts[r] || {no:'',date:''};
      brd(ml,y,cw/2,rcH); brd(ml+cw/2,y,cw/2,rcH);
      lbl(ml+2,y+5,'Money Receipt No & Dt :');
      const mrTxt = [mr.no,mr.date].filter(Boolean).join('  ·  ');
      if(mrTxt) val(ml+40,y+5, fit1(mrTxt,cw/2-42,7.5), 7.5);
      lbl(ml+cw/2+2,y+5,'Amount Received :');
      if(r===0&&earnest) val(ml+cw/2+32,y+5, fit1(inr(earnest),cw/2-34,7.5), 7.5);
      y += rcH;
    }

    const sigH=18, sigW=cw/3;
    for(let s=0;s<3;s++) brd(ml+s*sigW,y,sigW,sigH);
    ['Sales Exe. Signature','Sales Exe. Name','Customer Signature'].forEach((t,i)=>{
      lbl(ml+i*sigW+2, y+sigH-2.5, t);
      if(i===1&&order.salesExec){
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
        doc.text(fit1(order.salesExec,sigW-4,9), ml+i*sigW+sigW/2, y+10, {align:'center'});
      }
    });
    return y + sigH;
  }

  // ── FOOTER (fixed bottom of every page) ───────────────────
  function drawFooter() {
    const y = footerY;
    brd(ml,y,cw,ftH);
    hln(ml,y+9,ml+cw);
    vln(ml+cw*0.6,y,y+9);
    hln(ml,y+ftH-8,ml+cw);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...INK);
    doc.text(fit1('Customer care no. : 18002671122  |  interiocare@godrej.com', cw*0.6-3, 6.5), ml+2, y+4);
    doc.text(fit1('Website : www.godrejinterio.com', cw*0.6-3, 6.5), ml+2, y+8);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
    doc.text(fit1('For GODREJ & BOYCE MFG. CO. LTD', cw*0.4-3, 7), ml+cw-2, y+4, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR);
    doc.text('Authorised Signatory', ml+cw-2, y+8, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR);
    doc.text('GST No. : ' + (order.gstNumber || '________________________________'), ml+2, y+13);
    doc.setTextColor(...INK);
    const noteLines = doc.splitTextToSize(
      'Note : Our technician will contact you for assembly after delivery. For any further assistance, please contact customer care.',
      cw-4
    );
    noteLines.slice(0,2).forEach((ln,i)=>doc.text(ln, ml+2, y+16+i*3.5));
    doc.setFillColor(220,220,220); doc.rect(ml, y+ftH-8, cw, 8, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(...BLK);
    doc.text(fit1('H.O. : Godrej Interio Division, Pirojshanagar, Vikhroli, Mumbai 400 079.', cw-4, 6.5), ml+2, y+ftH-3.5);
  }

  // ── LAYOUT DRIVER (paginates items, keeps header+footer per page) ──
  let pageNo = 1;
  let y = 6;
  y = drawHeaderBand(y);
  y = drawTopBlock(y);
  y = drawItemsHeader(y);

  const items = isCustomer ? customerCopyItems(order.items) : (order.items || []);
  for (let i = 0; i < items.length; i++) {
    if (y + rowHeight(items[i]) > itemAreaBottom) {   // no room for this row → new page
      drawFooter();
      doc.addPage(); pageNo++;
      y = 6;
      y = drawHeaderBand(y);
      y = drawContinuationBanner(y, pageNo);
      y = drawItemsHeader(y);
    }
    y = drawItemRow(y, items[i], i);
  }

  // Totals must sit together on one page; move to a fresh page if they don't fit.
  const nTotRows      = 6 + (orderDiscAmt > 0 ? 2 : 0);
  const totalsBlockH  = Math.max(5.7*nTotRows, 44) + 24 /*receipt*/ + 18 /*signature*/;
  if (y + totalsBlockH > itemAreaBottom) {
    drawFooter();
    doc.addPage(); pageNo++;
    y = 6;
    y = drawHeaderBand(y);
    y = drawContinuationBanner(y, pageNo);
  }
  drawTotalsBlock(y);
  drawFooter();

  return doc;
}

const { useState, useEffect, useRef, useCallback } = React;

const BLANK_ORDER = () => ({
  no:'', customer:'', phone:'', alt:'', email:'',
  gstNumber:'',
  billing:'', delivery:'', floor:'', landmark:'', liftAvailable:'',
  // When a lift is available, which lift type(s): Standard / Goods / Service.
  liftTypes:[],
  // Contact details (for orders purchased on behalf of someone else) —
  // mandatory when the billing address differs from the delivery address.
  contactPersonName:'', contactNumber:'', contactRemark:'',
  customerCode:'', poRef:'', source:'',
  orderDiscount:'', plannedDly:'', installNote:'',
  paymentMode:'', earnest:'',
  // SI No — the order-form serial the salesperson enters (printed as the "Sl"
  // part of the PDF's "Order No. (Sl / Receipt)" field).
  slNo:'',
  // Receipt No — auto-assigned in sequence (1, 2, 3 …) for normal bookings;
  // hand-entered for manual (paper-replica) orders. Printed as the "Receipt"
  // part of the PDF's "Order No. (Sl / Receipt)" field.
  orderFormReceiptNo:'',
  // Up to three money-receipt no + date pairs (updatable over time)
  receiptNo:'', moneyReceipts:[{no:'',date:''},{no:'',date:''},{no:'',date:''}],
  deliveryStatus:'Pending',
  followUp:'', salesExec:'', won:'',
  orderType:'B2C', items:[],
  // Customer profiling (saved to sheet, not on PDF). DOB & anniversary optional.
  dob:'', anniversary:'', awareness:'', purchasePattern:[], purchasingFor:'',
  // Site measurements (sofa & modular-wardrobe dims are mandatory when such an
  // item is ordered + printed on both PDF copies)
  sofaWidth:'', sofaHeight:'', sofaDepth:'',
  // Modular-furniture measurements — one block per modular wardrobe in the order
  // (Kalista / Kreation X2 / X3). Each block carries the wardrobe dims. The sales
  // person picks how many blocks. { name, length, width, height }
  wardrobes:[],
  // Room measurements — the sales person picks how many rooms. { name, width, height, depth }
  rooms:[],
  // Staircase (site-access) measurement — order-level, needed only for a SOFA
  // when there is NO lift. Staircase width + the landing area's L x W x D. All cm.
  staircaseWidth:'', landingLength:'', landingWidth:'', landingDepth:'',
  // Legacy single-block wardrobe fields (kept so orders saved before the
  // multi-block upgrade still round-trip; mirrored from wardrobes[0] on save).
  wardrobeLength:'', wardrobeWidth:'', wardrobeHeight:'',
  entryDoorWidth:'', entryDoorHeight:'',
});

// Delivery-status options. The order is only "Completed" once installation is done.
const DELIVERY_STATUSES = ['Pending', 'Scheduled for Delivery', 'Delivered', 'Installation Done'];
// Godrej modular product families. On the CUSTOMER copy of the PDF, every item
// belonging to one family is collapsed into a single line (family name + the
// summed line total). The SALES copy stays fully itemised.
const MODULAR_FAMILIES = [
  { key:'kalista',    label:'Kalista',     test:s=>/kalista/i.test(s) },
  { key:'kreationx3', label:'Kreation X3', test:s=>/kreation\s*[-_]?\s*x\s*[-_]?\s*3/i.test(s) },
  { key:'kreationx2', label:'Kreation X2', test:s=>/kreation\s*[-_]?\s*x\s*[-_]?\s*2/i.test(s) },
  { key:'upmods',     label:'Upmods Sofa', test:s=>/upmods/i.test(s) },
];
function modularFamilyOf(it) {
  const hay = [it.cat, it.item, it.name].filter(Boolean).join(' ');
  for (const f of MODULAR_FAMILIES) if (f.test(hay)) return f;
  return null;
}
// Modular-wardrobe families (Kalista / Kreation X2 / X3) that require the
// wardrobe L x W x H dimensions + site-access measurements on the order form.
const WARDROBE_FAMILY_KEYS = ['kalista', 'kreationx2', 'kreationx3'];
function isWardrobeItem(it) {
  const f = modularFamilyOf(it);
  return !!f && WARDROBE_FAMILY_KEYS.indexOf(f.key) >= 0;
}
// A sofa item — any item named "sofa" or a modular Upmods sofa.
function isSofaItem(it) {
  const f = modularFamilyOf(it);
  if (f && f.key === 'upmods') return true;
  return /sofa/i.test((it.name || '') + ' ' + (it.cat || '') + ' ' + (it.item || ''));
}
// A "Made To Order" item — the price list tags it (ITEM_GROUP / category / tab)
// with "MTO". Such items are produced on order and carry no ready stock.
function isMTOItem(it) {
  return /(^|[^A-Z])MTO([^A-Z]|$)/i.test([it.item, it.cat, it.sheet, it.extra].filter(Boolean).join(' '));
}
// Availability tier for ordering the item list:
//   0 = in stock (non-MTO), 1 = out of stock (non-MTO), 2 = made-to-order.
function availabilityTier(it) {
  if (isMTOItem(it)) return 2;
  const total = (it.stock || []).reduce((s, x) => s + (x.q || 0), 0);
  return total > 0 ? 0 : 1;
}
// Round half up: .5 and above → next integer, below .5 → previous integer.
function rnd(n) { return Math.floor((Number(n) || 0) + 0.5); }

// A saved order re-read from the sheet can carry a discount that Google Sheets
// stored as a fraction (writing the string "40%" makes Sheets keep 0.40).
// Normalize any 0<x<1 percent back to whole-number percent, and recompute each
// item's unit price / line total so a reopened order matches what was entered.
function normalizeLoadedOrder(o) {
  if (!o) return o;
  const fixPct = v => {
    const n = parseFloat(v);
    if (!isFinite(n) || n <= 0) return (v == null ? '' : v);
    if (n > 0 && n < 1) return String(Math.round(n * 10000) / 100);   // 0.4 → 40, 0.075 → 7.5
    return String(n);
  };
  const items = (o.items || []).map(it => {
    const disc = fixPct(it.disc);
    const mrp  = Number(it.mrp) || Number(it.cpl) || 0;
    const qty  = Number(it.qty) || 0;
    const up   = mrp > 0 ? Math.round(mrp * (1 - (parseFloat(disc) || 0) / 100)) : (Number(it.unitPrice) || 0);
    return { ...it, disc, unitPrice: up, total: up * qty };
  });
  return { ...o, orderDiscount: fixPct(o.orderDiscount), items };
}

// Next auto Receipt No = the highest numeric Receipt No already used across all
// orders + 1 (starts at 1). Used to pre-fill the editable Receipt No field for a
// new booking — the backend re-derives the same number if the field is left blank.
function nextReceiptNo(orders){
  let mx = 0;
  (orders||[]).forEach(o=>{ const n = parseInt(String((o&&o.orderFormReceiptNo)||'').replace(/[^\d]/g,''),10); if(isFinite(n) && n>mx) mx = n; });
  return mx + 1;
}

// Follow-up date = 2 days before the planned delivery date (yyyy-mm-dd in, out).
function followUpFromDelivery(deliveryDate) {
  if (!deliveryDate) return '';
  const d = new Date(deliveryDate + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  d.setDate(d.getDate() - 2);
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}

function App() {
  const [screen,        setScreen]       = useState('loading');
  const [user,          setUser]         = useState(null);
  const [items,         setItems]        = useState([]);
  const [priceItems,    setPriceItems]   = useState([]);
  const [orders,        setOrders]       = useState([]);
  const [syncedAt,      setSyncedAt]     = useState(null);
  const [priceSyncedAt, setPriceSyncedAt]= useState(() => localStorage.getItem('4s_price_items_v9_ts') ? new Date(Number(localStorage.getItem('4s_price_items_v9_ts'))).toISOString() : null);
  const [priceSyncError, setPriceSyncError] = useState(null);
  const [order,         setOrder]        = useState(BLANK_ORDER());
  const [selOrder,      setSelOrder]     = useState(null);
  const [toast,         setToast]        = useState(null);
  const [loading,       setLoading]      = useState(false);

  const showToast = (msg,type='ok') => setToast({msg,type});

  // ── Navigation with a real back-stack ─────────────────────────
  // nav(s)   → remember where we were, then go to screen s
  // back()   → return to the previous screen (also wired to the
  //            hardware / browser back button)
  const navStack = useRef([]);
  const nav = useCallback((s) => {
    setScreen(prev => {
      if (s !== prev) {
        navStack.current.push(prev);
        window.history.pushState({ screen: s }, '', '');
      }
      return s;
    });
  }, []);
  const back = useCallback(() => {
    // Route everything through the browser history so the on-screen and
    // hardware back buttons behave identically.
    window.history.back();
  }, []);
  const popScreen = useCallback(() => {
    setScreen(prev => {
      const st = navStack.current;
      let target = st.length ? st.pop() : 'home';
      // Never get stuck on auth screens after logging in
      if (!target || target === prev || target === 'loading') target = 'home';
      return target;
    });
  }, []);

  useEffect(() => {
    window.history.replaceState({ screen: 'home' }, '', '');
    const handler = () => popScreen();
    window.addEventListener('popstate', handler);
    return () => window.removeEventListener('popstate', handler);
  }, [popScreen]);

  // Restore session
  useEffect(() => {
    const saved = localStorage.getItem('4s_user');
    const apiUrl = localStorage.getItem('4s_api_url');
    if (saved) {
      try { setUser(JSON.parse(saved)); setScreen(apiUrl ? 'home' : 'settings'); }
      catch { setScreen(apiUrl ? 'login' : 'setup'); }
    } else {
      setScreen(apiUrl ? 'login' : 'setup');
    }
  }, []);

  // Load stock + price list on login. Cached data shows instantly for a snappy
  // UI, but we always pull FRESH stock + price data from the sheet on every
  // login so each session starts fully in sync (stock = current-date snapshot).
  useEffect(() => {
    if (!user) return;
    const cached = localStorage.getItem('4s_items');
    if (cached) try { setItems(JSON.parse(cached)); } catch {}
    const cachedPL = localStorage.getItem('4s_price_items_v9');
    let hadCachedPL = false;
    if (cachedPL) try { const p = JSON.parse(cachedPL); setPriceItems(p); hadCachedPL = p.length > 0; } catch {}
    syncStock({ silent: true });
    loadPriceListItems(true)
      .then(pi => {
        if (pi.length > 0) {
          setPriceItems(pi);
          const ts = localStorage.getItem('4s_price_items_v9_ts');
          if (ts) setPriceSyncedAt(new Date(Number(ts)).toISOString());
        }
      })
      // If we already have cached prices, stay silent — no scary toast on a
      // slow background refresh. Only surface an error when there's nothing to show.
      .catch(e => { if (!hadCachedPL) setPriceSyncError(e.message); });
  }, [user]);

  // Restore an unsaved order draft once, right after login
  useEffect(() => {
    if (!user) return;
    try {
      const d = localStorage.getItem('4s_draft');
      if (d) { const o = JSON.parse(d); if (!o.no && ((o.items&&o.items.length) || o.customer)) setOrder(o); }
    } catch {}
  }, [user]);

  // Keep the working order backed up so a reload/crash never loses a booking
  useEffect(() => {
    if (!user) return;
    try {
      if (order.no) localStorage.removeItem('4s_draft');            // saved → no longer a draft
      else if ((order.items&&order.items.length) || order.customer) localStorage.setItem('4s_draft', JSON.stringify(order));
      else localStorage.removeItem('4s_draft');
    } catch {}
  }, [order, user]);

  // Flush offline-queued orders on login and whenever the network comes back
  useEffect(() => {
    if (!user) return;
    flushQueue();
    const onOnline = () => flushQueue();
    window.addEventListener('online', onOnline);
    return () => window.removeEventListener('online', onOnline);
  }, [user]);

  // Handle deep-link action from PWA shortcut (?action=...)
  useEffect(() => {
    const sp = new URLSearchParams(window.location.search);
    const action = sp.get('action');
    if (action === 'new-order' && user) { setOrder({...BLANK_ORDER(),salesExec:user?.name||''}); nav('order'); }
    if (action === 'history' && user) nav('history');
  }, [user]);

  async function syncStock(opts) {
    const silent = opts && opts.silent;
    setLoading(true);
    try {
      // One retry so a slow cold-start doesn't surface as a sync error.
      let res;
      try { res = await apiGet('stock', {}, 60000); }
      catch (e1) {
        if ((e1.message||'').includes('timed out')) res = await apiGet('stock', {}, 60000);
        else throw e1;
      }
      if (res.ok) {
        setItems(res.items);
        setSyncedAt(res.syncedAt || new Date().toISOString());
        localStorage.setItem('4s_items', JSON.stringify(res.items));
        if (!silent) showToast(res.items.length + ' items synced ✓');
      } else if (!silent) {
        showToast(res.error || 'Stock sync failed — check the Stock tab', 'bad');
      }
    } catch(e) {
      if (!silent) showToast('Stock sync failed: ' + e.message, 'bad');
    } finally {
      setLoading(false);
    }
  }

  async function syncPriceList() {
    localStorage.removeItem('4s_price_items_v9');
    localStorage.removeItem('4s_price_items_v9_ts');
    setPriceSyncError(null);
    setLoading(true);
    try {
      const pi = await loadPriceListItems(true);   // force fresh from the sheet
      setPriceItems(pi);
      setPriceSyncedAt(new Date().toISOString());
      localStorage.setItem('4s_price_items_v9_ts', String(Date.now()));
      showToast(pi.length + ' items loaded ✓', 'ok');
    } catch(e) {
      setPriceSyncError(e.message);
      showToast('Sync failed — see error below', 'bad');
    } finally {
      setLoading(false);
    }
  }

  async function loadOrders() {
    setLoading(true);
    try {
      const res = await apiGet('orders', { exec: user?.name || '' });
      if (res.ok) {
        setOrders(res.orders);
        localStorage.setItem('4s_orders', JSON.stringify(res.orders));
      } else showToast(res.error||'Failed to load orders','bad');
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doLogin(username, password) {
    setLoading(true);
    try {
      const res = await apiGet('login', { username, password });
      if (res.ok) {
        setUser(res.user);
        localStorage.setItem('4s_user', JSON.stringify(res.user));
        showToast('Welcome, '+res.user.name+'!');
        nav('home');
      } else {
        showToast(res.error||'Login failed','bad');
      }
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doSaveOrder(draft) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'saveOrder', order:{ ...draft, totalWithTax: orderTotals(draft).total } });
      if (res.ok) {
        const saved = {...draft, no: res.orderNo, internalNo: res.internalNo, orderFormReceiptNo: res.orderFormReceiptNo || draft.orderFormReceiptNo};
        setOrder(saved);
        showToast('Order '+res.orderNo+' saved ✓');
        // Refresh the ledger so the next new booking picks up the latest Receipt No.
        try { loadOrders(); } catch {}
        return saved;
      } else {
        showToast(res.error||'Save failed','bad');
        return null;
      }
    } catch(e) {
      showToast('No internet — order saved on this phone, will sync automatically','warn');
      const q = JSON.parse(localStorage.getItem('4s_queue')||'[]');
      q.push({...draft, _queuedAt: Date.now()});
      localStorage.setItem('4s_queue', JSON.stringify(q));
      return draft;
    } finally { setLoading(false); }
  }

  // Re-send any orders that were saved while offline
  async function flushQueue() {
    let q;
    try { q = JSON.parse(localStorage.getItem('4s_queue')||'[]'); } catch { q = []; }
    if (!q.length) return;
    const remaining = [];
    for (const draft of q) {
      try {
        const res = await apiPost({ action:'saveOrder', order:{ ...draft, totalWithTax: orderTotals(draft).total } });
        if (!res || !res.ok) remaining.push(draft);
      } catch { remaining.push(draft); }
    }
    localStorage.setItem('4s_queue', JSON.stringify(remaining));
    const sent = q.length - remaining.length;
    if (sent > 0) { showToast(sent+' pending order'+(sent>1?'s':'')+' synced ✓'); try { loadOrders(); } catch {} }
  }

  async function doUpdateWON(orderNo, internalNo, won, itemIndexes) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'updateWON', orderNo, internalNo, won, itemIndexes, updatedBy: user?.name });
      if (res.ok) { showToast('WON updated ✓'); loadOrders(); return true; }
      else { showToast(res.error||'Update failed','bad'); return false; }
    } catch(e) { showToast(e.message,'bad'); return false; }
    finally { setLoading(false); }
  }

  async function doUpdateDelivery(orderNo, internalNo, deliveryStatus) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'updateDelivery', orderNo, internalNo, deliveryStatus, updatedBy: user?.name });
      if (res.ok) { showToast('Delivery status updated ✓'); loadOrders(); return true; }
      else { showToast(res.error||'Update failed','bad'); return false; }
    } catch(e) { showToast(e.message,'bad'); return false; }
    finally { setLoading(false); }
  }

  // Admin-only: permanently delete an order (all its rows) from the CRM sheet.
  // The backend re-checks that the requesting user is an admin before deleting.
  async function doDeleteOrder(orderNo, internalNo) {
    if (!hasManagerAccess(user) || normRole(user?.role) !== 'admin') {
      showToast('Only an admin can delete orders','bad'); return false;
    }
    setLoading(true);
    try {
      const res = await apiPost({ action:'deleteOrder', orderNo, internalNo, by: user?.code, updatedBy: user?.name });
      if (res.ok) { showToast('Order '+(orderNo||'')+' deleted ✓'); loadOrders(); return true; }
      else { showToast(res.error||'Delete failed','bad'); return false; }
    } catch(e) { showToast(e.message,'bad'); return false; }
    finally { setLoading(false); }
  }

  function doSignOut() {
    localStorage.removeItem('4s_user');
    setUser(null);
    setOrder(BLANK_ORDER());
    setOrders([]);
    nav('login');
  }

  const ctx = { user, items, priceItems, orders, syncedAt, priceSyncedAt, priceSyncError, order, setOrder, selOrder, setSelOrder, loading, showToast, nav, back, doLogin, doSaveOrder, doUpdateWON, doUpdateDelivery, doDeleteOrder, doSignOut, syncStock, syncPriceList, loadOrders };

  const screens = {
    loading: <LoadingScreen/>,
    setup:   <SetupScreen   ctx={ctx}/>,
    login:   <LoginScreen   ctx={ctx}/>,
    home:    <HomeScreen    ctx={ctx}/>,
    search:  <SearchScreen  ctx={ctx}/>,
    order:   <OrderFormScreen ctx={ctx}/>,
    pdf:     <PDFPreviewScreen ctx={ctx}/>,
    history: <HistoryScreen ctx={ctx}/>,
    won:     <WONUpdateScreen ctx={ctx}/>,
    settings:<SettingsScreen ctx={ctx}/>,
  };

  return (
    <div className="app-shell">
      {screens[screen] || screens.home}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {loading && <div style={{position:'fixed',top:16,right:16,zIndex:9998}}><Spinner size={22}/></div>}
    </div>
  );
}
