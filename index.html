<!-- Hard version gate — unregisters stale SW and forces fresh load when code changes -->
<script>
(function(){
  var V = '18';
  if (localStorage.getItem('4s_code_v') !== V) {
    localStorage.setItem('4s_code_v', V);
    // Clear ALL local storage (stale caches) then unregister SW and hard reload
    try { localStorage.clear(); } catch(e) {}
    localStorage.setItem('4s_code_v', V); // re-set after clear
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
      }).then(function(){
        // Also clear all SW caches
        if (window.caches) {
          caches.keys().then(function(keys){
            return Promise.all(keys.map(function(k){ return caches.delete(k); }));
          }).then(function(){ location.reload(true); });
        } else { location.reload(true); }
      });
    } else {
      location.reload(true);
    }
  }
})();
</script>

// BRAND / PDF ASSETS
// Drop these PNG files next to index.html to have them embedded in the
// PDF exactly (otherwise the PDF falls back to drawn graphics / a
// generated QR):
//   interio-logo.png  → the "interio by Godrej" logo (PDF header)
//   fs-logo.png        → the 4S Interiors logo (store address block)
//   review-qr.png      → your Google review QR (the "Scan to review us" box)
// ═══════════════════════════════════════════════════════════
const PDF_ASSETS = {};   // key -> { data:<pngDataURL>, w, h }
function _loadImageAsset(key, url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      PDF_ASSETS[key] = { data: c.toDataURL('image/png'), w: img.naturalWidth, h: img.naturalHeight };
    } catch (e) { /* tainted or unsupported — skip, fall back to drawn version */ }
  };
  img.onerror = () => {};
  img.src = url;
}
function preloadPdfAssets() {
  _loadImageAsset('interio', 'interio-logo.png');
  _loadImageAsset('fs',      'fs-logo.png');
  _loadImageAsset('reviewQR','review-qr.png');
}
preloadPdfAssets();

function getReviewUrl() {
  return localStorage.getItem('4s_review_url') ||

}
// Generate a QR PNG data URL synchronously via qrcodejs (canvas backend)
function makeQrDataUrl(text, size = 160) {
  try {
    const div = document.createElement('div');
    new window.QRCode(div, { text, width: size, height: size, correctLevel: window.QRCode.CorrectLevel.M });
    const cv = div.querySelector('canvas');
    if (cv) return cv.toDataURL('image/png');
    const im = div.querySelector('img');
    if (im && im.src) return im.src;
  } catch (e) {}
  return null;
}

// ═══════════════════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════════════════
function getApiUrl() { return localStorage.getItem('4s_api_url') || ''; }

async function apiGet(action, params = {}, timeoutMs = 15000) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured. Go to Settings.');
  const cb  = 'cb' + Date.now();
  const qs  = new URLSearchParams({ action, callback: cb, ...params }).toString();
  return new Promise((res, rej) => {
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); rej(new Error('Request timed out after ' + Math.round(timeoutMs/1000) + 's.')); }, timeoutMs);
    function cleanup() { clearTimeout(timeout); delete window[cb]; script.remove(); }
    window[cb] = (data) => { cleanup(); res(data); };
    script.onerror = () => { cleanup(); rej(new Error('Network error — check API URL.')); };
    script.src = url + '?' + qs;
    document.head.appendChild(script);
  });
}

async function apiPost(body, tries = 3) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured.');
  let lastErr;
  for (let attempt = 1; attempt <= tries; attempt++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 45000);
      const r = await fetch(url, {
        method: 'POST',
        body: JSON.stringify(body),
        headers: { 'Content-Type': 'text/plain' }, // avoid CORS preflight
        redirect: 'follow',
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (!r.ok) throw new Error('Server error: ' + r.status);
      return await r.json();
    } catch (e) {
      lastErr = e;
      if (attempt < tries) await new Promise(res => setTimeout(res, 800 * attempt)); // backoff, then retry
    }
  }
  throw lastErr || new Error('Network error');
}

const OPS_SHEET_ID = '12RtOVqlOicoGlF2oLRBv3wB9eeludiz08AFKbhPcNqs';

async function loadPriceListItems(forceFresh = false) {
  const CACHE_KEY = '4s_price_items_v9';
  const CACHE_TS  = '4s_price_items_v9_ts';
  const AGE_MS    = 6 * 60 * 60 * 1000; // 6 hours

  // Serve from the local cache if fresh (skipped on a manual Sync)
  if (!forceFresh) {
    const cached   = localStorage.getItem(CACHE_KEY);
    const cachedAt = localStorage.getItem(CACHE_TS);
    if (cached && cachedAt && Date.now() - Number(cachedAt) < AGE_MS) {
      try { const p = JSON.parse(cached); if (p.length > 0) return p; } catch {}
    }
  }

  const apiUrl = getApiUrl();
  if (!apiUrl) {
    throw new Error('NO_URL: No Apps Script URL saved. Go to Settings → paste your Apps Script URL → Save URL.');
  }

  // On a manual sync, ask the server to bypass its cache too.
  const params = forceFresh ? { fresh: '1' } : {};
  let res;
  try {
    // One automatic retry so a slow cold-start doesn't surface as an error.
    res = await apiGet('priceList', params, 60000);
  } catch (e1) {
    const m1 = e1.message || '';
    if (m1.includes('timed out')) {
      try { res = await apiGet('priceList', params, 60000); }
      catch (e2) { throw new Error('Sync timed out twice — the sheet may be busy. Please tap Sync to retry.'); }
    } else {
      throw new Error('Network error: ' + m1);
    }
  }

  if (!res || !res.ok) {
    const err   = (res && res.error)     || 'Unknown error from Apps Script';
    const code  = (res && res.errorCode) || '';
    if (code === 'SETUP_NEEDED') throw new Error('SETUP_NEEDED: ' + err);
    // Only a genuine "Unknown action" means the deployed script is too old to
    // handle this request — never guess "old version" just from a missing field,
    // as that produced false "update Code.gs" alarms on perfectly good deploys.
    if (err.includes('Unknown action')) throw new Error('REDEPLOY_NEEDED: Apps Script is outdated. Go to Apps Script → paste the latest Code.gs → Save → Deploy → Manage deployments → Edit → New version → Deploy.');
    if (/timed out|timeout/i.test(err)) throw new Error('Sync timed out — the sheet may be busy. Tap Sync to retry.');
    throw new Error('API_ERROR: ' + err);
  }

  // Any response with items is good — we do NOT gate on scriptVersion here.
  if (!Array.isArray(res.items) || res.items.length === 0) {
    const errs = res.tabErrors ? '\n\nTab errors:\n' + res.tabErrors.join('\n') : '';
    throw new Error('SETUP_NEEDED: 0 items were read from the price sheet.' + errs +
      '\n\nCheck that each price tab has a valid header row (ITEM_CODE + DESCRIPTION, or LN CODE).');
  }

  localStorage.setItem(CACHE_KEY, JSON.stringify(res.items));
  localStorage.setItem(CACHE_TS,  String(Date.now()));
  return res.items;
}

// Search — strict tiered matching. Best tier wins exclusively; no mixing tiers.
// Tiers (descending priority):
//   S4 (100) — full typed query is a direct substring of name or code  → show all S4 only
//   S3  (90) — every meaningful word (≥2 chars) found in name or code  → show all S3 only
//   S2  (50) — majority of words (≥3 chars) found (>50%)               → show all S2 only
//   S1  (25) — any single long word (≥4 chars) found                   → show top 20
//   S0  (20) — item code starts with the query prefix (≥4 chars)       → show top 20
//
// Single-char tokens ("M" in "osiris M") are stripped before multi-word scoring
// so they don't dilute results. The full raw query still runs S4 to catch codes.
function fuzzySearch(allItems, query) {
  if (!query.trim()) return { results: allItems, mode: 'all' };
  const q = query.toLowerCase().trim();

  // Meaningful words only (≥2 chars) used for multi-word scoring
  const words = q.split(/\s+/).filter(w => w.length >= 2);

  function score(it) {
    // Build search string directly — never from searchName which may carry extra
    // colour/finish codes from old server deploys, causing false-positive matches
    const nm = ([it.cat, it.item, it.name]
      .filter(Boolean).join(' ')).toLowerCase();
    const cd = (it.code || '').toLowerCase();

    // S4: entire typed query is a substring of name or code
    if (nm.includes(q) || cd.includes(q)) return 100;

    // No meaningful words after stripping single chars
    if (words.length === 0) return 0;

    // S3: every meaningful word (≥2 chars) found somewhere in name or code
    if (words.length > 1 && words.every(w => nm.includes(w) || cd.includes(w))) return 90;

    // S2: majority (>50%) of words with ≥3 chars found — avoids false positives
    const longWords = words.filter(w => w.length >= 3);
    if (longWords.length > 0) {
      const hits = longWords.filter(w => nm.includes(w) || cd.includes(w));
      if (hits.length > 0 && hits.length / longWords.length > 0.5) return 50;
    }

    // S1: at least one word with ≥4 chars found
    if (words.some(w => w.length >= 4 && (nm.includes(w) || cd.includes(w)))) return 25;

    // S0: item code starts with the query prefix (min 4 chars typed)
    if (q.length >= 4 && cd.startsWith(q.slice(0, Math.min(q.length, 8)))) return 20;

    return 0;
  }

  // Score everything, drop zeros, sort best-first
  const scored = allItems
    .map(it => ({ it, s: score(it) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s);

  if (!scored.length) return { results: [], mode: 'none' };

  const best = scored[0].s;

  // S4/S3 → exact match: show ONLY those items, no noise from lower tiers
  if (best >= 90) return { results: scored.filter(x => x.s >= 90).map(x => x.it), mode: 'exact' };

  // S2 → majority-word match
  if (best >= 50) return { results: scored.filter(x => x.s >= 50).map(x => x.it), mode: 'near' };

  // S1/S0 → loose single-word match, cap at 20
  return { results: scored.slice(0, 20).map(x => x.it), mode: 'far' };
}

// ═══════════════════════════════════════════════════════════
// ORDER TOTALS — single source of truth used by the form, the
// on-screen preview, the PDF and the save call so they never drift.
//   • Each item.total is already net of that item's own discount.
//   • orderDiscount is an extra order-wide discount, entered as a %.
//   • GST = CGST 9% + SGST 9% on the taxable (after-discount) value.
// ═══════════════════════════════════════════════════════════
function orderTotals(o) {
  const items         = o.items || [];
  const itemsSubtotal = items.reduce((s, i) => s + (i.total || 0), 0);
  const orderDiscPct  = Math.max(0, parseFloat(o.orderDiscount) || 0) / 100;
  const orderDiscAmt  = Math.round(itemsSubtotal * orderDiscPct);
  const taxable       = itemsSubtotal - orderDiscAmt;
  const cgst          = Math.round(taxable * 0.09);
  const sgst          = Math.round(taxable * 0.09);
  const total         = taxable + cgst + sgst;
  const earnest       = Number(o.earnest) || 0;
  const balance       = total - earnest;
  return { itemsSubtotal, orderDiscPct, orderDiscAmt, taxable, cgst, sgst, total, earnest, balance };
}

  const map = {neutral:{bg:T.paper2,fg:T.ink2,bd:T.line},ok:{bg:T.okSoft,fg:T.ok,bd:'#b7dbc1'},warn:{bg:T.warnSoft,fg:T.warn,bd:'#e6cc95'},bad:{bg:T.badSoft,fg:T.bad,bd:'#e0b7ae'},green:{bg:T.greenSoft,fg:T.green,bd:T.greenLine},ink:{bg:T.ink,fg:'#fff',bd:T.ink}};
  const c = map[tone]||map.neutral;
  const s = size==='sm'?{fs:10,px:6,py:2,h:16}:{fs:11,px:8,py:3,h:20};
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,height:s.h,padding:`0 ${s.px}px`,borderRadius:4,background:c.bg,color:c.fg,border:`1px solid ${c.bd}`,fontFamily:mono?T.mono:T.sans,fontSize:s.fs,fontWeight:600,letterSpacing:mono?0:0.2,textTransform:mono?'none':'uppercase',whiteSpace:'nowrap'}}>{children}</span>;
}

function Btn({children,primary,danger,ghost,full,size='md',icon,onClick,disabled,type='button'}) {
  const h = size==='lg'?52:size==='sm'?32:44;
  const fs = size==='lg'?16:size==='sm'?13:14;
  let bg=T.card,fg=T.ink,bd=T.line2;
  if(primary){bg=T.green;fg='#fff';bd=T.green;}
  if(danger){bg=T.bad;fg='#fff';bd=T.bad;}
  if(ghost){bg='transparent';fg=T.ink;bd='transparent';}
  if(disabled){bg=T.paper2;fg=T.ink4;bd=T.line;}
  return <button type={type} onClick={onClick} disabled={disabled} style={{height:h,padding:'0 16px',borderRadius:6,background:bg,color:fg,border:`1px solid ${bd}`,fontFamily:T.sans,fontWeight:600,fontSize:fs,letterSpacing:-0.1,width:full?'100%':undefined,cursor:disabled?'not-allowed':'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,flexShrink:0,opacity:disabled?.5:1}}>{icon}{children}</button>;
}

function Field({label,value,onChange,mono,hint,required,action,onAction,multiline,type='text',placeholder,readOnly}) {
  const [focused,setFocused] = React.useState(false);
  const style = {fontSize:15,fontFamily:mono?T.mono:T.sans,color:T.ink,fontWeight:mono?500:400,lineHeight:'22px',background:'transparent',border:'none',outline:'none',width:'100%',resize:'none',padding:0};
  return (
    <div style={{borderBottom:`1px solid ${focused?T.green:T.line}`,padding:'11px 14px',background:'#fff',transition:'border-color .15s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}}>
        <span style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',fontFamily:T.sans}}>{label}{required&&<span style={{color:T.bad,marginLeft:3}}>*</span>}</span>
        {action&&<span onClick={onAction} style={{fontSize:11,color:T.green,fontWeight:600,fontFamily:T.sans,cursor:'pointer'}}>{action}</span>}
      </div>
      {multiline
        ? <textarea value={value} onChange={e=>onChange&&onChange(e.target.value)} rows={3} placeholder={placeholder||'Tap to fill'} readOnly={readOnly} style={{...style,lineHeight:'20px',fontSize:14}} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>
        : <input type={type} value={value} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder||'Tap to fill'} readOnly={readOnly} style={style} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>}
      {hint&&<div style={{fontSize:11,color:T.ink4,marginTop:3}}>{hint}</div>}
    </div>
  );
}

function StockChip({branch,count,low}) {
  const tone = count===0?'bad':low?'warn':'ok';
  const bdc = tone==='bad'?'#e0b7ae':tone==='warn'?'#e6cc95':'#b7dbc1';
  const bg  = tone==='bad'?T.badSoft:tone==='warn'?T.warnSoft:T.okSoft;
  const fg  = tone==='bad'?T.bad:tone==='warn'?T.warn:T.ok;
  return <span style={{display:'inline-flex',alignItems:'center',borderRadius:4,overflow:'hidden',border:`1px solid ${bdc}`,fontFamily:T.mono,fontSize:10,fontWeight:600,height:18}}><span style={{background:T.ink,color:'#fff',padding:'0 5px',height:'100%',display:'inline-flex',alignItems:'center',letterSpacing:.5}}>{branch}</span><span style={{background:bg,color:fg,padding:'0 6px',height:'100%',display:'inline-flex',alignItems:'center'}}>{count}</span></span>;
}

function SectionHead({n,label,action,onAction}) {
  return <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'baseline',justifyContent:'space-between',background:T.paper}}><div style={{display:'flex',alignItems:'baseline',gap:8}}><span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:700}}>{n}</span><span style={{fontSize:12,fontWeight:700,color:T.ink2,letterSpacing:1,textTransform:'uppercase'}}>{label}</span></div>{action&&<span onClick={onAction} style={{fontSize:11,color:T.green,fontWeight:700,cursor:'pointer'}}>{action}</span>}</div>;
}

function Spinner({size=20,color=T.green}) {
  return <div style={{width:size,height:size,border:`2px solid ${color}22`,borderTopColor:color,borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:0}}/>;
}

function Toast({msg,type='ok',onClose}) {
  React.useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  const bg = type==='ok'?T.green:type==='warn'?T.warn:T.bad;
  return <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.2)',animation:'slideUp .2s ease'}}>{msg}</div>;
}

function BottomNav({screen,nav}) {
  const tabs = [
    {id:'home',  label:'Home',   icon: c => Icon.home(c)},
    {id:'search',label:'Items',  icon: c => Icon.search(c)},
    {id:'order', label:'New',    icon: c => Icon.plus(c), primary:true},
    {id:'history',label:'Orders',icon: c => Icon.doc(c)},
    {id:'settings',label:'Me',  icon: c => Icon.user(c)},
  ];
  return (
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-around',padding:'8px 6px 24px',background:'#fff',borderTop:`1px solid ${T.line}`,flexShrink:0}}>
      {tabs.map(t=>{
        const isActive = t.id===screen;
        const c = t.primary?'#fff':isActive?T.green:T.ink4;
        return <div key={t.id} onClick={()=>nav(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}>
          <div style={{width:t.primary?44:32,height:t.primary?44:32,borderRadius:t.primary?12:6,background:t.primary?T.green:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>{t.icon(c)}</div>
          <div style={{fontSize:10,color:isActive?T.green:T.ink4,fontWeight:600}}>{t.label}</div>
        </div>;
      })}
    </div>
  );
}

function StockRibbon({syncedAt}) {
  const stale = syncedAt && (Date.now()-new Date(syncedAt).getTime() > 12*60*60*1000);
  const label = syncedAt ? new Date(syncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : 'Not synced';
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 14px',background:stale?T.warnSoft:T.greenSoft,borderBottom:`1px solid ${stale?'#e6cc95':T.greenLine}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:7,height:7,borderRadius:99,background:stale?T.warn:T.ok,flexShrink:0}}/>
        <span style={{fontSize:10,fontWeight:700,color:stale?T.warn:T.green,letterSpacing:.3,textTransform:'uppercase'}}>STOCK · {new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:T.mono,fontSize:10,color:stale?T.warn:T.green}}>{label}</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PDF GENERATOR  — matches physical Order Confirmation Form
// ═══════════════════════════════════════════════════════════
function generatePDF(order) {
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF({ unit:'mm', format:'a4' });
  const pw   = 210;
  const ph   = 297;
  const ml   = 10;
  const mr   = 10;
  const cw   = pw - ml - mr;          // 190 mm usable width

  // Single source of truth for money (items subtotal → order discount → GST)
  const T2       = orderTotals(order);
  const subtotal = T2.itemsSubtotal;
  const cgst     = T2.cgst;
  const sgst     = T2.sgst;
  const totalAmt = T2.total;
  const earnest  = T2.earnest;
  const balance  = T2.balance;
  const orderDiscPct = T2.orderDiscPct;
  const orderDiscAmt = T2.orderDiscAmt;
  const taxable      = T2.taxable;

  // Order number: <Sl No>/<Receipt No> in red
  const slNo     = order.slNo||order.internalNo||'—';
  const rcptNo   = order.receiptNo||'—';
  const orderRef = slNo + ' / ' + rcptNo;
  const oDate    = order.date||new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'});

  const DRED=[180,0,0], NAVY=[20,20,80], INK=[20,20,20], BLK=[0,0,0], GR=[120,120,120], LGR=[200,200,200];

  const lw0 = ()          => { doc.setLineWidth(0.25); doc.setDrawColor(...LGR); };
  const brd = (x,y,w,h)  => { lw0(); doc.rect(x,y,w,h,'S'); };
  const hln = (x,y,x2)   => { lw0(); doc.line(x,y,x2,y); };
  const vln = (x,y,y2)   => { lw0(); doc.line(x,y,x,y2); };
  const lbl = (x,y,t,sz=6)                 => { doc.setFont('helvetica','normal'); doc.setFontSize(sz); doc.setTextColor(...GR);  doc.text(t,x,y); };
  const val = (x,y,t,sz=8,bold=false,clr=INK) => { doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr); doc.text(String(t||''),x,y); };
  const rval= (x,y,t,sz=8,bold=false,clr=INK) => { doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr); doc.text(String(t||''),x,y,{align:'right'}); };
  // fit1: clamps text to one line within width w
  const fit1= (t,w,sz=8) => { doc.setFontSize(sz); return (doc.splitTextToSize(String(t||''),w)[0])||''; };
  // Use 'Rs.' instead of Rs symbol — jsPDF Helvetica is Latin-1 only,
  // the Unicode rupee glyph (U+20B9) produces wrong metrics and overflows.
  const inr = (n) => 'Rs.' + n.toLocaleString('en-IN');

  // Items table columns (adds a per-item Disc column)
  const tC = {
    code:{ x:ml,          w:22, t:'Item Code' },
    qty: { x:ml+22,       w:10, t:'Qty' },
    desc:{ x:ml+32,       w:cw-32-26-16-24, t:'Product Description' },
    cpl: { x:ml+cw-66,    w:26, t:'Unit Price' },
    disc:{ x:ml+cw-40,    w:16, t:'Disc' },
    tot: { x:ml+cw-24,    w:24, t:'Total (Rs.)' },
  };
  const thH = 8;    // items header height
  const rH  = 11;   // items row height

  // Footer sits at a fixed position on EVERY page; items never cross into it.
  const ftH     = 26;
  const footerY = ph - ftH - 4;
  const itemAreaBottom = footerY - 2;

  // ── HEADER BAND (drawn at top of every page) ──────────────
  function drawHeaderBand(y) {
    const hH = 16, leftW = 105, rightW = cw - leftW;
    doc.setFillColor(...DRED);
    doc.rect(ml, y, leftW, hH, 'F');
    doc.setFont('times','bolditalic'); doc.setFontSize(15); doc.setTextColor(255,255,255);
    doc.text('Order Confirmation Form', ml + leftW/2, y + hH/2 + 2.5, {align:'center'});
    doc.setFillColor(255,255,255);
    doc.rect(ml+leftW, y, rightW, hH, 'F');
    // Use the exact interio logo image if the PNG was supplied; else draw text.
    const A = PDF_ASSETS.interio;
    if (A && A.data) {
      const boxW = rightW-6, boxH = hH-4, ar = A.w/A.h;
      let w = boxW, h = w/ar;
      if (h > boxH) { h = boxH; w = h*ar; }
      try { doc.addImage(A.data,'PNG', ml+leftW+(rightW-w)/2, y+(hH-h)/2, w, h); } catch(e) { _interioText(y, leftW); }
    } else {
      _interioText(y, leftW);
    }
    lw0(); doc.rect(ml, y, cw, hH, 'S');
    vln(ml+leftW, y, y+hH);
    return y + hH;
  }
  function _interioText(y, leftW) {
    const lx = ml + leftW + 4;
    doc.setFont('times','bolditalic'); doc.setFontSize(17); doc.setTextColor(...DRED);
    doc.text('interio', lx, y + 8.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...NAVY);
    doc.text('by Godrej', lx, y + 14.5);
    doc.setFontSize(5); doc.text('®', lx + 24, y + 12.5);
  }

  // ── TOP BLOCK (page 1 only): store / customer / instructions ─
  function drawTopBlock(y) {
    // Store + WON + Order row (taller to fit the 4S logo + full address)
    const r1H = 22, c1w = 74, c2w = 56, c3w = cw - c1w - c2w;
    brd(ml,y,cw,r1H); vln(ml+c1w, y, y+r1H); vln(ml+c1w+c2w, y, y+r1H);
    lbl(ml+1, y+3.5, 'Store Address :');
    // 4S Interiors logo (image if supplied)
    let tx = ml+1;
    const F = PDF_ASSETS.fs;
    if (F && F.data) {
      const s = 13, ar = F.w/F.h; let w = s*ar, h = s;
      if (w > 15) { w = 15; h = w/ar; }
      try { doc.addImage(F.data,'PNG', ml+1, y+5.5, w, h); tx = ml+1+w+2; } catch(e) {}
    }
    val(tx, y+8, fit1('4S Interiors', c1w-(tx-ml)-2, 7.5), 7.5, true);
    doc.setFont('helvetica','normal'); doc.setFontSize(5.4); doc.setTextColor(...INK);
    doc.splitTextToSize('Plot No 193, beside Croma, Gayatri Vihar, Kanan Vihar, Patia, Bhubaneswar, Odisha 751024', c1w-(tx-ml)-2)
       .slice(0,3).forEach((ln,i)=>doc.text(ln, tx, y+11.5+i*2.8));
    val(tx, y+r1H-2, 'Ph: 08291957842', 6, true);
    lbl(ml+c1w+1, y+3.5, 'WON No.');
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...DRED);
    doc.text(fit1(order.won||'Pending', c2w-3, 10), ml+c1w+1, y+11);
    lbl(ml+c1w+1, y+16.5, 'Date :');
    val(ml+c1w+11, y+16.5, fit1(oDate, c2w-14, 7.5), 7.5);
    const ox = ml+c1w+c2w;
    lbl(ox+1, y+3.5, 'Order No. (Sl / Receipt)');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...DRED);
    doc.text(fit1(orderRef, c3w-3, 9), ox+1, y+12);
    y += r1H;

    // Billing / Delivery header
    const bhH = 6;
    [[ml,cw/2,'Billing Address'],[ml+cw/2,cw/2,'Delivery Address']].forEach(([x,w,txt]) => {
      doc.setFillColor(245,245,245); doc.rect(x,y,w,bhH,'F'); brd(x,y,w,bhH);
      doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
      doc.text(txt, x+w/2, y+4.3, {align:'center'});
    });
    y += bhH;

    // Customer details
    const cdH = 46, hw = cw/2;
    brd(ml,y,hw,cdH); brd(ml+hw,y,hw,cdH);
    hln(ml,y+6,ml+hw);
    lbl(ml+1,y+3.5,'P.O. Ref. No. :');
    val(ml+25,y+3.5, fit1(order.poRef||'',hw-27), 7.5);
    hln(ml,y+17,ml+hw);
    lbl(ml+1,y+10,'Customer Name :');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
    doc.text(fit1(order.customer||'',hw-3,9), ml+1, y+16);
    hln(ml,y+33,ml+hw);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.splitTextToSize(order.billing||'',hw-3).slice(0,3).forEach((ln,i)=>doc.text(ln,ml+1,y+21+i*4));
    hln(ml,y+38,ml+hw);
    lbl(ml+1,y+36,'Ph. :'); val(ml+9,y+36, fit1(order.phone||'',hw-11), 7.5);
    hln(ml,y+43,ml+hw);
    lbl(ml+1,y+41,'M. :');  val(ml+9,y+41, fit1(order.alt||'',hw-11), 7.5);
    const dx = ml+hw;
    lbl(dx+1,y+3.5,'Delivery Address :');
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.splitTextToSize(order.delivery||order.billing||'',hw-3).slice(0,4).forEach((ln,i)=>doc.text(ln,dx+1,y+8+i*4));
    hln(dx,y+27,dx+hw);
    lbl(dx+1,y+30.5,'E-Mail :'); val(dx+14,y+30.5, fit1(order.email||'',hw-16), 7.5);
    hln(dx,y+33,dx+hw);
    lbl(dx+1,y+36,'Ph. :');
    hln(dx,y+39,dx+hw);
    lbl(dx+1,y+42,'M. :');
    y += cdH;

    // Instruction + discount
    const siH=28, lw5=cw*0.55, rw5=cw*0.45, rx5=ml+lw5;
    brd(ml,y,lw5,siH); brd(rx5,y,rw5,siH);
    doc.setFillColor(248,248,248); doc.rect(ml,y,lw5,7,'F'); doc.rect(rx5,y,rw5,7,'F');
    hln(ml,y+7,ml+lw5); hln(rx5,y+7,rx5+rw5);
    lbl(ml+2,y+5,'Specific Instruction',7);
    lbl(rx5+2,y+5,'HFP / HFC / HFS / RFD',7);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.splitTextToSize(order.installNote||'',lw5-4).slice(0,4).forEach((ln,i)=>doc.text(ln,ml+2,y+11+i*4));
    vln(rx5+rw5*0.5,y+7,y+siH);
    const r5=(l,v,ry)=>{ hln(rx5,y+ry,rx5+rw5); lbl(rx5+2,y+ry-5.5,l); val(rx5+rw5*0.5+2,y+ry-1.5,fit1(v,rw5*0.48,8.5),8.5,true); };
    r5('Discount Code',        order.discountCode||'', 14);
    r5('Planned Dly Schedule', order.plannedDly||'',   21);
    r5('Reference no.',        order.poRef||'',        siH);
    y += siH;

    // Salesman row
    const scH=7;
    brd(ml,y,cw,scH); vln(ml+28,y,y+scH);
    lbl(ml+2,y+5,'Salesman Code',7);
    val(ml+30,y+5, fit1(order.salesExec||'',cw-32,7.5), 7.5);
    y += scH;

    // Site measurements row (sofa dims required for order completion + any
    // other site access measurements that were captured)
    const measParts = [];
    if (order.sofaWidth||order.sofaHeight||order.sofaDepth)
      measParts.push('Sofa (W x H x D): ' + [order.sofaWidth,order.sofaHeight,order.sofaDepth].map(v=>v||'-').join(' x '));
    if (order.liftHeight||order.liftWidth)
      measParts.push('Lift (H x W): ' + [order.liftHeight,order.liftWidth].map(v=>v||'-').join(' x '));
    if (order.staircaseWidth||order.staircaseLandingHeight)
      measParts.push('Staircase (W / Landing H): ' + [order.staircaseWidth,order.staircaseLandingHeight].map(v=>v||'-').join(' / '));
    if (order.entryDoorWidth||order.entryDoorHeight)
      measParts.push('Entry Door (W x H): ' + [order.entryDoorWidth,order.entryDoorHeight].map(v=>v||'-').join(' x '));
    if (measParts.length) {
      doc.setFontSize(7);
      const mLines = doc.splitTextToSize(measParts.join('     |     '), cw-32);
      const mH = 4 + mLines.length*3.4;
      brd(ml,y,cw,mH); vln(ml+28,y,y+mH);
      lbl(ml+2,y+5,'Site Meas.',7);
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...INK);
      mLines.forEach((ln,i)=>doc.text(ln, ml+30, y+4.2+i*3.4));
      y += mH;
    }
    return y;
  }

  // ── CONTINUATION BANNER (top of pages 2+) ─────────────────
  function drawContinuationBanner(y, pageNo) {
    const bh = 7;
    doc.setFillColor(248,248,248); doc.rect(ml,y,cw,bh,'F'); brd(ml,y,cw,bh);
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    doc.text('Order No. ' + orderRef + '  —  continued', ml+2, y+4.7);
    doc.setFont('helvetica','normal'); doc.setTextColor(...GR);
    doc.text('Page ' + pageNo, ml+cw-2, y+4.7, {align:'right'});
    return y + bh;
  }

  // ── ITEMS TABLE HEADER ────────────────────────────────────
  function drawItemsHeader(y) {
    doc.setFillColor(240,240,240); doc.rect(ml,y,cw,thH,'F');
    brd(ml,y,cw,thH);
    Object.values(tC).forEach(c=>vln(c.x+c.w,y,y+thH));
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
    Object.values(tC).forEach(c=>doc.text(c.t, c.x+c.w/2, y+5.5, {align:'center'}));
    return y + thH;
  }

  // ── ONE ITEM ROW ──────────────────────────────────────────
  function drawItemRow(y, it, idx) {
    if(idx%2===1){ doc.setFillColor(252,252,252); doc.rect(ml,y,cw,rH,'F'); }
    brd(ml,y,cw,rH);
    Object.values(tC).forEach(c=>vln(c.x+c.w,y,y+rH));
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...INK);
    doc.text(fit1(it.code||'',tC.code.w-2,7), tC.code.x+tC.code.w/2, y+7, {align:'center'});
    doc.text(String(it.qty), tC.qty.x+tC.qty.w/2, y+7, {align:'center'});
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...INK);
    const nm = doc.splitTextToSize(it.name||'', tC.desc.w-2);
    doc.text(nm[0]||'', tC.desc.x+1.5, y+4.5);
    if(nm[1]){ doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR); doc.text(nm[1], tC.desc.x+1.5, y+9); }
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...INK);
    const cplV = it.unitPrice>0?it.unitPrice:(it.mrp||it.cpl||0);
    rval(tC.cpl.x+tC.cpl.w-1.5, y+7, cplV>0?cplV.toLocaleString('en-IN'):'—');
    // Disc — per-item discount %
    const dPct = parseFloat(it.disc)||0;
    doc.setFontSize(7.5); doc.setTextColor(...(dPct>0?DRED:GR));
    doc.text(dPct>0?dPct+'%':'—', tC.disc.x+tC.disc.w/2, y+7, {align:'center'});
    doc.setFont('helvetica','bold'); doc.setTextColor(...INK);
    rval(tC.tot.x+tC.tot.w-1.5, y+7, (it.total||0).toLocaleString('en-IN'));
    return y + rH;
  }

  // ── TOTALS + RECEIPT + SIGNATURE (final page only) ────────
  function drawTotalsBlock(y) {
    const fRows = [['TOTAL', inr(subtotal), false]];
    if (orderDiscAmt > 0) {
      fRows.push(['Order Disc. @' + (orderDiscPct*100).toLocaleString('en-IN') + '%', '- ' + inr(orderDiscAmt), false]);
      fRows.push(['Taxable Amt.', inr(taxable), false]);
    }
    fRows.push(['CGST @ 9%',   inr(cgst),     false]);
    fRows.push(['SGST @ 9%',   inr(sgst),     false]);
    fRows.push(['Total Amt.',  inr(totalAmt), true ]);
    fRows.push(['Earnest Amt.',inr(earnest),  false]);
    fRows.push(['Balance Amt.',inr(balance),  true ]);

    const tsH = Math.max(5.7*fRows.length, 44), tsLW = cw*0.55, tsRW = cw*0.45, tsRX = ml+tsLW;
    brd(ml,y,tsLW,tsH); brd(tsRX,y,tsRW,tsH);
    lbl(ml+2,y+5,'(Invoice / billing details to be filled after order processing)',6.5);
    if (order.gstNumber) {
      lbl(ml+2, y+11, 'Customer GSTIN :', 7);
      val(ml+2, y+15.5, fit1(order.gstNumber, tsLW-4, 8.5), 8.5, true);
    }
    // "Scan to review us" QR — the supplied review-qr.png if present, else a
    // QR generated from the saved review URL.
    const qrData = (PDF_ASSETS.reviewQR && PDF_ASSETS.reviewQR.data) || makeQrDataUrl(getReviewUrl(), 160);
    if (qrData) {
      const qs = 18, qx = ml+2, qy = y+tsH-qs-2;
      try {
        doc.addImage(qrData,'PNG', qx, qy, qs, qs);
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...DRED);
        doc.text('Scan to review us', qx+qs+3, qy+qs/2-1);
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...GR);
        doc.text('We value your feedback!', qx+qs+3, qy+qs/2+3.5);
      } catch(e) {}
    }
    const vSp = tsRX+tsRW*0.54;
    vln(vSp,y,y+tsH);
    const rs = tsH/fRows.length;
    const valColW = tsRX+tsRW-3-vSp, lblColW = vSp-tsRX-4;
    fRows.forEach(([l,v,bold],i)=>{
      hln(tsRX,y+rs*(i+1),tsRX+tsRW);
      const sz  = bold ? 8.5 : 7.5, clr = bold ? DRED : INK;
      doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(sz); doc.setTextColor(...clr);
      doc.text(fit1(l,lblColW,sz), tsRX+2, y+rs*i+rs*0.72);
      doc.setTextColor(...INK);
      doc.text(fit1(v,valColW,sz), tsRX+tsRW-2, y+rs*i+rs*0.72, {align:'right'});
    });
    y += tsH;

    const rcH=9;
    for(let r=0;r<2;r++){
      brd(ml,y,cw/2,rcH); brd(ml+cw/2,y,cw/2,rcH);
      lbl(ml+2,y+5.5,'Receipt No. & Dt :');
      if(r===0&&order.receiptNo) val(ml+32,y+5.5, fit1(order.receiptNo,cw/2-34,7.5), 7.5);
      lbl(ml+cw/2+2,y+5.5,'Amount Received :');
      if(r===0&&earnest) val(ml+cw/2+32,y+5.5, fit1(inr(earnest),cw/2-34,7.5), 7.5);
      y += rcH;
    }

    const sigH=18, sigW=cw/3;
    for(let s=0;s<3;s++) brd(ml+s*sigW,y,sigW,sigH);
    ['Sales Exe. Signature','Sales Exe. Name','Customer Signature'].forEach((t,i)=>{
      lbl(ml+i*sigW+2, y+sigH-2.5, t);
      if(i===1&&order.salesExec){
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
        doc.text(fit1(order.salesExec,sigW-4,9), ml+i*sigW+sigW/2, y+10, {align:'center'});
      }
    });
    return y + sigH;
  }

  // ── FOOTER (fixed bottom of every page) ───────────────────
  function drawFooter() {
    const y = footerY;
    brd(ml,y,cw,ftH);
    hln(ml,y+9,ml+cw);
    vln(ml+cw*0.6,y,y+9);
    hln(ml,y+ftH-8,ml+cw);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...INK);
    doc.text(fit1('Customer care no. : 18002671122  |  interiocare@godrej.com', cw*0.6-3, 6.5), ml+2, y+4);
    doc.text(fit1('Website : www.godrejinterio.com', cw*0.6-3, 6.5), ml+2, y+8);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...INK);
    doc.text(fit1('For GODREJ & BOYCE MFG. CO. LTD', cw*0.4-3, 7), ml+cw-2, y+4, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR);
    doc.text('Authorised Signatory', ml+cw-2, y+8, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...GR);
    doc.text('GST No. : ' + (order.gstNumber || '________________________________'), ml+2, y+13);
    doc.setTextColor(...INK);
    const noteLines = doc.splitTextToSize(
      'Note : Our technician will contact you for assembly after delivery. For any further assistance, please contact customer care.',
      cw-4
    );
    noteLines.slice(0,2).forEach((ln,i)=>doc.text(ln, ml+2, y+16+i*3.5));
    doc.setFillColor(220,220,220); doc.rect(ml, y+ftH-8, cw, 8, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(...BLK);
    doc.text(fit1('H.O. : Godrej Interio Division, Pirojshanagar, Vikhroli, Mumbai 400 079.', cw-4, 6.5), ml+2, y+ftH-3.5);
  }

  // ── LAYOUT DRIVER (paginates items, keeps header+footer per page) ──
  let pageNo = 1;
  let y = 6;
  y = drawHeaderBand(y);
  y = drawTopBlock(y);
  y = drawItemsHeader(y);

  const items = order.items || [];
  for (let i = 0; i < items.length; i++) {
    if (y + rH > itemAreaBottom) {           // no room for another row → new page
      drawFooter();
      doc.addPage(); pageNo++;
      y = 6;
      y = drawHeaderBand(y);
      y = drawContinuationBanner(y, pageNo);
      y = drawItemsHeader(y);
    }
    y = drawItemRow(y, items[i], i);
  }

  // Totals must sit together on one page; move to a fresh page if they don't fit.
  const nTotRows      = 6 + (orderDiscAmt > 0 ? 2 : 0);
  const totalsBlockH  = Math.max(5.7*nTotRows, 44) + 18 /*receipt*/ + 18 /*signature*/;
  if (y + totalsBlockH > itemAreaBottom) {
    drawFooter();
    doc.addPage(); pageNo++;
    y = 6;
    y = drawHeaderBand(y);
    y = drawContinuationBanner(y, pageNo);
  }
  drawTotalsBlock(y);
  drawFooter();

  return doc;
}


// ═══════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════
const { useState, useEffect, useRef, useCallback } = React;

const BLANK_ORDER = () => ({
  no:'', customer:'', phone:'', alt:'', email:'',
  gstNumber:'',
  billing:'', delivery:'', liftAvailable:'Yes',
  customerCode:'', poRef:'', source:'Walk-in',
  discountCode:'', orderDiscount:'', plannedDly:'', installNote:'',
  paymentMode:'', earnest:'', receiptNo:'',
  followUp:'', salesExec:'', won:'',
  orderType:'B2C', items:[],
  // Customer profiling (mandatory; saved to sheet, not on PDF)
  dob:'', anniversary:'', awareness:'', purchasePattern:[], purchasingFor:'',
  // Site measurements (sofa ones are mandatory when a sofa is ordered + shown on PDF)
  sofaWidth:'', sofaHeight:'', sofaDepth:'',
  liftHeight:'', liftWidth:'', staircaseWidth:'', staircaseLandingHeight:'',
  entryDoorWidth:'', entryDoorHeight:'',
});

function App() {
  const [screen,        setScreen]       = useState('loading');
  const [user,          setUser]         = useState(null);
  const [items,         setItems]        = useState([]);
  const [priceItems,    setPriceItems]   = useState([]);
  const [orders,        setOrders]       = useState([]);
  const [syncedAt,      setSyncedAt]     = useState(null);
  const [priceSyncedAt, setPriceSyncedAt]= useState(() => localStorage.getItem('4s_price_items_v9_ts') ? new Date(Number(localStorage.getItem('4s_price_items_v9_ts'))).toISOString() : null);
  const [priceSyncError, setPriceSyncError] = useState(null);
  const [order,         setOrder]        = useState(BLANK_ORDER());
  const [selOrder,      setSelOrder]     = useState(null);
  const [toast,         setToast]        = useState(null);
  const [loading,       setLoading]      = useState(false);

  const showToast = (msg,type='ok') => setToast({msg,type});

  // ── Navigation with a real back-stack ─────────────────────────
  // nav(s)   → remember where we were, then go to screen s
  // back()   → return to the previous screen (also wired to the
  //            hardware / browser back button)
  const navStack = useRef([]);
  const nav = useCallback((s) => {
    setScreen(prev => {
      if (s !== prev) {
        navStack.current.push(prev);
        window.history.pushState({ screen: s }, '', '');
      }
      return s;
    });
  }, []);
  const back = useCallback(() => {
    // Route everything through the browser history so the on-screen and
    // hardware back buttons behave identically.
    window.history.back();
  }, []);
  const popScreen = useCallback(() => {
    setScreen(prev => {
      const st = navStack.current;
      let target = st.length ? st.pop() : 'home';
      // Never get stuck on auth screens after logging in
      if (!target || target === prev || target === 'loading') target = 'home';
      return target;
    });
  }, []);

  useEffect(() => {
    window.history.replaceState({ screen: 'home' }, '', '');
    const handler = () => popScreen();
    window.addEventListener('popstate', handler);
    return () => window.removeEventListener('popstate', handler);
  }, [popScreen]);

  // Restore session
  useEffect(() => {
    const saved = localStorage.getItem('4s_user');
    const apiUrl = localStorage.getItem('4s_api_url');
    if (saved) {
      try { setUser(JSON.parse(saved)); setScreen(apiUrl ? 'home' : 'settings'); }
      catch { setScreen(apiUrl ? 'login' : 'setup'); }
    } else {
      setScreen(apiUrl ? 'login' : 'setup');
    }
  }, []);

  // Load stock + price list on login (quietly — cached data shows instantly)
  useEffect(() => {
    if (!user) return;
    const cached = localStorage.getItem('4s_items');
    if (cached) try { setItems(JSON.parse(cached)); } catch {}
    const cachedPL = localStorage.getItem('4s_price_items_v9');
    let hadCachedPL = false;
    if (cachedPL) try { const p = JSON.parse(cachedPL); setPriceItems(p); hadCachedPL = p.length > 0; } catch {}
    syncStock({ silent: true });
    loadPriceListItems()
      .then(pi => {
        if (pi.length > 0) {
          setPriceItems(pi);
          const ts = localStorage.getItem('4s_price_items_v9_ts');
          if (ts) setPriceSyncedAt(new Date(Number(ts)).toISOString());
        }
      })
      // If we already have cached prices, stay silent — no scary toast on a
      // slow background refresh. Only surface an error when there's nothing to show.
      .catch(e => { if (!hadCachedPL) setPriceSyncError(e.message); });
  }, [user]);

  // Restore an unsaved order draft once, right after login
  useEffect(() => {
    if (!user) return;
    try {
      const d = localStorage.getItem('4s_draft');
      if (d) { const o = JSON.parse(d); if (!o.no && ((o.items&&o.items.length) || o.customer)) setOrder(o); }
    } catch {}
  }, [user]);

  // Keep the working order backed up so a reload/crash never loses a booking
  useEffect(() => {
    if (!user) return;
    try {
      if (order.no) localStorage.removeItem('4s_draft');            // saved → no longer a draft
      else if ((order.items&&order.items.length) || order.customer) localStorage.setItem('4s_draft', JSON.stringify(order));
      else localStorage.removeItem('4s_draft');
    } catch {}
  }, [order, user]);

  // Flush offline-queued orders on login and whenever the network comes back
  useEffect(() => {
    if (!user) return;
    flushQueue();
    const onOnline = () => flushQueue();
    window.addEventListener('online', onOnline);
    return () => window.removeEventListener('online', onOnline);
  }, [user]);

  // Handle deep-link action from PWA shortcut (?action=...)
  useEffect(() => {
    const sp = new URLSearchParams(window.location.search);
    const action = sp.get('action');
    if (action === 'new-order' && user) { setOrder({...BLANK_ORDER(),salesExec:user?.name||''}); nav('order'); }
    if (action === 'history' && user) nav('history');
  }, [user]);

  async function syncStock(opts) {
    const silent = opts && opts.silent;
    setLoading(true);
    try {
      // One retry so a slow cold-start doesn't surface as a sync error.
      let res;
      try { res = await apiGet('stock', {}, 60000); }
      catch (e1) {
        if ((e1.message||'').includes('timed out')) res = await apiGet('stock', {}, 60000);
        else throw e1;
      }
      if (res.ok) {
        setItems(res.items);
        setSyncedAt(res.syncedAt || new Date().toISOString());
        localStorage.setItem('4s_items', JSON.stringify(res.items));
        if (!silent) showToast(res.items.length + ' items synced ✓');
      } else if (!silent) {
        showToast(res.error || 'Stock sync failed — check the Stock tab', 'bad');
      }
    } catch(e) {
      if (!silent) showToast('Stock sync failed: ' + e.message, 'bad');
    } finally {
      setLoading(false);
    }
  }

  async function syncPriceList() {
    localStorage.removeItem('4s_price_items_v9');
    localStorage.removeItem('4s_price_items_v9_ts');
    setPriceSyncError(null);
    setLoading(true);
    try {
      const pi = await loadPriceListItems(true);   // force fresh from the sheet
      setPriceItems(pi);
      setPriceSyncedAt(new Date().toISOString());
      localStorage.setItem('4s_price_items_v9_ts', String(Date.now()));
      showToast(pi.length + ' items loaded ✓', 'ok');
    } catch(e) {
      setPriceSyncError(e.message);
      showToast('Sync failed — see error below', 'bad');
    } finally {
      setLoading(false);
    }
  }

  async function loadOrders() {
    setLoading(true);
    try {
      const res = await apiGet('orders', { exec: user?.name || '' });
      if (res.ok) {
        setOrders(res.orders);
        localStorage.setItem('4s_orders', JSON.stringify(res.orders));
      } else showToast(res.error||'Failed to load orders','bad');
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doLogin(username, password) {
    setLoading(true);
    try {
      const res = await apiGet('login', { username, password });
      if (res.ok) {
        setUser(res.user);
        localStorage.setItem('4s_user', JSON.stringify(res.user));
        showToast('Welcome, '+res.user.name+'!');
        nav('home');
      } else {
        showToast(res.error||'Login failed','bad');
      }
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doSaveOrder(draft) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'saveOrder', order:{ ...draft, totalWithTax: orderTotals(draft).total } });
      if (res.ok) {
        const saved = {...draft, no: res.orderNo, internalNo: res.internalNo};
        setOrder(saved);
        showToast('Order '+res.orderNo+' saved ✓');
        return saved;
      } else {
        showToast(res.error||'Save failed','bad');
        return null;
      }
    } catch(e) {
      showToast('No internet — order saved on this phone, will sync automatically','warn');
      const q = JSON.parse(localStorage.getItem('4s_queue')||'[]');
      q.push({...draft, _queuedAt: Date.now()});
      localStorage.setItem('4s_queue', JSON.stringify(q));
      return draft;
    } finally { setLoading(false); }
  }

  // Re-send any orders that were saved while offline
  async function flushQueue() {
    let q;
    try { q = JSON.parse(localStorage.getItem('4s_queue')||'[]'); } catch { q = []; }
    if (!q.length) return;
    const remaining = [];
    for (const draft of q) {
      try {
        const res = await apiPost({ action:'saveOrder', order:{ ...draft, totalWithTax: orderTotals(draft).total } });
        if (!res || !res.ok) remaining.push(draft);
      } catch { remaining.push(draft); }
    }
    localStorage.setItem('4s_queue', JSON.stringify(remaining));
    const sent = q.length - remaining.length;
    if (sent > 0) { showToast(sent+' pending order'+(sent>1?'s':'')+' synced ✓'); try { loadOrders(); } catch {} }
  }

  async function doUpdateWON(orderNo, internalNo, won) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'updateWON', orderNo, internalNo, won, updatedBy: user?.name });
      if (res.ok) { showToast('WON updated ✓'); loadOrders(); return true; }
      else { showToast(res.error||'Update failed','bad'); return false; }
    } catch(e) { showToast(e.message,'bad'); return false; }
    finally { setLoading(false); }
  }

  function doSignOut() {
    localStorage.removeItem('4s_user');
    setUser(null);
    setOrder(BLANK_ORDER());
    setOrders([]);
    nav('login');
  }

  const ctx = { user, items, priceItems, orders, syncedAt, priceSyncedAt, priceSyncError, order, setOrder, selOrder, setSelOrder, loading, showToast, nav, back, doLogin, doSaveOrder, doUpdateWON, doSignOut, syncStock, syncPriceList, loadOrders };

  const screens = {
    loading: <LoadingScreen/>,
    setup:   <SetupScreen   ctx={ctx}/>,
    login:   <LoginScreen   ctx={ctx}/>,
    home:    <HomeScreen    ctx={ctx}/>,
    search:  <SearchScreen  ctx={ctx}/>,
    order:   <OrderFormScreen ctx={ctx}/>,
    pdf:     <PDFPreviewScreen ctx={ctx}/>,
    history: <HistoryScreen ctx={ctx}/>,
    won:     <WONUpdateScreen ctx={ctx}/>,
    settings:<SettingsScreen ctx={ctx}/>,
  };

  return (
    <div className="app-shell">
      {screens[screen] || screens.home}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {loading && <div style={{position:'fixed',top:16,right:16,zIndex:9998}}><Spinner size={22}/></div>}
    </div>
  );
}

function LoadingScreen() {
  return <div className="screen" style={{alignItems:'center',justifyContent:'center',gap:12,background:T.paper}}><Spinner size={28}/><div style={{fontSize:13,color:T.ink4}}>Loading…</div></div>;
}

// ─── Setup ──────────────────────────────────────────────────
function SetupScreen({ctx}) {
  const [url,setUrl] = useState(localStorage.getItem('4s_api_url')||'');
  function save() {
    if (!url.trim()) return ctx.showToast('Paste the Apps Script URL first','bad');
    localStorage.setItem('4s_api_url', url.trim());
    ctx.showToast('API URL saved ✓');
    ctx.nav('login');
  }
  return (
    <div className="screen" style={{padding:'40px 24px',background:T.paper}}>
      <FSLogo size={36}/>
      <h1 style={{fontSize:28,fontWeight:700,letterSpacing:-1,lineHeight:1.1,marginTop:24,color:T.ink}}>First-time setup</h1>
      <p style={{fontSize:13,color:T.ink3,lineHeight:1.6,marginTop:8}}>Paste your Google Apps Script Web App URL below. You only need to do this once per device.</p>
      <div style={{marginTop:24,background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,overflow:'hidden'}}>
        <div style={{padding:'12px 14px',borderBottom:`1px solid ${T.line}`}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:.8,textTransform:'uppercase',marginBottom:6}}>APPS SCRIPT URL</div>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={{width:'100%',border:'none',outline:'none',fontSize:13,fontFamily:T.mono,color:T.ink,padding:0,background:'transparent'}}/>
        </div>
      </div>
      <div style={{marginTop:16,padding:14,background:T.greenSoft,border:`1px solid ${T.greenLine}`,borderRadius:8,fontSize:12,color:T.ink3,lineHeight:1.6}}>
        <b style={{color:T.green}}>How to get this URL:</b><br/>
        1. Open script.google.com → paste Code.gs<br/>
        2. Run → ensureSheets (one-time)<br/>
        3. Deploy → New deployment → Web app<br/>
        4. Execute as: Me | Anyone can access<br/>
        5. Copy the URL here
      </div>
      <div style={{marginTop:20}}>
        <Btn primary full size="lg" onClick={save}>Save & Continue →</Btn>
      </div>
      <div style={{marginTop:12,textAlign:'center'}}>
        <span onClick={()=>ctx.nav('login')} style={{fontSize:12,color:T.ink4,cursor:'pointer',textDecoration:'underline'}}>Skip (use existing URL)</span>
      </div>
    </div>
  );
}

// ─── Login ──────────────────────────────────────────────────
function LoginScreen({ctx}) {
  const [username,setUsername] = useState('');
  const [password,setPassword] = useState('');
  const [show,setShow]         = useState(false);
  const [lastError,setLastError] = useState('');
  function submit(e) {
    e.preventDefault();
    if(username&&password) {
      setLastError('');
      ctx.doLogin(username,password).catch(()=>{});
    }
  }
  // Capture login errors from toast via a hook workaround — we monkey-patch showToast
  const wrappedLogin = async (u,p) => {
    setLastError('');
    try {
      const res = await apiGet('login', { username: u, password: p });
      if (res.ok) {
        ctx.doLogin(u, p);
      } else {
        setLastError(res.error || 'Login failed');
        ctx.showToast(res.error || 'Login failed', 'bad');
      }
    } catch(e) {
      setLastError(e.message);
      ctx.showToast(e.message, 'bad');
    }
  };
  function handleSubmit(e) {
    e.preventDefault();
    if (username && password) wrappedLogin(username.trim(), password);
  }
  return (
    <div className="screen" style={{background:T.paper}}>
      <div style={{flex:1,padding:'52px 28px 0',display:'flex',flexDirection:'column'}}>
        <FSLogo size={36}/>
        <div style={{marginTop:28,fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1.2,textTransform:'uppercase'}}>STAFF SIGN-IN</div>
        <h1 style={{fontSize:28,fontWeight:700,lineHeight:1.05,letterSpacing:-1,margin:'8px 0 6px',color:T.ink}}>Order desk.<br/><span style={{color:T.green}}>Patia store.</span></h1>
        <p style={{fontSize:12,color:T.ink3,lineHeight:1.5,marginBottom:20}}>Sales team only. Use the credentials from the <b>APP_ORDERING_CREDS</b> tab in the OPS sheet.</p>
        <form onSubmit={handleSubmit}>
          <div style={{background:'#fff',border:`1px solid ${lastError?T.bad:T.line}`,borderRadius:8,overflow:'hidden'}}>
            <div style={{padding:'12px 14px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:.8,textTransform:'uppercase',marginBottom:4}}>USERNAME</div>
              <input value={username} onChange={e=>{setUsername(e.target.value);setLastError('');}}
                autoCapitalize="none" autoCorrect="off" spellCheck="false"
                placeholder="e.g. admin or swati.patia"
                style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:16,color:T.ink,padding:0,background:'transparent'}}/>
            </div>
            <div style={{padding:'12px 14px',position:'relative'}}>
              <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:.8,textTransform:'uppercase',marginBottom:4}}>PASSWORD</div>
              <input type={show?'text':'password'} value={password} onChange={e=>{setPassword(e.target.value);setLastError('');}}
                placeholder="••••••••"
                style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:16,color:T.ink,padding:0,background:'transparent'}}/>
              <span onClick={()=>setShow(!show)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:11,fontFamily:T.sans,fontWeight:600,color:T.green,cursor:'pointer'}}>{show?'HIDE':'SHOW'}</span>
            </div>
          </div>

          {/* Error with diagnostic hint */}
          {lastError && (
            <div style={{marginTop:8,padding:'10px 12px',background:T.badSoft,border:`1px solid ${T.bad}`,borderRadius:6}}>
              <div style={{fontSize:12,fontWeight:700,color:T.bad,marginBottom:2}}>Sign-in failed</div>
              <div style={{fontSize:11,color:T.ink3,lineHeight:1.5}}>{lastError}</div>
            </div>
          )}

          {/* Credentials hint */}
          <div style={{marginTop:10,padding:'10px 12px',background:T.paper2,borderRadius:6,border:`1px solid ${T.line}`}}>
            <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:.5,marginBottom:5}}>CREDENTIALS</div>
            <div style={{fontSize:11,color:T.ink3,lineHeight:1.6}}>
              Username &amp; password are set by your manager in the <b>APP_ORDERING_CREDS</b> tab of the OPS Google Sheet.
            </div>
          </div>

          <div style={{marginTop:14}}>
            <Btn primary full size="lg" type="submit" disabled={!username||!password}>Sign in →</Btn>
          </div>
        </form>
      </div>
      <div style={{padding:'16px 28px 28px',textAlign:'center'}}>
        <span onClick={()=>ctx.nav('setup')} style={{fontSize:12,color:T.ink4,cursor:'pointer',textDecoration:'underline'}}>Change API URL</span>
      </div>
    </div>
  );
}
