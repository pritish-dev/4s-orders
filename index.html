// ─── Stock Search ────────────────────────────────────────────
function SearchScreen({ctx}) {
  const {items, priceItems, syncedAt, priceSyncedAt, nav, back, order, setOrder, syncPriceList, loading} = ctx;
  const [q,   setQ]   = useState('');
  const [cat, setCat] = useState('all');
  const cartCount = (order.items||[]).reduce((s,i)=>s+(i.qty||0),0);

  const hasPriceList = priceItems && priceItems.length > 0;
  const {priceSyncError} = ctx;

  // Only use price list items — never fall back to stock items for ordering.
  // Memoised so it is built once per data sync, NOT on every keystroke, and each
  // item carries a pre-lowercased search string so fuzzy matching stays cheap.
  const allItems = React.useMemo(() => {
    if (!hasPriceList) return [];
    const stockMap = {};
    (items||[]).forEach(it => { stockMap[it.code] = it; });
    return priceItems.map(pi => {
      const si = stockMap[pi.code];
      const it = si ? {...pi, stock:si.stock||[], mrp:si.mrp||pi.mrp||0, cpl:si.cpl||pi.cpl||0} : {...pi};
      it._s = ([it.cat, it.item, it.name].filter(Boolean).join(' ')).toLowerCase();
      it._c = (it.code || '').toLowerCase();
      return it;
    });
  }, [priceItems, items, hasPriceList]);

  // Categories + per-category counts, computed once per data change.
  const uniqueCats = React.useMemo(() => [...new Set(allItems.map(i => i.cat).filter(Boolean))].sort(), [allItems]);
  const catCounts  = React.useMemo(() => {
    const m = {}; allItems.forEach(i => { if (i.cat) m[i.cat] = (m[i.cat]||0) + 1; }); return m;
  }, [allItems]);

  React.useEffect(() => {
    const valid = ['all', ...uniqueCats];
    if (!valid.includes(cat)) setCat('all');
  }, [allItems.length]);

  const CATS = React.useMemo(() => [
    { key: 'all', label: 'All' + (allItems.length > 0 ? ' · ' + allItems.length : '') },
    ...uniqueCats.map(c => ({ key: c, label: c + ' · ' + (catCounts[c]||0) })),
  ], [allItems.length, uniqueCats, catCounts]);

  const bycat = React.useMemo(() => cat === 'all' ? allItems : allItems.filter(i => i.cat === cat), [allItems, cat]);

  // Defer the query for the heavy filtering so each keystroke paints instantly
  // (the input stays responsive; React runs the search in the background).
  const deferredQ = React.useDeferredValue(q);

  const {filtered, searchMode} = React.useMemo(() => {
    const { results, mode } = fuzzySearch(bycat, deferredQ);
    // Show in-stock items first, then out-of-stock, then Made-To-Order. Stable
    // within each tier so search relevance / browse order is preserved.
    const sorted = results
      .map((it, i) => ({ it, i }))
      .sort((a, b) => (availabilityTier(a.it) - availabilityTier(b.it)) || (a.i - b.i))
      .map(x => x.it);
    return { filtered: sorted, searchMode: mode };
  }, [bycat, deferredQ]);

  // Cap what we actually render so a broad browse / match never mounts thousands
  // of rows (the cause of scroll + typing jank). Extras are one tap away by
  // narrowing the search or category.
  const RENDER_CAP = 80;
  const shownItems = filtered.length > RENDER_CAP ? filtered.slice(0, RENDER_CAP) : filtered;

  function handleInput(e) { setQ(e.target.value); }

  function addToOrder(item) {
    const disc      = '';                       // per-item discount starts blank
    const basePrice = item.mrp||item.cpl||0;
    const unitPrice = basePrice;                // no discount applied until entered
    // "Change of Code" items: the order form / PDF must use the Alt Item code
    // even though the price list still lists the old code.
    const effCode   = item.altCode || item.code;
    const exists    = (order.items||[]).findIndex(x=>x.code===effCode);
    let newItems;
    if (exists>=0) {
      newItems = order.items.map((x,idx)=>idx===exists?{...x,qty:x.qty+1,total:(x.qty+1)*(x.unitPrice||x.mrp||x.cpl||0)}:x);
    } else {
      newItems = [...(order.items||[]),{
        code:effCode, priceCode:item.code, name:item.name, cat:item.cat, item:item.item||'',
        qty:1, mrp:item.mrp||item.cpl||0, cpl:item.cpl||item.mrp||0,
        unitPrice, total:unitPrice, disc,
        ageing:false, sweetner:false,
        discontinued:!!item.discontinued, discSince:item.discSince||'',
        branch:((item.stock||[]).filter(s=>s.q>0)[0]||{}).b||'',
        inStock:(item.stock||[]).reduce((s,x)=>s+x.q,0),
      }];
    }
    setOrder({...order,items:newItems});
    const totalStock = (item.stock||[]).reduce((s,x)=>s+x.q,0);
    ctx.showToast(totalStock===0?item.name.slice(0,22)+'… added (OOS)':item.name.slice(0,30)+'… added', totalStock===0?'warn':'ok');
  }

  return (
    <div className="screen">
      <div style={{flexShrink:0}}>
        <StockRibbon syncedAt={syncedAt}/>
        <div style={{padding:'14px 18px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
            <button onClick={back} title="Back" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>{Icon.back()}</button>
            <div style={{minWidth:0}}>
              <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>
                {hasPriceList
                  ? <>PRICE LIST · {allItems.length} SKUs {priceSyncedAt&&<span style={{color:T.ok}}>· synced {new Date(priceSyncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>}</>
                  : <span style={{color:T.warn,fontWeight:700}}>PRICE LIST NOT LOADED</span>}
              </div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>{cartCount>0?'Add item':'Search items'}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
            {cartCount>0&&<Btn size="sm" primary onClick={()=>nav('order')} icon={Icon.doc('#fff',15)}>Order · {cartCount}</Btn>}
          </div>
        </div>

        {/* Price list not loaded — prominent sync banner */}
        {!hasPriceList && (() => {
          const isSetup    = priceSyncError && priceSyncError.startsWith('SETUP_NEEDED');
          const isRedeploy = priceSyncError && priceSyncError.startsWith('REDEPLOY_NEEDED');
          const isNoUrl    = priceSyncError && priceSyncError.startsWith('NO_URL');
          const bg   = priceSyncError ? T.badSoft  : T.warnSoft;
          const bdr  = priceSyncError ? T.bad      : T.warn;
          const titC = priceSyncError ? T.bad      : T.warn;
          return (
            <div style={{margin:'0 18px 10px',padding:'14px 16px',background:bg,border:`1.5px solid ${bdr}`,borderRadius:8}}>
              {isSetup ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:8}}>⚙ One-time setup needed</div>
                  <div style={{fontSize:12,color:T.ink2,lineHeight:1.8,marginBottom:10}}>
                    In your OPS Google Sheet, create a tab named <b>Price_Lists</b> with these two columns:<br/>
                    <span style={{fontFamily:T.mono,fontSize:11,background:'#fff',padding:'2px 6px',borderRadius:3,display:'inline-block',marginTop:4}}>
                      Tab Name &nbsp;|&nbsp; Category
                    </span><br/><br/>
                    List each price list tab name and its category label, e.g.:<br/>
                    <span style={{fontFamily:T.mono,fontSize:11,background:'#fff',padding:'6px 8px',borderRadius:3,display:'block',marginTop:4,lineHeight:2}}>
                      HF &nbsp;&nbsp;&nbsp;&nbsp;| Home Furniture &amp; Storage<br/>
                      HS &nbsp;&nbsp;&nbsp;&nbsp;| Home Furniture &amp; Storage<br/>
                      Mattress | Mattress
                    </span><br/>
                    Then redeploy your Apps Script (Deploy → Manage → Edit → New version), and tap Sync below.
                  </div>
                </>
              ) : isRedeploy ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:6}}>Apps Script needs redeployment</div>
                  <div style={{fontSize:12,color:T.ink2,lineHeight:1.7,marginBottom:10}}>
                    Open your Apps Script project → Deploy → Manage deployments → click the pencil icon → choose <b>New version</b> → Deploy.<br/>
                    The URL stays the same.
                  </div>
                </>
              ) : isNoUrl ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.warn,marginBottom:6}}>Apps Script URL not saved</div>
                  <div style={{fontSize:12,color:T.ink3,lineHeight:1.6,marginBottom:10}}>Go to <b>Me → Settings</b>, paste your Apps Script deployment URL, and tap Save URL.</div>
                </>
              ) : priceSyncError ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:6}}>Sync failed</div>
                  <div style={{fontSize:11,color:T.ink2,marginBottom:10,lineHeight:1.6,whiteSpace:'pre-wrap',fontFamily:T.mono,background:'#fff',borderRadius:4,padding:'8px 10px',border:`1px solid ${bdr}`}}>{priceSyncError.replace(/^[A-Z_]+: /,'')}</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:titC,marginBottom:6}}>Price list not loaded yet</div>
                  <div style={{fontSize:12,color:T.ink3,marginBottom:10,lineHeight:1.5}}>
                    Make sure your Apps Script URL is saved in <b>Me → Settings</b>, then tap below.
                  </div>
                </>
              )}
              <Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncPriceList} disabled={loading}>
                {loading ? 'Loading…' : priceSyncError ? 'Retry sync' : 'Load price list now'}
              </Btn>
            </div>
          );
        })()}

        {/* Search input */}
        {hasPriceList && (
          <div style={{padding:'0 18px 10px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#fff',border:`1.5px solid ${T.green}`,borderRadius:8,boxShadow:`0 0 0 4px ${T.greenSoft}`}}>
              {Icon.search(T.ink3)}
              <input
                value={q}
                onChange={handleInput}
                onInput={handleInput}
                placeholder="Search by name, code or category…"
                style={{flex:1,border:'none',outline:'none',fontSize:15,color:T.ink,background:'transparent'}}
              />
              {q&&<span onClick={()=>setQ('')} style={{cursor:'pointer',lineHeight:1,padding:'0 2px'}}>{Icon.close(T.ink4)}</span>}
              {q&&<span style={{fontFamily:T.mono,fontSize:11,color:T.ink4,flexShrink:0}}>{filtered.length}</span>}
            </div>
          </div>
        )}

        {/* Category chips */}
        {hasPriceList && (
          <div style={{padding:'0 18px 10px',display:'flex',gap:6,overflowX:'auto'}}>
            {CATS.map(c=>(
              <span key={c.key} onClick={()=>setCat(c.key)} style={{
                padding:'5px 13px', borderRadius:99, whiteSpace:'nowrap', cursor:'pointer', flexShrink:0,
                background:c.key===cat?T.ink:'#fff', color:c.key===cat?'#fff':T.ink2,
                border:`1px solid ${c.key===cat?T.ink:T.line}`, fontSize:12, fontWeight:600,
              }}>{c.label}</span>
            ))}
          </div>
        )}
      </div>

      <div className="scroll" style={{background:'#fff',borderTop:`1px solid ${T.line}`}}>
        {/* Search result banners — shown for every mode so user knows what happened */}
        {hasPriceList && q && searchMode==='exact' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:'#eaf6ef',borderBottom:`1px solid #b6dfc5`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.ok,fontWeight:600}}>✓ {filtered.length} exact {filtered.length===1?'match':'matches'} for "{q}"</span>
          </div>
        )}
        {hasPriceList && q && searchMode==='near' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:T.warnSoft,borderBottom:`1px solid #e6cc95`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.warn,fontWeight:600}}>~ {filtered.length} partial {filtered.length===1?'match':'matches'} for "{q}"</span>
            <span style={{fontSize:10,color:T.ink4}}>not all words found</span>
          </div>
        )}
        {hasPriceList && q && searchMode==='far' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:T.badSoft,borderBottom:`1px solid #e2b8b0`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.bad,fontWeight:600}}>⚠ Loose match — "{q}" not found exactly</span>
            <span style={{fontSize:10,color:T.ink4}}>showing closest</span>
          </div>
        )}

        {shownItems.map((it,fi)=>{
          // Only warehouses that actually have availability are shown.
          const availStock = (it.stock||[]).filter(s=>s.q>0);
          const stockTotal = availStock.reduce((s,x)=>s+x.q,0);
          const hasStock   = (it.stock||[]).length > 0;
          const mto        = isMTOItem(it);
          const oos        = hasStock && stockTotal === 0 && !mto;
          const cplBase = Number(it.cpl) || Number(it.mrp) || 0;
          // MRP shown to the user = list price (CPL) with 18% GST already added in.
          const cpl = cplBase > 0 ? Math.round(cplBase * (1 + GST_RATE)) : 0;
          return (
            <div key={(it.code||it.name||'')+'|'+(it.sheet||'')+'|'+fi} style={{padding:'12px 18px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  {/* LN Description — always the primary product name */}
                  <div style={{fontSize:13,fontWeight:600,color:T.ink,lineHeight:1.35,marginBottom:4}}>{it.name}</div>
                  {/* Tags row: ITEM_GROUP category + item code + sheet + OOS */}
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:4}}>
                    {it.item && <Pill tone="neutral" size="sm" style={{fontWeight:600}}>{it.item}</Pill>}
                    {/* Always show the correct code to order — the Alt code replaces
                        the old one for discontinued "change of code" items. */}
                    {(it.altCode||it.code) && <span style={{fontFamily:T.mono,fontSize:10,color:it.altCode?T.green:T.ink4,fontWeight:700}}>{it.altCode||it.code}</span>}
                    <Pill tone="neutral" size="sm">{(it.sheet||it.cat||'').toUpperCase()}</Pill>
                    {oos && <Pill tone="bad" size="sm">OUT OF STOCK</Pill>}
                    {it.discontinued && <Pill tone="bad" size="sm">DISCONTINUED{it.discSince?' since '+it.discSince:''}</Pill>}
                    {it.altCode && <Pill tone="warn" size="sm">REPLACES {it.code}</Pill>}
                  </div>
                  {/* Extra info (e.g. mattress thickness) */}
                  {it.extra && <div style={{fontSize:10,color:T.ink4,marginBottom:4}}>{it.extra}</div>}
                  {/* Stock chips — only warehouses that have stock available */}
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    {availStock.length>0
                      ? availStock.map(s=><StockChip key={s.b} branch={s.b} count={s.q} low={s.q<3}/>)
                      : <span style={{fontSize:10,color:T.ink4}}>{mto?'Made to order':(hasStock?'No stock available':'Sync stock to see availability')}</span>}
                  </div>
                </div>
                {/* Price + Add */}
                <div style={{flexShrink:0,textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,paddingLeft:6}}>
                  <div>
                    <div style={{fontSize:9,color:T.ink4,fontWeight:700,letterSpacing:.5,textAlign:'right'}}>MRP</div>
                    <div style={{fontFamily:T.mono,fontSize:14,fontWeight:700,color:cpl>0?T.ink:T.ink4}}>
                      {cpl > 0 ? '₹' + cpl.toLocaleString('en-IN') : '—'}
                    </div>
                    {cpl > 0 && <div style={{fontSize:8,color:T.ink4,fontWeight:600,textAlign:'right',marginTop:1}}>incl. 18% GST</div>}
                  </div>
                  <button onClick={()=>addToOrder(it)} style={{height:32,padding:'0 12px',borderRadius:6,background:oos?T.warn:T.green,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                    {Icon.plus('#fff',14)}{oos?'Book':'Add'}
                  </button>
                </div>
              </div>
            </div>
          );
        })}

        {/* More results exist than we render — nudge the user to narrow down. */}
        {filtered.length>shownItems.length&&(
          <div style={{padding:'12px 18px',textAlign:'center',fontSize:12,color:T.ink4,background:T.paper}}>
            Showing first {shownItems.length} of {filtered.length} — {q?'refine your search':'pick a category or search'} to see the rest.
          </div>
        )}

        {/* Empty states */}
        {hasPriceList&&filtered.length===0&&q&&(
          <div style={{padding:40,textAlign:'center'}}>
            <div style={{fontSize:15,fontWeight:700,color:T.bad,marginBottom:8}}>No match found</div>
            <div style={{fontSize:13,color:T.ink4,lineHeight:1.6,marginBottom:16}}>"{q}" is not in the {cat!=='all'?cat+' ':''}price list.</div>
            <div style={{fontSize:12,color:T.ink4,lineHeight:1.7}}>
              <b>Tips:</b><br/>
              • Try fewer words: <i>osiris</i> instead of <i>osiris media unit blue</i><br/>
              • Use the product series name or item code<br/>
              • Switch category (All / Home Furniture & Storage / Mattress)
            </div>
          </div>
        )}
        {hasPriceList&&filtered.length===0&&!q&&(
          <div style={{padding:32,textAlign:'center',fontSize:13,color:T.ink4}}>No items in this category.</div>
        )}
        <div style={{height:8}}/>
      </div>
      {cartCount>0&&(
        <div onClick={()=>nav('order')} style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'12px 16px',background:T.green,color:'#fff',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {Icon.doc('#fff',18)}
            <span style={{fontSize:14,fontWeight:700}}>{cartCount} item{cartCount>1?'s':''} in this order</span>
          </div>
          <span style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>Continue booking →</span>
        </div>
      )}
      <BottomNav screen="search" nav={nav}/>
    </div>
  );
}

// ─── Order Form ──────────────────────────────────────────────
function OrderFormScreen({ctx}) {
  const {order,setOrder,nav,back,user,doSaveOrder,doDeleteOrder} = ctx;
  const o = order;
  // Admins can permanently delete an already-saved order straight from the edit screen.
  const isAdmin = normRole(user?.role) === 'admin';
  // Sales team can only EDIT a saved order's WON, money-receipt no/date and its
  // delivery status. Admins may edit everything; a brand-new order (no o.no yet)
  // is always fully editable so the booking can be filled in.
  const restricted = !!o.no && !isAdmin;
  // Measurement entry unit — 'cm' (default) or 'ft' (feet + inches). Only the
  // input changes; every value is stored in cm on the order and the Google sheet.
  const [measUnit,setMeasUnit] = React.useState('cm');
  async function handleDelete() {
    if(!isAdmin || !o.no) return;
    if(!window.confirm('Permanently delete order '+(o.no||'')+' for '+(o.customer||'this customer')+'? This removes it from the CRM sheet and cannot be undone.')) return;
    const ok = await doDeleteOrder(o.no, o.internalNo);
    if(ok){ setOrder(BLANK_ORDER()); nav('history'); }
  }
  const setF = (k,v) => setOrder(prev=>({...prev,[k]:v}));
  const {itemsSubtotal, orderDiscPct, orderDiscAmt, taxable, cgst, sgst, total, earnest, balance} = orderTotals(o);

  // Manager / Admin see cost + margin; Sales does not.
  const priv        = hasManagerAccess(user);
  const totalCost   = (o.items||[]).reduce((s,it)=>s+((Number(it.cpl)||Number(it.mrp)||0)*(it.qty||0)),0);
  // Margin compares the pre-GST selling value (tax carved out) against pre-GST cost.
  const totalMargin = taxable - totalCost;

  // A sofa (incl. Upmods modular sofa) or a modular wardrobe (Kalista /
  // Kreation X2 / X3) in the cart makes its measurements mandatory.
  const hasSofa     = (o.items||[]).some(isSofaItem);
  const hasWardrobe = (o.items||[]).some(isWardrobeItem);
  // Number of modular-wardrobe line items — used to seed the "how many modular
  // furnitures" picker the first time the block is shown.
  const wardrobeItemCount = (o.items||[]).filter(isWardrobeItem).length;
  const AWARENESS  = ['Social Media','Whatsapp','Newspaper','Friends & Relatives','Website','Others'];
  const PATTERNS   = ['1st Time','2nd Time','3rd Time','More than 3'];
  const PURCHASING = ['New Home','Renovation','Rented Home','Other'];
  const LIFT_TYPES = ['Standard Lift','Goods Lift','Service Lift'];

  // A ground-floor delivery needs no staircase carry, so its measurements are
  // never required. Treat FLOOR values of 0 / G / GF / "Ground floor" /
  // "Groundfloor" (any spacing/casing) as ground floor.
  const isGroundFloor = (() => {
    const f = String(o.floor||'').toLowerCase().replace(/\s+/g,'');
    return f==='0' || f==='g' || f==='gf' || f==='groundfloor' || f==='ground';
  })();

  // Staircase measurements are only needed for a SOFA when there is NO lift AND
  // the delivery is above the ground floor.
  const needStaircase = hasSofa && o.liftAvailable==='No' && !isGroundFloor;

  // ── Multi-block measurement state ──────────────────────────────────────
  // Normalise older orders (single wardrobe scalars) into the wardrobes[] /
  // rooms[] / liftTypes[] arrays the UI now works with. Staircase stays a set of
  // order-level scalars (sofa-only, no-lift) — it is no longer per-furniture.
  React.useEffect(()=>{
    setOrder(prev=>{
      const patch={};
      if(!Array.isArray(prev.liftTypes)) patch.liftTypes = [];
      if(!Array.isArray(prev.rooms))     patch.rooms = [];
      if(!Array.isArray(prev.wardrobes)) {
        patch.wardrobes = (prev.wardrobeLength||prev.wardrobeWidth||prev.wardrobeHeight)
          ? [{name:'',length:prev.wardrobeLength||'',width:prev.wardrobeWidth||'',height:prev.wardrobeHeight||''}]
          : [];
      }
      return Object.keys(patch).length ? {...prev,...patch} : prev;
    });
  },[o.no]);

  // Pre-fill the Receipt No for a brand-new normal booking with the next number in
  // sequence (1, 2, 3 …). The field stays editable, so the salesperson can change
  // it; manual orders start blank and are typed in from the paper order.
  React.useEffect(()=>{
    if(!o.no && !o.manualOrder && !String(o.orderFormReceiptNo||'').trim()){
      setF('orderFormReceiptNo', String(nextReceiptNo(ctx.orders)));
    }
  },[o.no, o.manualOrder]);

  const liftTypes = Array.isArray(o.liftTypes) ? o.liftTypes : [];
  const wardrobes = Array.isArray(o.wardrobes) ? o.wardrobes : [];
  const rooms     = Array.isArray(o.rooms)     ? o.rooms     : [];

  function toggleLiftType(t){ setOrder(prev=>{ const cur=Array.isArray(prev.liftTypes)?prev.liftTypes:[]; return {...prev,liftTypes: cur.includes(t)?cur.filter(x=>x!==t):[...cur,t]}; }); }
  const BLANK_WARDROBE = ()=>({name:'',length:'',width:'',height:''});
  const BLANK_ROOM     = ()=>({name:'',width:'',height:'',depth:''});
  function setWardrobeCount(n){ setOrder(prev=>{ const cur=Array.isArray(prev.wardrobes)?prev.wardrobes.map(w=>({...w})):[]; const next=[]; for(let i=0;i<n;i++) next.push(cur[i]||BLANK_WARDROBE()); return {...prev,wardrobes:next}; }); }
  function setWardrobeField(idx,field,val){ setOrder(prev=>{ const arr=(Array.isArray(prev.wardrobes)?prev.wardrobes:[]).map(w=>({...w})); if(arr[idx]) arr[idx][field]=val; return {...prev,wardrobes:arr}; }); }
  function setRoomCount(n){ setOrder(prev=>{ const cur=Array.isArray(prev.rooms)?prev.rooms.map(r=>({...r})):[]; const next=[]; for(let i=0;i<n;i++) next.push(cur[i]||BLANK_ROOM()); return {...prev,rooms:next}; }); }
  function setRoomField(idx,field,val){ setOrder(prev=>{ const arr=(Array.isArray(prev.rooms)?prev.rooms:[]).map(r=>({...r})); if(arr[idx]) arr[idx][field]=val; return {...prev,rooms:arr}; }); }
  // Seed the modular-furniture and room blocks the first time they're shown when
  // a modular wardrobe is in the cart (sales can still change either count).
  React.useEffect(()=>{
    if(hasWardrobe && Array.isArray(o.wardrobes) && o.wardrobes.length===0) setWardrobeCount(Math.max(1,wardrobeItemCount));
    if(hasWardrobe && Array.isArray(o.rooms) && o.rooms.length===0) setRoomCount(1);
  },[hasWardrobe,wardrobeItemCount]);

  function removeItem(idx) { setOrder(prev=>({...prev,items:prev.items.filter((_,i)=>i!==idx)})); }
  function toggleScheme(idx,key) { setOrder(prev=>({...prev,items:prev.items.map((it,i)=>i===idx?{...it,[key]:!it[key]}:it)})); }
  function togglePattern(p) { setOrder(prev=>{ const cur=prev.purchasePattern||[]; return {...prev,purchasePattern: cur.includes(p)?cur.filter(x=>x!==p):[...cur,p]}; }); }
  function updateItemQty(idx,delta) {
    setOrder(prev=>({...prev,items:prev.items.map((it,i)=>{
      if(i!==idx) return it;
      const newQty = Math.max(1,it.qty+delta);
      const baseP = it.mrp||it.cpl||0;
      const up = it.unitPrice!==undefined ? it.unitPrice : Math.round(baseP*(1-(parseFloat(it.disc)||0)/100));
      return {...it,qty:newQty,unitPrice:up,total:newQty*up};
    })}));
  }

  async function handleSave() {
    if(!o.customer) return ctx.showToast('Customer name is required','bad');
    if(!o.phone)    return ctx.showToast('Phone number is required','bad');
    if(!isValidPhone(o.phone)) return ctx.showToast('Enter a valid 10-digit mobile number','bad');
    if(o.alt && !isValidPhone(o.alt)) return ctx.showToast('Alt. phone is not a valid mobile number','bad');
    if(!o.email)    return ctx.showToast('E-mail is required','bad');
    if(!isValidEmail(o.email)) return ctx.showToast('Enter a valid email address','bad');
    if(!o.delivery) return ctx.showToast('Delivery address is required','bad');
    if(!o.floor)    return ctx.showToast('Floor is required','bad');
    if(!o.landmark) return ctx.showToast('Nearest landmark is required','bad');
    if(!o.liftAvailable) return ctx.showToast('Select whether a lift is available','bad');
    // Lift type is mandatory when a lift is available — at least one must be picked.
    if(o.liftAvailable==='Yes' && (!Array.isArray(o.liftTypes)||o.liftTypes.length===0)) return ctx.showToast('Select the lift type (Standard / Goods / Service)','bad');
    // Delivery contact person required when the billing & delivery addresses differ
    const addrDiffer = (o.billing||'').trim() && (o.delivery||'').trim() && (o.billing||'').trim()!==(o.delivery||'').trim();
    if(addrDiffer && (!o.contactPersonName||!o.contactNumber)) return ctx.showToast('Delivery Contact Person Name & Number are required (billing & delivery addresses differ)','bad');
    if(o.contactNumber && !isValidPhone(o.contactNumber)) return ctx.showToast('Contact number is not a valid mobile number','bad');
    if(!o.items||o.items.length===0) return ctx.showToast('Add at least one item','bad');
    // SI No is mandatory for every order (printed as the Sl part of the PDF order no).
    if(!o.slNo||!String(o.slNo).trim()) return ctx.showToast('SI No is required','bad');
    // Receipt No is mandatory — normal orders come pre-filled with the next number
    // in sequence (editable); manual orders carry the number from the paper order.
    if(!o.orderFormReceiptNo||!String(o.orderFormReceiptNo).trim()) return ctx.showToast('Receipt No is required','bad');
    // Money Receipt No is mandatory on the order form.
    if(!o.moneyReceipts||!o.moneyReceipts[0]||!String(o.moneyReceipts[0].no||'').trim()) return ctx.showToast('Money Receipt No is required','bad');
    // Manual orders must carry the actual (settable) booking date.
    if(o.manualOrder && !o.date) return ctx.showToast('Set the Booking Date for the manual order','bad');
    // Mandatory customer-profiling fields (DOB & anniversary are now optional)
    if(!o.awareness)    return ctx.showToast('Select the Lead Source','bad');
    if(!o.purchasePattern||o.purchasePattern.length===0) return ctx.showToast('Select the purchase pattern','bad');
    if(!o.purchasingFor) return ctx.showToast('Select what they are purchasing for','bad');
    // Sofa: sofa dims + entry-door site measurement are mandatory
    if(hasSofa && (!o.sofaWidth||!o.sofaHeight||!o.sofaDepth)) return ctx.showToast('Enter Sofa width, height & depth (mandatory for sofas)','bad');
    if(hasSofa && (!o.entryDoorWidth||!o.entryDoorHeight)) return ctx.showToast('Enter Entry Door width & height (required for sofa orders)','bad');
    // Staircase measurement — required only for a SOFA with NO lift:
    // staircase width + the landing area's length / width / depth.
    if(needStaircase && (!o.staircaseWidth||!o.landingLength||!o.landingWidth||!o.landingDepth)) return ctx.showToast('Enter Staircase width & the landing area length/width/depth (required for a sofa with no lift)','bad');
    // Modular wardrobe (Kalista / Kreation X2 / X3): every furniture block needs its
    // wardrobe dims, and every room block needs its dims — both are mandatory.
    if(hasWardrobe){
      if(!wardrobes.length) return ctx.showToast('Add at least one modular furniture measurement','bad');
      for(let i=0;i<wardrobes.length;i++){ const w=wardrobes[i];
        if(!w.length||!w.width||!w.height) return ctx.showToast(`Enter length, width & height for Modular Furniture ${i+1}`,'bad');
      }
      if(!rooms.length) return ctx.showToast('Add at least one room measurement (mandatory for modular furniture)','bad');
      for(let i=0;i<rooms.length;i++){ const r=rooms[i];
        if(!r.name||!(r.name||'').trim()) return ctx.showToast(`Enter the room name for Room ${i+1}`,'bad');
        if(!r.width||!r.height||!r.depth) return ctx.showToast(`Enter width, height & depth for Room ${i+1}`,'bad');
      }
    }
    // Lead Source is now the awareness dropdown — keep the OPS "Source" column in sync
    const saved = await doSaveOrder(withMeasurements({...o,salesExec:o.salesExec||user?.name||'',source:o.awareness||o.source||'',followUp:o.followUp||followUpFromDelivery(o.plannedDly)}));
    if(saved) { setOrder(saved); nav('pdf'); }
  }

  // Mirror the first modular-furniture block onto the legacy scalar wardrobe
  // fields so the existing WARDROBE sheet columns and any old readers stay
  // populated. Staircase is already order-level, so it needs no mirroring.
  function withMeasurements(ord){
    const ws = Array.isArray(ord.wardrobes)?ord.wardrobes:[];
    const w0 = ws[0]||{};
    return {...ord,
      wardrobeLength:w0.length||'', wardrobeWidth:w0.width||'', wardrobeHeight:w0.height||'',
    };
  }

  // Save whatever has been filled so far (no strict validation) so the order
  // lands in history and any teammate can reopen and continue it later.
  async function handleSaveDraft() {
    if(!o.customer) return ctx.showToast('Enter at least the customer name to save a draft','bad');
    if(!o.items||o.items.length===0) return ctx.showToast('Add at least one item to save a draft','bad');
    const saved = await doSaveOrder(withMeasurements({...o,salesExec:o.salesExec||user?.name||'',source:o.awareness||o.source||'',followUp:o.followUp||followUpFromDelivery(o.plannedDly)}));
    if(saved) { setOrder(saved); ctx.showToast('Draft saved — you can reopen it from Orders','ok'); }
  }

  // Sales-team restricted edit: only WON, money receipts + dates, and delivery
  // status are editable. Everything else stays read-only (admins get the full form).
  async function handleRestrictedSave(){
    const saved = await doSaveOrder(withMeasurements({...o,salesExec:o.salesExec||user?.name||''}));
    if(saved){ setOrder(saved); ctx.showToast('Order updated ✓','ok'); nav('history'); }
  }
  const setMRestricted=(i,field,val)=>setOrder(prev=>{const arr=(prev.moneyReceipts||[{no:'',date:''},{no:'',date:''},{no:'',date:''}]).map(x=>({...x})); while(arr.length<3)arr.push({no:'',date:''}); arr[i]={...arr[i],[field]:val}; return {...prev,moneyReceipts:arr,receiptNo: field==='no'&&i===0?val:prev.receiptNo}; });
  if(restricted){
    return (
      <div className="screen">
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:T.paper,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
          <button onClick={back} title="Back" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
          <button onClick={()=>nav('home')} title="Home" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.home(T.ink2,18)}</button>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:-0.4}}>Update order</div>
            <div style={{fontSize:10,color:T.ink4,fontFamily:T.mono}}>{o.no}</div>
          </div>
        </div>
        <div className="scroll">
          {/* Read-only order summary */}
          <div style={{padding:'12px 14px',background:'#fff',borderBottom:`1px solid ${T.line}`}}>
            <div style={{fontSize:16,fontWeight:700}}>{o.customer||'—'}</div>
            <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,marginTop:2}}>{o.phone||''} · {o.date||''}</div>
            <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,marginTop:2}}>Order No (Sl / Receipt): {(o.slNo||o.internalNo||'—')} / {(o.orderFormReceiptNo||o.internalNo||'—')}</div>
          </div>
          <div style={{padding:'9px 14px',background:T.warnSoft,color:T.warn,fontSize:11,fontWeight:600,lineHeight:1.5}}>
            Sales access — you can update the <b>WON (Godrej SO No)</b>, <b>Money Receipt No &amp; date</b> and the <b>Delivery Status</b>. Other fields can be changed by an admin.
          </div>
          <SectionHead n="01" label="Godrej SO / WON"/>
          <Field label="WON (Godrej SO No)" value={o.won} onChange={v=>setF('won',v)} mono hint="Godrej SO / WON number — add or update it here"/>
          <SectionHead n="02" label="Money Receipt"/>
          {[0,1,2].map(i=>{ const mr=(o.moneyReceipts&&o.moneyReceipts[i])||{no:'',date:''}; return (
            <div key={i} style={{display:'flex',borderBottom:`1px solid ${T.line}`,background:'#fff'}}>
              <div style={{flex:1,borderRight:`1px solid ${T.line}`}}>
                <Field label={`Money Receipt No ${i+1}`} value={mr.no} onChange={v=>setMRestricted(i,'no',v)} mono/>
              </div>
              <div style={{flex:1}}>
                <Field label={`Date ${i+1}`} value={mr.date} onChange={v=>setMRestricted(i,'date',v)} mono type="date"/>
              </div>
            </div>
          );})}
          <SectionHead n="03" label="Delivery"/>
          <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
            <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Delivery Status</div>
            <select value={o.deliveryStatus||'Pending'} onChange={e=>setF('deliveryStatus',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:T.ink,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
              {DELIVERY_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
            <div style={{fontSize:11,color:T.ink4,marginTop:3}}>Order is Completed only when "Installation Done".</div>
          </div>
          <div style={{height:20}}/>
        </div>
        <div style={{display:'flex',gap:8,padding:'10px 14px',background:'#fff',borderTop:`1px solid ${T.line}`,flexShrink:0}}>
          <Btn onClick={()=>{ setOrder(BLANK_ORDER()); nav('history'); }}>Cancel</Btn>
          <Btn primary full onClick={handleRestrictedSave}>Save Changes</Btn>
        </div>
      </div>
    );
  }

  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:T.paper,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={back} title="Back" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
          <button onClick={()=>nav('home')} title="Home" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.home(T.ink2,18)}</button>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:-0.4}}>{o.no?(o.manualOrder?'Edit manual order':'Edit order'):(o.manualOrder?'New manual order':'New order')}</div>
            <div style={{fontSize:10,color:T.ink4,fontFamily:T.mono}}>{o.no?o.no:(o.manualOrder?'MANUAL · DRAFT':'DRAFT')}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {isAdmin&&o.no&&<button onClick={handleDelete} title="Delete order (admin)" style={{display:'inline-flex',alignItems:'center',gap:5,height:30,padding:'0 10px',borderRadius:6,background:T.badSoft||'#fdecec',border:`1px solid ${T.bad}`,color:T.bad,fontSize:12,fontWeight:700,cursor:'pointer'}}>{Icon.trash(T.bad,14)}Delete</button>}
          <Pill tone={o.no?'ok':'warn'} size="sm">{o.no?'SAVED':'UNSAVED'}</Pill>
        </div>
      </div>
      <StockRibbon syncedAt={ctx.syncedAt}/>
      <div className="scroll">
        {o.manualOrder && (
          <>
            <div style={{padding:'9px 14px',background:T.ink,color:'#fff',fontSize:11,fontWeight:700,letterSpacing:0.4}}>
              MANUAL ORDER — set the booking date below · 18% GST is included in each item's price (no separate GST is added to the total)
            </div>
            <Field label="Booking Date" value={dmyToISO(o.date)} onChange={v=>setF('date',isoToDMY(v))} type="date" mono required hint="Manual order — the actual date this order was booked"/>
          </>
        )}
        <SectionHead n="01" label="Customer"/>
        <Field label="Customer Name" value={o.customer} onChange={v=>setF('customer',v)} required/>
        <Field label="Phone" value={o.phone} onChange={v=>setF('phone',v)} mono required type="tel" action="CALL" onAction={()=>o.phone&&window.open('tel:'+o.phone)} error={o.phone&&!isValidPhone(o.phone)?'Enter a valid 10-digit mobile number':undefined}/>
        <Field label="Alt. Phone" value={o.alt} onChange={v=>setF('alt',v)} mono type="tel" error={o.alt&&!isValidPhone(o.alt)?'Enter a valid 10-digit mobile number':undefined}/>
        <Field label="E-mail" value={o.email} onChange={v=>setF('email',v)} type="email" required hint="Mandatory · digital copy is sent here" error={o.email&&!isValidEmail(o.email)?'Enter a valid email address':undefined}/>
        <Field label="Customer GST No." value={o.gstNumber} onChange={v=>setF('gstNumber',v.toUpperCase())} mono hint="Fill only if the customer wants a GST bill · printed on the PDF"/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Lead Source <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.awareness} onChange={e=>setF('awareness',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.awareness?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select an option…</option>
            {AWARENESS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <Field label="Date of Birth" value={o.dob} onChange={v=>setF('dob',v)} type="date" mono hint="Optional"/>
        <Field label="Marriage Anniversary" value={o.anniversary} onChange={v=>setF('anniversary',v)} type="date" mono hint="Optional"/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>Purchase Pattern <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {PATTERNS.map(p=>{ const on=(o.purchasePattern||[]).includes(p); return (
              <label key={p} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:99,cursor:'pointer',border:`1px solid ${on?T.green:T.line}`,background:on?T.greenSoft:'#fff'}}>
                <input type="checkbox" checked={on} onChange={()=>togglePattern(p)} style={{width:14,height:14,accentColor:T.green,cursor:'pointer'}}/>
                <span style={{fontSize:12,fontWeight:600,color:on?T.green:T.ink3}}>{p}</span>
              </label>
            );})}
          </div>
        </div>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Purchasing For <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.purchasingFor} onChange={e=>setF('purchasingFor',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.purchasingFor?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select an option…</option>
            {PURCHASING.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>

        <SectionHead n="02" label="Address"/>
        <Field label="Delivery Address" value={o.delivery} onChange={v=>setF('delivery',v)} multiline required/>
        <Field label="Floor" value={o.floor} onChange={v=>setF('floor',v)} required hint="Mandatory"/>
        <Field label="Nearest Landmark" value={o.landmark} onChange={v=>setF('landmark',v)} required hint="Mandatory"/>
        <Field label="Billing Address" value={o.billing} onChange={v=>setF('billing',v)} multiline action="SAME AS DELIVERY" onAction={()=>setF('billing',o.delivery)} hint="Leave blank or tap SAME AS DELIVERY if identical"/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Lift available? <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.liftAvailable} onChange={e=>{const v=e.target.value; setOrder(prev=>({...prev,liftAvailable:v,liftTypes: v==='Yes'?(Array.isArray(prev.liftTypes)?prev.liftTypes:[]):[]}));}} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.liftAvailable?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select an option…</option>
            <option>Yes</option>
            <option>No</option>
          </select>
          {o.liftAvailable==='Yes' && (
            <div style={{marginTop:10}}>
              <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Lift type <span style={{color:T.bad,marginLeft:3}}>*</span></div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {LIFT_TYPES.map(t=>{ const on=liftTypes.includes(t); return (
                  <label key={t} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'5px 11px',borderRadius:99,cursor:'pointer',border:`1px solid ${on?T.green:T.line}`,background:on?T.greenSoft:'#fff'}}>
                    <input type="checkbox" checked={on} onChange={()=>toggleLiftType(t)} style={{width:14,height:14,accentColor:T.green,cursor:'pointer'}}/>
                    <span style={{fontSize:12,fontWeight:600,color:on?T.green:T.ink3}}>{t}</span>
                  </label>
                );})}
              </div>
            </div>
          )}
        </div>
        {/* Contact details — for orders bought on behalf of someone else.
            Mandatory when the billing address differs from the delivery address. */}
        {(()=>{ const diff = (o.billing||'').trim() && (o.delivery||'').trim() && (o.billing||'').trim()!==(o.delivery||'').trim(); return (
          <>
            <SectionHead n="02b" label={`Delivery Contact Person${diff?' · required':' · optional'}`}/>
            <div style={{padding:'8px 14px',background:diff?T.warnSoft:T.paper2,borderBottom:`1px solid ${T.line}`,fontSize:11,color:diff?T.warn:T.ink4,fontWeight:600}}>
              Person to receive the order at the delivery address. {diff?'Required — billing & delivery addresses differ.':'Optional.'}
            </div>
            <Field label="Delivery Contact Person Name" value={o.contactPersonName} onChange={v=>setF('contactPersonName',v)} required={diff}/>
            <Field label="Delivery Contact Number" value={o.contactNumber} onChange={v=>setF('contactNumber',v)} mono type="tel" required={diff} error={o.contactNumber&&!isValidPhone(o.contactNumber)?'Enter a valid 10-digit mobile number':undefined}/>
            <Field label="Remark" value={o.contactRemark} onChange={v=>setF('contactRemark',v)} multiline/>
          </>
        );})()}

        <SectionHead n="03" label="Site Measurements"/>
        <div style={{padding:'8px 14px',background:T.paper2||'#fafafa',borderBottom:`1px solid ${T.line}`,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:T.ink4,fontWeight:700}}>ENTER IN</span>
          {[['cm','cm'],['ft','ft / in']].map(([u,lbl])=>(
            <span key={u} onClick={()=>setMeasUnit(u)} style={{padding:'5px 12px',borderRadius:99,background:measUnit===u?T.green:'#fff',color:measUnit===u?'#fff':T.ink2,border:`1px solid ${measUnit===u?T.green:T.line}`,fontSize:12,fontWeight:700,cursor:'pointer'}}>{lbl}</span>
          ))}
          <span style={{fontSize:11,color:T.ink4,fontWeight:600,marginLeft:'auto'}}>Saved in cm{measUnit==='ft'?' (auto-converted)':''}</span>
        </div>
        {hasSofa && (
          <>
            <div style={{padding:'8px 14px',background:T.warnSoft,borderBottom:`1px solid ${T.line}`,fontSize:11,color:T.warn,fontWeight:700}}>Sofa in order — width, height & depth are mandatory (printed on the PDF)</div>
            <MeasureField label="Sofa Width" value={o.sofaWidth} onChange={v=>setF('sofaWidth',v)} unit={measUnit} required/>
            <MeasureField label="Sofa Height" value={o.sofaHeight} onChange={v=>setF('sofaHeight',v)} unit={measUnit} required/>
            <MeasureField label="Sofa Depth" value={o.sofaDepth} onChange={v=>setF('sofaDepth',v)} unit={measUnit} required/>
          </>
        )}
        {/* Modular furniture — one measurement block per modular wardrobe
            (Kalista / Kreation X2 / X3). Sales picks how many; each block carries
            the wardrobe dims. */}
        {hasWardrobe && (
          <>
            <div style={{padding:'8px 14px',background:T.warnSoft,borderBottom:`1px solid ${T.line}`,fontSize:11,color:T.warn,fontWeight:700}}>Modular wardrobe in order — each furniture's length/width/height is mandatory (printed on the PDF)</div>
            <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
              <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>How many modular furnitures? <span style={{color:T.bad,marginLeft:3}}>*</span></div>
              <select value={wardrobes.length||1} onChange={e=>setWardrobeCount(Number(e.target.value))} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:T.ink,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
                {[1,2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <div style={{fontSize:11,color:T.ink4,marginTop:3}}>e.g. Kreation X3 + Kalista → 2 furnitures</div>
            </div>
            {wardrobes.map((w,wi)=>(
              <div key={wi} style={{borderBottom:`1px solid ${T.line}`,background:T.paper2||'#fafafa'}}>
                <div style={{padding:'8px 14px',fontSize:11,fontWeight:700,color:T.ink2,letterSpacing:0.5,textTransform:'uppercase'}}>Modular Furniture {wi+1}</div>
                <div style={{background:'#fff'}}>
                  <Field label="Furniture Name" value={w.name} onChange={v=>setWardrobeField(wi,'name',v)} hint="e.g. Kreation X3, Kalista"/>
                  <MeasureField label="Wardrobe Length" value={w.length} onChange={v=>setWardrobeField(wi,'length',v)} unit={measUnit} required/>
                  <MeasureField label="Wardrobe Width" value={w.width} onChange={v=>setWardrobeField(wi,'width',v)} unit={measUnit} required/>
                  <MeasureField label="Wardrobe Height" value={w.height} onChange={v=>setWardrobeField(wi,'height',v)} unit={measUnit} required/>
                </div>
              </div>
            ))}
          </>
        )}
        {/* Rooms — sales picks how many rooms, then notes each room's dims.
            Mandatory when a modular wardrobe is in the order. */}
        <SectionHead n="03b" label="Rooms"/>
        {hasWardrobe && (
          <div style={{padding:'8px 14px',background:T.warnSoft,borderBottom:`1px solid ${T.line}`,fontSize:11,color:T.warn,fontWeight:700}}>Modular wardrobe in order — room measurements are mandatory (printed on the PDF)</div>
        )}
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>How many rooms?{hasWardrobe&&<span style={{color:T.bad,marginLeft:3}}>*</span>}</div>
          <select value={rooms.length||(hasWardrobe?1:0)} onChange={e=>setRoomCount(Number(e.target.value))} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:T.ink,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            {(hasWardrobe?[1,2,3,4,5,6,7,8]:[0,1,2,3,4,5,6,7,8]).map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <div style={{fontSize:11,color:T.ink4,marginTop:3}}>Add a measurement block per room.</div>
        </div>
        {rooms.map((r,ri)=>(
          <div key={ri} style={{borderBottom:`1px solid ${T.line}`,background:T.paper2||'#fafafa'}}>
            <div style={{padding:'8px 14px',fontSize:11,fontWeight:700,color:T.ink2,letterSpacing:0.5,textTransform:'uppercase'}}>Room {ri+1}</div>
            <div style={{background:'#fff'}}>
              <Field label="Room Name" value={r.name} onChange={v=>setRoomField(ri,'name',v)} placeholder={`Room ${ri+1}`} required={hasWardrobe} hint="e.g. Master Bedroom, Kids Room"/>
              <MeasureField label="Room Width" value={r.width} onChange={v=>setRoomField(ri,'width',v)} unit={measUnit} required={hasWardrobe}/>
              <MeasureField label="Room Height" value={r.height} onChange={v=>setRoomField(ri,'height',v)} unit={measUnit} required={hasWardrobe}/>
              <MeasureField label="Room Depth" value={r.depth} onChange={v=>setRoomField(ri,'depth',v)} unit={measUnit} required={hasWardrobe}/>
            </div>
          </div>
        ))}
        {/* Staircase — only for a SOFA with NO lift (skip if there's a lift or no sofa).
            Staircase width + the landing area's length / width / depth. */}
        {needStaircase && (
          <>
            <div style={{padding:'8px 14px',background:T.warnSoft,borderBottom:`1px solid ${T.line}`,fontSize:11,color:T.warn,fontWeight:700}}>Sofa with no lift — staircase width & the landing area length/width/depth are mandatory (printed on the PDF)</div>
            <MeasureField label="Staircase Width" value={o.staircaseWidth} onChange={v=>setF('staircaseWidth',v)} unit={measUnit} required/>
            <MeasureField label="Landing Area Length" value={o.landingLength} onChange={v=>setF('landingLength',v)} unit={measUnit} required/>
            <MeasureField label="Landing Area Width" value={o.landingWidth} onChange={v=>setF('landingWidth',v)} unit={measUnit} required/>
            <MeasureField label="Landing Area Depth" value={o.landingDepth} onChange={v=>setF('landingDepth',v)} unit={measUnit} required/>
          </>
        )}
        {/* Entry-door measurement — mandatory only for sofa orders */}
        <MeasureField label="Entry Door Width" value={o.entryDoorWidth} onChange={v=>setF('entryDoorWidth',v)} unit={measUnit} required={hasSofa} hint={hasSofa?'Mandatory for sofa orders':undefined}/>
        <MeasureField label="Entry Door Height" value={o.entryDoorHeight} onChange={v=>setF('entryDoorHeight',v)} unit={measUnit} required={hasSofa}/>

        <SectionHead n="04" label={`Items · ${(o.items||[]).length}`} action="+ ADD ITEM" onAction={()=>nav('search')}/>
        <div style={{background:'#fff'}}>
          {(o.items||[]).map((it,i)=>{
            const mrpVal   = it.mrp||it.cpl||0;                 // pre-GST list price (base)
            const discPct  = parseFloat(it.disc||'0')/100;
            const curPrice = (it.unitPrice>0) ? it.unitPrice : (mrpVal>0 ? mrpVal*(1-discPct) : 0);
            // Every price shown includes 18% GST (the MRP). GST is baked in for
            // display only — never re-applied — so the line total is just MRP × qty.
            const mrpIncl  = Math.round(mrpVal*(1+GST_RATE));   // per-unit MRP (incl. GST)
            const gstUnit  = gstInclUnit(it);                   // per-unit MRP after discount
            const lineShown= gstInclLine(it);                   // line total (incl. GST)
            return (
            <div key={it.code+i} style={{padding:'11px 14px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3,flexWrap:'wrap'}}>
                    <span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:600}}>{it.code}</span>
                    {it.inStock>0 && <StockChip branch={it.branch||'STOCK'} count={it.inStock} low={it.inStock<3}/>}
                    {(!it.inStock)&&<Pill tone="warn" size="sm">OOS</Pill>}

                  {priv&&(()=>{const cplU=Number(it.cpl)||Number(it.mrp)||0;const sellEx=Math.round(curPrice);const m=sellEx-cplU;const mp=cplU>0?Math.round(m/cplU*100):0;return(
                    <div style={{fontSize:10,color:T.ink4,marginTop:2}}>CPL: ₹{cplU.toLocaleString('en-IN')} · Margin: <b style={{color:m>=0?T.green:T.bad}}>₹{m.toLocaleString('en-IN')}{cplU>0?` (${mp}%)`:''}</b> <span style={{opacity:.7}}>· pre-GST · mgr only</span></div>
                  );})()}
                  <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>QTY</span>

                    <span style={{fontFamily:T.mono,fontSize:14,fontWeight:700,minWidth:20,textAlign:'center'}}>{it.qty}</span>
                    <button onClick={()=>updateItemQty(i,1)} style={{width:24,height:24,borderRadius:4,border:`1px solid ${T.line}`,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:T.ink}}>+</button>
                  </div>
                  {/* MRP, Discount % and Selling Price are all editable and kept in
                      sync both ways: change the discount and the price updates;
                      type the selling price and the discount % is calculated. All
                      prices are GST-inclusive; GST is never re-added on an edit. */}
                  <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>MRP ₹</span>
                    <NumBox
                      value={mrpIncl}
                      onInput={t=>{
                        // Edited in GST-inclusive terms; store the pre-GST list price
                        // so 18% GST never gets re-added to what was typed. Discount %
                        // is held fixed, so the selling price follows the new MRP.
                        const vIncl=parseFloat(t)||0;
                        const base=vIncl/(1+GST_RATE);
                        const up=base*(1-discPct);
                        setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,mrp:base,unitPrice:up,total:up*x.qty}:x)}));
                      }}
                      style={{width:78,border:`1.5px solid ${T.green}`,borderRadius:4,padding:'3px 6px',fontFamily:T.mono,fontSize:13,fontWeight:700,textAlign:'right',color:T.ink}}
                    />
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>DISC %</span>
                    <NumBox
                      value={it.disc||''}
                      placeholder="0"
                      onInput={t=>{
                        // Discount drives the selling price (MRP held fixed).
                        const pct=parseFloat(t)||0;
                        const newUp=mrpVal*(1-pct/100);
                        setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,disc:t,unitPrice:newUp,total:newUp*x.qty}:x)}));

                    />
                    <span style={{fontSize:10,color:T.green,fontWeight:700}}>SELL ₹</span>
                    <NumBox
                      value={gstUnit}
                      onInput={t=>{
                        // Type the selling price → the discount % is auto-calculated
                        // from the MRP (both GST-inclusive, so GST cancels out). The
                        // entered price is stored as-is; GST is never added on top.
                        const sellIncl=parseFloat(t)||0;
                        const up=sellIncl/(1+GST_RATE);
                        const discP=mrpIncl>0 ? (1 - sellIncl/mrpIncl)*100 : 0;
                        const discStr=discP>0.0001 ? String(Math.round(discP*100)/100) : '';
                        setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,unitPrice:up,disc:discStr,total:up*x.qty}:x)}));
                      }}
                      style={{width:78,border:`1.5px solid ${T.green}`,borderRadius:4,padding:'3px 6px',fontFamily:T.mono,fontSize:13,fontWeight:700,textAlign:'right',color:T.green}}
                    />
                  </div>
                  {/* Scheme flags — saved to CRM "Disc Allowed"; NOT printed on the PDF */}
                  <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>SCHEME</span>
                    {[['ageing','Ageing'],['sweetner','Sweetner'],['other','Other']].map(([k,lbl])=>(
                      <label key={k} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:99,cursor:'pointer',border:`1px solid ${it[k]?T.green:T.line}`,background:it[k]?T.greenSoft:'#fff'}}>
                        <input type="checkbox" checked={!!it[k]} onChange={()=>toggleScheme(i,k)} style={{width:14,height:14,accentColor:T.green,cursor:'pointer'}}/>
                        <span style={{fontSize:11,fontWeight:600,color:it[k]?T.green:T.ink3}}>{lbl}</span>
                      </label>
                    ))}
                    {it.other&&(
                      <input
                        value={it.schemeCode||''}
                        onChange={e=>{const v=e.target.value;setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,schemeCode:v}:x)}));}}
                        placeholder="Scheme code"
                        style={{width:120,border:`1.5px solid ${T.green}`,borderRadius:4,padding:'3px 8px',fontFamily:T.mono,fontSize:12,color:T.ink}}
                      />
                    )}
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:T.mono,fontSize:15,fontWeight:700}}>₹{lineShown.toLocaleString('en-IN')}</div>
                  <div style={{fontSize:9,color:T.ink4,marginTop:1}}>×{it.qty} unit{it.qty>1?'s':''} · incl. GST</div>
                  <button onClick={()=>removeItem(i)} style={{marginTop:8,fontSize:11,color:T.bad,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>REMOVE</button>
                </div>
              </div>
            </div>
            );
          })}
          <div onClick={()=>nav('search')} style={{padding:14,display:'flex',alignItems:'center',gap:10,background:T.greenSoft,color:T.green,fontWeight:700,cursor:'pointer'}}>
            {Icon.search(T.green,16)}<span style={{fontSize:13}}>Search & add item</span>
          </div>
        </div>
        <SectionHead n="05" label="Commercials"/>
        <Field label="Additional Order Discount %" value={o.orderDiscount} onChange={v=>setF('orderDiscount',v.replace(/[^\d.]/g,''))} mono type="number" hint="Extra discount on the whole order (on top of per-item discounts). Shown on the PDF."/>
        <Field label="SI No" value={o.slNo} onChange={v=>setF('slNo',v)} mono required hint="Mandatory · the order-form SI number · printed as the Sl part of the PDF's Order No. (Sl / Receipt)"/>
        <Field label="Receipt No" value={o.orderFormReceiptNo} onChange={v=>setF('orderFormReceiptNo',v.replace(/[^\d]/g,''))} mono required type="tel" hint={o.manualOrder?"Manual order — enter the receipt number from the paper order form":"Auto-incremented (1, 2, 3 …) — edit if you need a different number"}/>
        <Field label="WON (Godrej SO No)" value={o.won} onChange={v=>setF('won',v)} mono hint="Godrej SO / WON number — can be added or updated any time"/>
        <Field label="Planned Delivery" value={o.plannedDly} onChange={v=>setOrder(prev=>({...prev,plannedDly:v,followUp:followUpFromDelivery(v)||prev.followUp}))} mono required type="date" hint="Follow-up auto-set to 2 days before this date"/>
        <Field label="Installation Note" value={o.installNote} onChange={v=>setF('installNote',v)} multiline/>
        <SectionHead n="06" label="Payment"/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>PAYMENT MODE <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.paymentMode} onChange={e=>setF('paymentMode',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.paymentMode?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select payment mode…</option>
            <option>Cash</option>
            <option>UPI (GPay / PhonePe / Paytm)</option>
            <option>IDBI QR</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>Cheque</option>
            <option>NEFT / RTGS / IMPS / Bank Transfer</option>
            <option>Bajaj Finance EMI</option>
            <option>Pine Labs EMI</option>
          </select>
        </div>
        <Field label="Earnest Amount" value={o.earnest} onChange={v=>setF('earnest',v)} mono type="number" required error={(Number(o.earnest)||0) > total ? `Amount paid ₹${(Number(o.earnest)||0).toLocaleString('en-IN')} exceeds the order total ₹${total.toLocaleString('en-IN')}` : undefined} hint={total>0?`Order total: ₹${total.toLocaleString('en-IN')}`:undefined}/>
        {/* Money receipt no + date — updatable up to 3 times */}
        {[0,1,2].map(i=>{ const mr=(o.moneyReceipts&&o.moneyReceipts[i])||{no:'',date:''}; const setMR=(field,val)=>setOrder(prev=>{const arr=(prev.moneyReceipts||[{no:'',date:''},{no:'',date:''},{no:'',date:''}]).map(x=>({...x})); while(arr.length<3)arr.push({no:'',date:''}); arr[i]={...arr[i],[field]:val}; return {...prev,moneyReceipts:arr,receiptNo: field==='no'&&i===0?val:prev.receiptNo}; }); return (
          <div key={i} style={{display:'flex',borderBottom:`1px solid ${T.line}`,background:'#fff'}}>
            <div style={{flex:1,borderRight:`1px solid ${T.line}`}}>
              <Field label={`Money Receipt No ${i+1}`} value={mr.no} onChange={v=>setMR('no',v)} mono/>
            </div>

              <Field label={`Date ${i+1}`} value={mr.date} onChange={v=>setMR('date',v)} mono type="date"/>
            </div>

        );})}

        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Delivery Status</div>
          <select value={o.deliveryStatus||'Pending'} onChange={e=>setF('deliveryStatus',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:T.ink,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            {DELIVERY_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
          <div style={{fontSize:11,color:T.ink4,marginTop:3}}>Order is Completed only when "Installation Done".</div>
        </div>
        <SectionHead n="07" label="Internal"/>
        <Field label="Salesperson" value={o.salesExec??''} onChange={v=>setF('salesExec',v)} mono hint="Pre-filled with your name — edit or clear freely (your name is used if left blank)."/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Order Type <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.orderType||'B2C'} onChange={e=>setF('orderType',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:T.ink,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option>B2C</option>
            <option>B2B</option>
          </select>
        </div>
        <div style={{padding:'14px 14px 18px'}}>
          <div style={{background:T.ink,color:'#fff',borderRadius:8,padding:'14px 16px',fontFamily:T.mono}}>
            <div style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13}}><span>Items subtotal (incl. GST)</span><span>₹{itemsSubtotal.toLocaleString('en-IN')}</span></div>
            {orderDiscAmt>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13,color:'#ffd27a'}}><span>Order disc {(orderDiscPct*100).toLocaleString('en-IN')}%</span><span>−₹{orderDiscAmt.toLocaleString('en-IN')}</span></div>}
            {/* GST is already inside each MRP — CGST/SGST shown here are carved OUT
                of the inclusive total (never added on top). */}
            {[['CGST 9% (incl.)',cgst],['SGST 9% (incl.)',sgst]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13,color:'rgba(255,255,255,.6)'}}><span>{k}</span><span>₹{v.toLocaleString('en-IN')}</span></div>)}

            <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:700}}><span>TOTAL</span><span>₹{total.toLocaleString('en-IN')}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginTop:4,color:'rgba(255,255,255,.6)'}}><span>Earnest</span><span>₹{earnest.toLocaleString('en-IN')}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:700,color:balance<0?'#ff8a80':'#ffd27a',marginTop:2}}><span>{balance<0?'Overpaid':'Balance'}</span><span>₹{Math.abs(balance).toLocaleString('en-IN')}</span></div>
            {priv&&(
              <>
                <div style={{height:1,background:'rgba(255,255,255,.2)',margin:'8px 0'}}/>

        <Btn onClick={handleSaveDraft}>Save Draft</Btn>
        <Btn primary full onClick={handleSave}>Save & PDF →</Btn>
      </div>
    </div>
  );
}

          text:'https://4sinteriors.in/order/'+(o.no||'').replace('/','‑'),

          <button onClick={()=>nav('home')} title="Home" style={{width:32,height:32,borderRadius:6,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.home('#fff',18)}</button>

      <div className="scroll" style={{padding:'6px 16px 14px'}}>
        <div style={{background:'#fff',borderRadius:4,overflow:'hidden',boxShadow:'0 12px 40px rgba(0,0,0,.35)'}}>
