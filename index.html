// ─── Stock Search ────────────────────────────────────────────
function SearchScreen({ctx}) {
  const {items, priceItems, syncedAt, priceSyncedAt, nav, back, order, setOrder, syncPriceList, loading} = ctx;
  const [q,   setQ]   = useState('');
  const [cat, setCat] = useState('all');
  const cartCount = (order.items||[]).reduce((s,i)=>s+(i.qty||0),0);

  const hasPriceList = priceItems && priceItems.length > 0;
  const {priceSyncError} = ctx;

  // Only use price list items — never fall back to stock items for ordering
  const allItems = (() => {
    if (!hasPriceList) return [];
    const stockMap = {};
    (items||[]).forEach(it => { stockMap[it.code] = it; });
    return priceItems.map(pi => {
      const si = stockMap[pi.code];
      return si ? {...pi, stock:si.stock||[], mrp:si.mrp||pi.mrp||0, cpl:si.cpl||pi.cpl||0} : pi;
    });
  })();

  // Categories come directly from it.cat (set by Price_Lists sheet column B)
  const uniqueCats = [...new Set(allItems.map(i => i.cat).filter(Boolean))].sort();

  React.useEffect(() => {
    const valid = ['all', ...uniqueCats];
    if (!valid.includes(cat)) setCat('all');
  }, [allItems.length]);

  const CATS = [
    { key: 'all', label: 'All' + (allItems.length > 0 ? ' · ' + allItems.length : '') },
    ...uniqueCats.map(c => ({ key: c, label: c + ' · ' + allItems.filter(i => i.cat === c).length })),
  ];

  const bycat = cat === 'all' ? allItems : allItems.filter(i => i.cat === cat);

  const {results: filtered, mode: searchMode} = fuzzySearch(bycat, q);

  function handleInput(e) { setQ(e.target.value); }

  function addToOrder(item) {
    const disc      = order.discountCode||'0%';
    const pct       = parseFloat(disc)/100||0;
    const basePrice = item.mrp||item.cpl||0;
    const unitPrice = basePrice>0 ? Math.round(basePrice*(1-pct)) : 0;
    // "Change of Code" items: the order form / PDF must use the Alt Item code
    // even though the price list still lists the old code.
    const effCode   = item.altCode || item.code;
    const exists    = (order.items||[]).findIndex(x=>x.code===effCode);
    let newItems;
    if (exists>=0) {
      newItems = order.items.map((x,idx)=>idx===exists?{...x,qty:x.qty+1,total:(x.qty+1)*(x.unitPrice||x.mrp||x.cpl||0)}:x);
    } else {
      newItems = [...(order.items||[]),{
        code:effCode, priceCode:item.code, name:item.name, cat:item.cat, item:item.item||'',
        qty:1, mrp:item.mrp||item.cpl||0, cpl:item.cpl||item.mrp||0,
        unitPrice, total:unitPrice, disc,
        ageing:false, sweetner:false,
        discontinued:!!item.discontinued, discSince:item.discSince||'',
        branch:(item.stock||[])[0]?.b||'KB',
        inStock:(item.stock||[]).reduce((s,x)=>s+x.q,0),
      }];
    }
    setOrder({...order,items:newItems});
    const totalStock = (item.stock||[]).reduce((s,x)=>s+x.q,0);
    ctx.showToast(totalStock===0?item.name.slice(0,22)+'… added (OOS)':item.name.slice(0,30)+'… added', totalStock===0?'warn':'ok');
  }

  return (
    <div className="screen">
      <div style={{flexShrink:0}}>
        <StockRibbon syncedAt={syncedAt}/>
        <div style={{padding:'14px 18px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
            <button onClick={back} title="Back" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>{Icon.back()}</button>
            <div style={{minWidth:0}}>
              <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>
                {hasPriceList
                  ? <>PRICE LIST · {allItems.length} SKUs {priceSyncedAt&&<span style={{color:T.ok}}>· synced {new Date(priceSyncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>}</>
                  : <span style={{color:T.warn,fontWeight:700}}>PRICE LIST NOT LOADED</span>}
              </div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>{cartCount>0?'Add item':'Search items'}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
            {cartCount>0&&<Btn size="sm" primary onClick={()=>nav('order')} icon={Icon.doc('#fff',15)}>Order · {cartCount}</Btn>}
          </div>
        </div>

        {/* Price list not loaded — prominent sync banner */}
        {!hasPriceList && (() => {
          const isSetup    = priceSyncError && priceSyncError.startsWith('SETUP_NEEDED');
          const isRedeploy = priceSyncError && priceSyncError.startsWith('REDEPLOY_NEEDED');
          const isNoUrl    = priceSyncError && priceSyncError.startsWith('NO_URL');
          const bg   = priceSyncError ? T.badSoft  : T.warnSoft;
          const bdr  = priceSyncError ? T.bad      : T.warn;
          const titC = priceSyncError ? T.bad      : T.warn;
          return (
            <div style={{margin:'0 18px 10px',padding:'14px 16px',background:bg,border:`1.5px solid ${bdr}`,borderRadius:8}}>
              {isSetup ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:8}}>⚙ One-time setup needed</div>
                  <div style={{fontSize:12,color:T.ink2,lineHeight:1.8,marginBottom:10}}>
                    In your OPS Google Sheet, create a tab named <b>Price_Lists</b> with these two columns:<br/>
                    <span style={{fontFamily:T.mono,fontSize:11,background:'#fff',padding:'2px 6px',borderRadius:3,display:'inline-block',marginTop:4}}>
                      Tab Name &nbsp;|&nbsp; Category
                    </span><br/><br/>
                    List each price list tab name and its category label, e.g.:<br/>
                    <span style={{fontFamily:T.mono,fontSize:11,background:'#fff',padding:'6px 8px',borderRadius:3,display:'block',marginTop:4,lineHeight:2}}>
                      HF &nbsp;&nbsp;&nbsp;&nbsp;| Home Furniture &amp; Storage<br/>
                      HS &nbsp;&nbsp;&nbsp;&nbsp;| Home Furniture &amp; Storage<br/>
                      Mattress | Mattress
                    </span><br/>
                    Then redeploy your Apps Script (Deploy → Manage → Edit → New version), and tap Sync below.
                  </div>
                </>
              ) : isRedeploy ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:6}}>Apps Script needs redeployment</div>
                  <div style={{fontSize:12,color:T.ink2,lineHeight:1.7,marginBottom:10}}>
                    Open your Apps Script project → Deploy → Manage deployments → click the pencil icon → choose <b>New version</b> → Deploy.<br/>
                    The URL stays the same.
                  </div>
                </>
              ) : isNoUrl ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.warn,marginBottom:6}}>Apps Script URL not saved</div>
                  <div style={{fontSize:12,color:T.ink3,lineHeight:1.6,marginBottom:10}}>Go to <b>Me → Settings</b>, paste your Apps Script deployment URL, and tap Save URL.</div>
                </>
              ) : priceSyncError ? (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:T.bad,marginBottom:6}}>Sync failed</div>
                  <div style={{fontSize:11,color:T.ink2,marginBottom:10,lineHeight:1.6,whiteSpace:'pre-wrap',fontFamily:T.mono,background:'#fff',borderRadius:4,padding:'8px 10px',border:`1px solid ${bdr}`}}>{priceSyncError.replace(/^[A-Z_]+: /,'')}</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:13,fontWeight:700,color:titC,marginBottom:6}}>Price list not loaded yet</div>
                  <div style={{fontSize:12,color:T.ink3,marginBottom:10,lineHeight:1.5}}>
                    Make sure your Apps Script URL is saved in <b>Me → Settings</b>, then tap below.
                  </div>
                </>
              )}
              <Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncPriceList} disabled={loading}>
                {loading ? 'Loading…' : priceSyncError ? 'Retry sync' : 'Load price list now'}
              </Btn>
            </div>
          );
        })()}

        {/* Search input */}
        {hasPriceList && (
          <div style={{padding:'0 18px 10px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#fff',border:`1.5px solid ${T.green}`,borderRadius:8,boxShadow:`0 0 0 4px ${T.greenSoft}`}}>
              {Icon.search(T.ink3)}
              <input
                value={q}
                onChange={handleInput}
                onInput={handleInput}
                placeholder="Search by name, code or category…"
                style={{flex:1,border:'none',outline:'none',fontSize:15,color:T.ink,background:'transparent'}}
              />
              {q&&<span onClick={()=>setQ('')} style={{cursor:'pointer',lineHeight:1,padding:'0 2px'}}>{Icon.close(T.ink4)}</span>}
              {q&&<span style={{fontFamily:T.mono,fontSize:11,color:T.ink4,flexShrink:0}}>{filtered.length}</span>}
            </div>
          </div>
        )}

        {/* Category chips */}
        {hasPriceList && (
          <div style={{padding:'0 18px 10px',display:'flex',gap:6,overflowX:'auto'}}>
            {CATS.map(c=>(
              <span key={c.key} onClick={()=>setCat(c.key)} style={{
                padding:'5px 13px', borderRadius:99, whiteSpace:'nowrap', cursor:'pointer', flexShrink:0,
                background:c.key===cat?T.ink:'#fff', color:c.key===cat?'#fff':T.ink2,
                border:`1px solid ${c.key===cat?T.ink:T.line}`, fontSize:12, fontWeight:600,
              }}>{c.label}</span>
            ))}
          </div>
        )}
      </div>

      <div className="scroll" style={{background:'#fff',borderTop:`1px solid ${T.line}`}}>
        {/* Search result banners — shown for every mode so user knows what happened */}
        {hasPriceList && q && searchMode==='exact' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:'#eaf6ef',borderBottom:`1px solid #b6dfc5`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.ok,fontWeight:600}}>✓ {filtered.length} exact {filtered.length===1?'match':'matches'} for "{q}"</span>
          </div>
        )}
        {hasPriceList && q && searchMode==='near' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:T.warnSoft,borderBottom:`1px solid #e6cc95`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.warn,fontWeight:600}}>~ {filtered.length} partial {filtered.length===1?'match':'matches'} for "{q}"</span>
            <span style={{fontSize:10,color:T.ink4}}>not all words found</span>
          </div>
        )}
        {hasPriceList && q && searchMode==='far' && filtered.length>0 && (
          <div style={{padding:'7px 18px',background:T.badSoft,borderBottom:`1px solid #e2b8b0`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:T.bad,fontWeight:600}}>⚠ Loose match — "{q}" not found exactly</span>
            <span style={{fontSize:10,color:T.ink4}}>showing closest</span>
          </div>
        )}

        {filtered.map((it,fi)=>{
          const stockTotal = (it.stock||[]).reduce((s,x)=>s+x.q,0);
          const hasStock   = (it.stock||[]).length > 0;
          const oos        = hasStock && stockTotal === 0;
          const cpl = Number(it.cpl) || Number(it.mrp) || 0;
          return (
            <div key={(it.code||it.name||'')+'|'+(it.sheet||'')+'|'+fi} style={{padding:'12px 18px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  {/* LN Description — always the primary product name */}
                  <div style={{fontSize:13,fontWeight:600,color:T.ink,lineHeight:1.35,marginBottom:4}}>{it.name}</div>
                  {/* Tags row: ITEM_GROUP category + item code + sheet + OOS */}
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:4}}>
                    {it.item && <Pill tone="neutral" size="sm" style={{fontWeight:600}}>{it.item}</Pill>}
                    {it.code && <span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:600}}>{it.code}</span>}
                    <Pill tone="neutral" size="sm">{(it.sheet||it.cat||'').toUpperCase()}</Pill>
                    {oos && <Pill tone="bad" size="sm">OUT OF STOCK</Pill>}
                    {it.discontinued && <Pill tone="bad" size="sm">DISCONTINUED{it.discSince?' since '+it.discSince:''}</Pill>}
                    {it.altCode && <Pill tone="warn" size="sm">USE CODE {it.altCode}</Pill>}
                  </div>
                  {/* Extra info (e.g. mattress thickness) */}
                  {it.extra && <div style={{fontSize:10,color:T.ink4,marginBottom:4}}>{it.extra}</div>}
                  {/* Stock chips */}
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    {hasStock
                      ? it.stock.map(s=><StockChip key={s.b} branch={s.b} count={s.q} low={s.q>0&&s.q<3}/>)
                      : <span style={{fontSize:10,color:T.ink4}}>Sync stock to see availability</span>}
                  </div>
                </div>
                {/* Price + Add */}
                <div style={{flexShrink:0,textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,paddingLeft:6}}>
                  <div>
                    <div style={{fontSize:9,color:T.ink4,fontWeight:700,letterSpacing:.5,textAlign:'right'}}>CPL</div>
                    <div style={{fontFamily:T.mono,fontSize:14,fontWeight:700,color:cpl>0?T.ink:T.ink4}}>
                      {cpl > 0 ? '₹' + cpl.toLocaleString('en-IN') : '—'}
                    </div>
                  </div>
                  <button onClick={()=>addToOrder(it)} style={{height:32,padding:'0 12px',borderRadius:6,background:oos?T.warn:T.green,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                    {Icon.plus('#fff',14)}{oos?'Book':'Add'}
                  </button>
                </div>
              </div>
            </div>
          );
        })}

        {/* Empty states */}
        {hasPriceList&&filtered.length===0&&q&&(
          <div style={{padding:40,textAlign:'center'}}>
            <div style={{fontSize:15,fontWeight:700,color:T.bad,marginBottom:8}}>No match found</div>
            <div style={{fontSize:13,color:T.ink4,lineHeight:1.6,marginBottom:16}}>"{q}" is not in the {cat!=='all'?cat+' ':''}price list.</div>
            <div style={{fontSize:12,color:T.ink4,lineHeight:1.7}}>
              <b>Tips:</b><br/>
              • Try fewer words: <i>osiris</i> instead of <i>osiris media unit blue</i><br/>
              • Use the product series name or item code<br/>
              • Switch category (All / Home Furniture & Storage / Mattress)
            </div>
          </div>
        )}
        {hasPriceList&&filtered.length===0&&!q&&(
          <div style={{padding:32,textAlign:'center',fontSize:13,color:T.ink4}}>No items in this category.</div>
        )}
        <div style={{height:8}}/>
      </div>
      {cartCount>0&&(
        <div onClick={()=>nav('order')} style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'12px 16px',background:T.green,color:'#fff',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {Icon.doc('#fff',18)}
            <span style={{fontSize:14,fontWeight:700}}>{cartCount} item{cartCount>1?'s':''} in this order</span>
          </div>
          <span style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>Continue booking →</span>
        </div>
      )}
      <BottomNav screen="search" nav={nav}/>
    </div>
  );
}

// ─── Order Form ──────────────────────────────────────────────
function OrderFormScreen({ctx}) {
  const {order,setOrder,nav,back,user,doSaveOrder} = ctx;
  const o = order;
  const setF = (k,v) => setOrder(prev=>({...prev,[k]:v}));
  const {itemsSubtotal, orderDiscPct, orderDiscAmt, taxable, cgst, sgst, total, balance} = orderTotals(o);

  // A sofa in the cart makes the sofa measurements mandatory
  const hasSofa = (o.items||[]).some(it => /sofa/i.test((it.name||'')+' '+(it.cat||'')+' '+(it.item||'')));
  const AWARENESS  = ['Social Media','Whatsapp','Newspaper','Friends & Relatives','Website','Others'];
  const PATTERNS   = ['1st Time','2nd Time','3rd Time','More than 3'];
  const PURCHASING = ['New Home','Renovation','Rented Home','Other'];

  function removeItem(idx) { setOrder(prev=>({...prev,items:prev.items.filter((_,i)=>i!==idx)})); }
  function toggleScheme(idx,key) { setOrder(prev=>({...prev,items:prev.items.map((it,i)=>i===idx?{...it,[key]:!it[key]}:it)})); }
  function togglePattern(p) { setOrder(prev=>{ const cur=prev.purchasePattern||[]; return {...prev,purchasePattern: cur.includes(p)?cur.filter(x=>x!==p):[...cur,p]}; }); }
  function updateItemQty(idx,delta) {
    setOrder(prev=>({...prev,items:prev.items.map((it,i)=>{
      if(i!==idx) return it;
      const newQty = Math.max(1,it.qty+delta);
      const baseP = it.mrp||it.cpl||0;
      const up = it.unitPrice!==undefined ? it.unitPrice : Math.round(baseP*(1-(parseFloat(it.disc)||0)/100));
      return {...it,qty:newQty,unitPrice:up,total:newQty*up};
    })}));
  }

  async function handleSave() {
    if(!o.customer) return ctx.showToast('Customer name is required','bad');
    if(!o.phone)    return ctx.showToast('Phone number is required','bad');
    if(!o.items||o.items.length===0) return ctx.showToast('Add at least one item','bad');
    // Mandatory customer-profiling fields
    if(!o.dob)          return ctx.showToast('Date of Birth is required','bad');
    if(!o.anniversary)  return ctx.showToast('Marriage Anniversary is required','bad');
    if(!o.awareness)    return ctx.showToast('Select how they came to know about the showroom','bad');
    if(!o.purchasePattern||o.purchasePattern.length===0) return ctx.showToast('Select the purchase pattern','bad');
    if(!o.purchasingFor) return ctx.showToast('Select what they are purchasing for','bad');
    // Sofa measurements are mandatory only when a sofa is in the order
    if(hasSofa && (!o.sofaWidth||!o.sofaHeight||!o.sofaDepth)) return ctx.showToast('Enter Sofa width, height & depth (mandatory for sofas)','bad');
    const saved = await doSaveOrder({...o,salesExec:o.salesExec||user?.name||''});
    if(saved) { setOrder(saved); nav('pdf'); }
  }

  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:T.paper,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={back} style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:-0.4}}>New order</div>
            <div style={{fontSize:10,color:T.ink4,fontFamily:T.mono}}>DRAFT{o.no?' · '+o.no:''}</div>
          </div>
        </div>
        <Pill tone={o.no?'ok':'warn'} size="sm">{o.no?'SAVED':'UNSAVED'}</Pill>
      </div>
      <StockRibbon syncedAt={ctx.syncedAt}/>
      <div className="scroll">
        <SectionHead n="01" label="Customer"/>
        <Field label="Customer Name" value={o.customer} onChange={v=>setF('customer',v)} required/>
        <Field label="Phone" value={o.phone} onChange={v=>setF('phone',v)} mono required type="tel" action="CALL" onAction={()=>o.phone&&window.open('tel:'+o.phone)}/>
        <Field label="Alt. Phone" value={o.alt} onChange={v=>setF('alt',v)} mono type="tel"/>
        <Field label="E-mail" value={o.email} onChange={v=>setF('email',v)} type="email" hint="Optional · for digital copy"/>
        <Field label="Customer GST No." value={o.gstNumber} onChange={v=>setF('gstNumber',v.toUpperCase())} mono hint="Fill only if the customer wants a GST bill · printed on the PDF"/>
        <Field label="P.O. Reference" value={o.poRef} onChange={v=>setF('poRef',v)} mono hint="Leave blank — auto-assigned on save"/>
        <Field label="Lead Source" value={o.source} onChange={v=>setF('source',v)} hint="Walk-in / Reference / Digital / Repeat"/>
        <SectionHead n="02" label="Address"/>
        <Field label="Billing Address" value={o.billing} onChange={v=>setF('billing',v)} multiline required/>
        <Field label="Delivery Address" value={o.delivery} onChange={v=>setF('delivery',v)} multiline action="SAME AS BILLING" onAction={()=>setF('delivery',o.billing)}/>
        <Field label="Lift available?" value={o.liftAvailable} onChange={v=>setF('liftAvailable',v)} hint="If No — installation handling fee applies"/>

        <SectionHead n="03" label="Customer Profile"/>
        <Field label="Date of Birth" value={o.dob} onChange={v=>setF('dob',v)} type="date" mono required/>
        <Field label="Marriage Anniversary" value={o.anniversary} onChange={v=>setF('anniversary',v)} type="date" mono required/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>How did they hear about us? <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.awareness} onChange={e=>setF('awareness',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.awareness?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select an option…</option>
            {AWARENESS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>Purchase Pattern <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {PATTERNS.map(p=>{ const on=(o.purchasePattern||[]).includes(p); return (
              <label key={p} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:99,cursor:'pointer',border:`1px solid ${on?T.green:T.line}`,background:on?T.greenSoft:'#fff'}}>
                <input type="checkbox" checked={on} onChange={()=>togglePattern(p)} style={{width:14,height:14,accentColor:T.green,cursor:'pointer'}}/>
                <span style={{fontSize:12,fontWeight:600,color:on?T.green:T.ink3}}>{p}</span>
              </label>
            );})}
          </div>
        </div>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Purchasing For <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.purchasingFor} onChange={e=>setF('purchasingFor',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.purchasingFor?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select an option…</option>
            {PURCHASING.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>

        <SectionHead n="04" label="Site Measurements"/>
        {hasSofa && (
          <>
            <div style={{padding:'8px 14px',background:T.warnSoft,borderBottom:`1px solid ${T.line}`,fontSize:11,color:T.warn,fontWeight:700}}>Sofa in order — width, height & depth are mandatory (printed on the PDF)</div>
            <Field label="Sofa Width" value={o.sofaWidth} onChange={v=>setF('sofaWidth',v)} mono required hint="e.g. 84 in / 213 cm"/>
            <Field label="Sofa Height" value={o.sofaHeight} onChange={v=>setF('sofaHeight',v)} mono required/>
            <Field label="Sofa Depth" value={o.sofaDepth} onChange={v=>setF('sofaDepth',v)} mono required/>
          </>
        )}
        <Field label="Lift — Height" value={o.liftHeight} onChange={v=>setF('liftHeight',v)} mono hint="Information required from customer"/>
        <Field label="Lift — Width" value={o.liftWidth} onChange={v=>setF('liftWidth',v)} mono/>
        {String(o.liftAvailable||'').toLowerCase().startsWith('n') && (
          <>
            <Field label="Staircase Width" value={o.staircaseWidth} onChange={v=>setF('staircaseWidth',v)} mono hint="Needed when lift is not available"/>
            <Field label="Staircase Landing Height" value={o.staircaseLandingHeight} onChange={v=>setF('staircaseLandingHeight',v)} mono/>
          </>
        )}
        <Field label="Entry Door Width" value={o.entryDoorWidth} onChange={v=>setF('entryDoorWidth',v)} mono/>
        <Field label="Entry Door Height" value={o.entryDoorHeight} onChange={v=>setF('entryDoorHeight',v)} mono/>

        <SectionHead n="05" label={`Items · ${(o.items||[]).length}`} action="+ ADD ITEM" onAction={()=>nav('search')}/>
        <div style={{background:'#fff'}}>
          {(o.items||[]).map((it,i)=>{
            const mrpVal   = it.mrp||it.cpl||0;
            const discPct  = parseFloat(it.disc||'0')/100;
            const curPrice = (it.unitPrice>0) ? it.unitPrice : (mrpVal>0 ? Math.round(mrpVal*(1-discPct)) : 0);
            return (
            <div key={it.code+i} style={{padding:'11px 14px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3,flexWrap:'wrap'}}>
                    <span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:600}}>{it.code}</span>
                    <StockChip branch={it.branch||'KB'} count={it.inStock||0}/>
                    {(it.inStock===0||it.inStock===undefined)&&<Pill tone="warn" size="sm">OOS</Pill>}
                    {it.discontinued&&<Pill tone="bad" size="sm">DISCONTINUED{it.discSince?' since '+it.discSince:''}</Pill>}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,lineHeight:1.3}}>{it.name}</div>
                  {mrpVal>0&&<div style={{fontSize:10,color:T.ink4,marginTop:2}}>MRP: ₹{mrpVal.toLocaleString('en-IN')} /unit</div>}
                  <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>QTY</span>
                    <button onClick={()=>updateItemQty(i,-1)} style={{width:24,height:24,borderRadius:4,border:`1px solid ${T.line}`,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:T.ink}}>−</button>
                    <span style={{fontFamily:T.mono,fontSize:14,fontWeight:700,minWidth:20,textAlign:'center'}}>{it.qty}</span>
                    <button onClick={()=>updateItemQty(i,1)} style={{width:24,height:24,borderRadius:4,border:`1px solid ${T.line}`,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:T.ink}}>+</button>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>PRICE ₹</span>
                    <input
                      value={curPrice}
                      onChange={e=>{const v=Number(e.target.value)||0;setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,unitPrice:v,total:v*x.qty}:x)}));}}
                      style={{width:72,border:`1.5px solid ${T.green}`,borderRadius:4,padding:'3px 6px',fontFamily:T.mono,fontSize:13,fontWeight:700,textAlign:'right',color:T.ink}}
                    />
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>DISC</span>
                    <input
                      value={it.disc||''}
                      onChange={e=>{const v=e.target.value;const pct=parseFloat(v||0)/100;const newUp=Math.round((it.mrp||it.cpl||0)*(1-pct));setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,disc:v,unitPrice:newUp,total:newUp*x.qty}:x)}));}}
                      style={{width:46,border:`1px solid ${T.line}`,borderRadius:4,padding:'2px 6px',fontFamily:T.mono,fontSize:12,textAlign:'center'}}
                      placeholder="0%"
                    />
                  </div>
                  {/* Scheme flags — saved to CRM "Disc Allowed"; NOT printed on the PDF */}
                  <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>SCHEME</span>
                    {[['ageing','Ageing'],['sweetner','Sweetner']].map(([k,lbl])=>(
                      <label key={k} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:99,cursor:'pointer',border:`1px solid ${it[k]?T.green:T.line}`,background:it[k]?T.greenSoft:'#fff'}}>
                        <input type="checkbox" checked={!!it[k]} onChange={()=>toggleScheme(i,k)} style={{width:14,height:14,accentColor:T.green,cursor:'pointer'}}/>
                        <span style={{fontSize:11,fontWeight:600,color:it[k]?T.green:T.ink3}}>{lbl}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:T.mono,fontSize:15,fontWeight:700}}>₹{(curPrice*it.qty).toLocaleString('en-IN')}</div>
                  <div style={{fontSize:9,color:T.ink4,marginTop:1}}>×{it.qty} unit{it.qty>1?'s':''}</div>
                  <button onClick={()=>removeItem(i)} style={{marginTop:8,fontSize:11,color:T.bad,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>REMOVE</button>
                </div>
              </div>
            </div>
            );
          })}
          <div onClick={()=>nav('search')} style={{padding:14,display:'flex',alignItems:'center',gap:10,background:T.greenSoft,color:T.green,fontWeight:700,cursor:'pointer'}}>
            {Icon.search(T.green,16)}<span style={{fontSize:13}}>Search & add item</span>
          </div>
        </div>
        <SectionHead n="06" label="Commercials"/>
        <Field label="Discount Code" value={o.discountCode} onChange={v=>setF('discountCode',v)} mono hint="e.g. 11% or 11%+5%"/>
        <Field label="Additional Order Discount %" value={o.orderDiscount} onChange={v=>setF('orderDiscount',v.replace(/[^\d.]/g,''))} mono type="number" hint="Extra discount on the whole order (on top of per-item discounts). Shown on the PDF."/>
        <Field label="Planned Delivery" value={o.plannedDly} onChange={v=>setF('plannedDly',v)} mono required type="date"/>
        <Field label="Installation Note" value={o.installNote} onChange={v=>setF('installNote',v)} multiline/>
        <SectionHead n="07" label="Payment"/>
        <div style={{borderBottom:`1px solid ${T.line}`,padding:'11px 14px',background:'#fff'}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>PAYMENT MODE <span style={{color:T.bad,marginLeft:3}}>*</span></div>
          <select value={o.paymentMode} onChange={e=>setF('paymentMode',e.target.value)} style={{width:'100%',border:'none',outline:'none',fontSize:15,fontFamily:T.sans,color:o.paymentMode?T.ink:T.ink4,background:'transparent',padding:0,appearance:'none',WebkitAppearance:'none',cursor:'pointer'}}>
            <option value="">Select payment mode…</option>
            <option>Cash</option>
            <option>UPI (GPay / PhonePe / Paytm)</option>
            <option>IDBI QR</option>
            <option>Debit / Credit Card</option>
            <option>Cheque</option>
            <option>NEFT / RTGS / Bank Transfer</option>
            <option>Bajaj Finance EMI</option>
            <option>Pine Labs EMI</option>
          </select>
        </div>
        <Field label="Earnest Amount" value={o.earnest} onChange={v=>setF('earnest',v)} mono type="number" required/>
        <Field label="Receipt No. & Date" value={o.receiptNo} onChange={v=>setF('receiptNo',v)} mono/>
        <Field label="Follow-up Date" value={o.followUp} onChange={v=>setF('followUp',v)} mono type="date" hint="Reminder at 10:00 AM"/>
        <SectionHead n="08" label="Internal"/>
        <Field label="Salesperson" value={o.salesExec||user?.name||''} onChange={v=>setF('salesExec',v)} mono/>
        <Field label="Order Type" value={o.orderType||'B2C'} onChange={v=>setF('orderType',v)} hint="B2C / B2B / B2BE"/>
        <div style={{padding:'14px 14px 18px'}}>
          <div style={{background:T.ink,color:'#fff',borderRadius:8,padding:'14px 16px',fontFamily:T.mono}}>
            <div style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13}}><span>Items subtotal</span><span>₹{itemsSubtotal.toLocaleString('en-IN')}</span></div>
            {orderDiscAmt>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13,color:'#ffd27a'}}><span>Order disc {(orderDiscPct*100).toLocaleString('en-IN')}%</span><span>−₹{orderDiscAmt.toLocaleString('en-IN')}</span></div>}
            {[['CGST 9%',cgst],['SGST 9%',sgst]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',fontSize:13}}><span>{k}</span><span>₹{v.toLocaleString('en-IN')}</span></div>)}
            <div style={{height:1,background:'rgba(255,255,255,.2)',margin:'8px 0'}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:700}}><span>TOTAL</span><span>₹{total.toLocaleString('en-IN')}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginTop:4,color:'rgba(255,255,255,.6)'}}><span>Earnest</span><span>₹{(Number(o.earnest)||0).toLocaleString('en-IN')}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:700,color:'#ffd27a',marginTop:2}}><span>Balance</span><span>₹{balance.toLocaleString('en-IN')}</span></div>
          </div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,padding:'10px 14px',background:'#fff',borderTop:`1px solid ${T.line}`,flexShrink:0}}>
        <Btn onClick={()=>{ if((o.items&&o.items.length)&&!window.confirm('Discard this order and its items?'))return; try{localStorage.removeItem('4s_draft');}catch{} setOrder(BLANK_ORDER()); nav('home'); }}>Discard</Btn>
        <Btn primary full onClick={handleSave}>Save & Generate PDF →</Btn>
      </div>
    </div>
  );
}

// ─── PDF Preview ─────────────────────────────────────────────
function PDFPreviewScreen({ctx}) {
  const {order,nav} = ctx;
  const o = order;
  const {itemsSubtotal, orderDiscPct, orderDiscAmt, cgst, sgst, total} = orderTotals(o);
  const qrRef = useRef(null);

  useEffect(()=>{
    if(qrRef.current&&window.QRCode) {
      qrRef.current.innerHTML='';

// ─── WON Update ──────────────────────────────────────────────
function WONUpdateScreen({ctx,orderOverride,onClose}) {
  const o = orderOverride || ctx.order;
  const {nav,doUpdateWON} = ctx;
  const [won,setWon] = useState(o.won||'');
  async function submit() {
    if(!won||won.length<6) return ctx.showToast('Enter a valid WON number','bad');
    const ok = await doUpdateWON(o.no, o.internalNo, won.toUpperCase().startsWith('WON')?won.toUpperCase():'WON'+won);
    if(ok) { if(onClose) onClose(); else nav('history'); }
  }
  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px 14px',flexShrink:0}}>
        <button onClick={()=>onClose?onClose():nav('history')} style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.4}}>Update WON / SO</div>
      </div>
      <div className="scroll" style={{padding:'0 18px'}}>
        <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
            <span style={{fontFamily:T.mono,fontSize:11,color:T.ink2,fontWeight:600}}>{o.no}</span>
            <Pill tone="warn" size="sm">PENDING WON</Pill>
          </div>
          <div style={{fontSize:16,fontWeight:700}}>{o.customer}</div>
          <div style={{fontSize:11,color:T.ink4,marginTop:2,fontFamily:T.mono}}>{o.date} · ₹{(o.amt||0).toLocaleString('en-IN')}</div>
        </div>
        <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1,marginBottom:8}}>GODREJ SO / WON NUMBER</div>
        <div style={{background:'#fff',border:`2px solid ${T.green}`,borderRadius:8,padding:'14px 16px',marginBottom:12}}>
          <input value={won} onChange={e=>setWon(e.target.value)} placeholder="WON036031" autoCapitalize="characters" style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:24,fontWeight:700,letterSpacing:1.5,color:T.ink,background:'transparent'}}/>
          <div style={{fontSize:11,color:T.ink4,marginTop:4}}>From Godrej confirmation email</div>
        </div>
        <div style={{padding:12,background:T.greenSoft,border:`1px solid ${T.greenLine}`,borderRadius:6,display:'flex',gap:10,marginBottom:20}}>
          {Icon.bolt(T.green,14)}
          <div style={{fontSize:11.5,color:T.ink2,lineHeight:1.5}}><b style={{color:T.green}}>This updates:</b> the saved PDF, customer QR copy, the Orders sheet, and the Change-log sheet.</div>
        </div>
        <Btn primary full size="lg" onClick={submit}>Update & re-issue PDF</Btn>
      </div>
    </div>
  );

  const [pinging,setPinging]       = useState(false);
  const [debugResult,setDebugResult] = useState(null);
  const [debugging,setDebugging]   = useState(false);

  async function runDebug() {
    setDebugging(true); setDebugResult(null);
    try {
      const res = await apiGet('debugPriceList', {}, 20000);
      setDebugResult(res);
    } catch(e) {
      setDebugResult({ ok:false, error: e.message });
    } finally { setDebugging(false); }
  }

  function saveUrl() {
    const trimmed = apiUrl.trim();
    localStorage.setItem('4s_api_url', trimmed);
    setPingResult(null);
    showToast('URL saved ✓ — tap "Test connection" to verify');
  }

  async function testConnection() {
    const url = (apiUrl||'').trim() || localStorage.getItem('4s_api_url');
    if (!url) { showToast('Paste your Apps Script URL first', 'warn'); return; }
    setPinging(true); setPingResult(null);
    try {
      const res = await apiGet('ping', {}, 20000);
      if (res && res.ok) {
        const opsOk    = res.opsSheet?.ok;
        const opsSheets = res.opsSheet?.sheets || [];
        setPingResult({
          ok: true,
          msg: 'Connected ✓' + (opsOk ? ' · OPS sheet found' : ' · OPS sheet missing'),
          detail: opsSheets.join(', '),
          sheetUrl: res.opsSheet?.url || '',
        });
        showToast('Connection OK ✓');
      } else {
        setPingResult({ ok:false, msg: res?.error || 'Server returned an error' });
      }
    } catch(e) {
      setPingResult({ ok:false, msg: e.message });
    } finally { setPinging(false); }
  }

  return (
    <div className="screen">
      <div style={{flexShrink:0,padding:'14px 18px 12px'}}>

            </div>

            {/* Persistent error display */}
            {priceSyncError && (
              <div style={{marginTop:10,padding:'10px 12px',background:T.badSoft,border:`1px solid ${T.bad}`,borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:700,color:T.bad,marginBottom:4}}>Error details:</div>
                <div style={{fontSize:11,color:T.ink2,lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:T.mono}}>{priceSyncError}</div>
              </div>
            )}

            <div style={{marginTop:10,padding:'10px 12px',background:T.paper,border:`1px solid ${T.line}`,borderRadius:6,fontFamily:T.mono,fontSize:11}}>
              {(priceItems||[]).length > 0 ? (
                <>
                  {[...new Set((priceItems||[]).map(i=>i.sheet))].sort().map(s=>{
                    const n = (priceItems||[]).filter(i=>i.sheet===s).length;
                    return <div key={s} style={{display:'flex',justifyContent:'space-between',color:T.ink2,marginBottom:3}}><span>{s}</span><span style={{fontWeight:700,color:T.ink}}>{n} SKUs</span></div>;
                  })}
                  <div style={{display:'flex',justifyContent:'space-between',color:T.ink2,marginTop:4,borderTop:`1px solid ${T.line}`,paddingTop:6}}>
                    <span>Total SKUs</span>
                    <span style={{fontWeight:700,color:T.ok}}>{(priceItems||[]).length}</span>
                  </div>
                </>
              ) : (
                <div style={{color:T.warn}}>No items loaded — tap "Sync now" to fetch from OPS sheet</div>
              )}
            </div>
            <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>
              <Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncPriceList} disabled={loading}>
                {loading?'Loading…':(priceItems||[]).length===0?'Load price list':'Sync now'}
              </Btn>
              <Btn full icon={Icon.refresh(T.green,14)} onClick={runDebug} disabled={debugging}>
                {debugging?'Checking…':'Debug'}
              </Btn>
            </div>

            {/* Debug result */}
            {debugResult && (
              <div style={{marginTop:10,padding:'10px 12px',background:T.paper,border:`1px solid ${debugResult.ok?T.greenLine:T.bad}`,borderRadius:6}}>
                {debugResult.ok ? (
                  <>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:T.green}}>OPS: {debugResult.opsName}</div>
                      <span style={{fontSize:9,fontFamily:T.mono,background:debugResult.scriptVersion?T.okSoft:T.badSoft,color:debugResult.scriptVersion?T.ok:T.bad,padding:'2px 6px',borderRadius:3,fontWeight:700}}>
                        API {debugResult.scriptVersion||'OLD — REDEPLOY!'}
                      </span>
                    </div>
                    {!debugResult.scriptVersion && (
                      <div style={{fontSize:11,color:T.bad,marginBottom:8,padding:'6px 8px',background:T.badSoft,borderRadius:4}}>
                        ⚠ The deployed Apps Script did not report a version. Copy the latest Code.gs → save in Apps Script → Deploy → Manage deployments → Edit → New version.
                      </div>
                    )}
                    {debugResult.scriptVersion && debugResult.scriptVersion!=='v19' && (
                      <div style={{fontSize:10,color:T.ink4,marginBottom:8}}>
                        Latest available is v19 — a redeploy is optional but recommended for the newest fixes.
                      </div>
                    )}
                    <div style={{fontSize:10,fontWeight:700,color:T.ink4,marginBottom:4}}>
                      PRICE LIST TABS ({(debugResult.priceConfig||[]).length} configured):
                    </div>
                    {(debugResult.priceConfig||[]).map(cfg => {
                      const info = (debugResult.tabInfo||{})[cfg.tab] || {};
                      const hdr  = (info.header||[]).filter(Boolean);
                      const samp = (info.sample||[]).filter(Boolean);
                      const hasError = !!info.error;
                      return (
                        <div key={cfg.tab} style={{marginBottom:6,padding:'8px 10px',background:'#fff',borderRadius:4,border:`1px solid ${hasError?T.bad:T.line}`}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div style={{fontSize:10,fontWeight:700,color:hasError?T.bad:T.ink}}>{cfg.tab}</div>
                            <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono}}>{info.totalRows||0} rows</div>
                          </div>
                          <div style={{fontSize:9,color:T.ink3,marginTop:2}}>Category: <b>{cfg.cat}</b></div>
                          {hasError
                            ? <div style={{fontSize:9,color:T.bad,marginTop:2}}>{info.error}</div>
                            : <>
                                <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono,marginTop:3}}>
                                  Header: {hdr.length ? hdr.slice(0,8).join(' | ') : '(empty)'}
                                </div>
                                {samp.length > 0 && (
                                  <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono,marginTop:1,opacity:0.7}}>
                                    Row 2: {samp.slice(0,6).join(' | ')}
                                  </div>
                                )}
                              </>
                          }
                        </div>
                      );
                    })}
                    {!(debugResult.priceConfig||[]).length && (
                      <div style={{fontSize:11,color:T.bad}}>Price_Lists sheet is empty or missing.</div>
                    )}
                  </>
                ) : (
                  <div style={{fontSize:11,color:T.bad,fontFamily:T.mono,whiteSpace:'pre-wrap'}}>{debugResult.error}</div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* ── Stock sync card ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>STOCK SYNC</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,letterSpacing:-0.3}}>Stock Master</div>
                <div style={{fontSize:11,color:T.ink3,marginTop:4}}>Last synced: {syncedAt?new Date(syncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'Never'}</div>
              </div>
              <Pill tone={syncedAt?'ok':'warn'} mono>{syncedAt?'FRESH':'STALE'}</Pill>
            </div>
            <div style={{marginTop:12}}><Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncStock}>Sync stock now</Btn></div>
          </div>
        </div>

        {/* ── Account ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>ACCOUNT</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:'14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:40,height:40,borderRadius:8,background:T.green,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:T.mono,fontSize:16,fontWeight:700}}>{(user?.name||'?').slice(0,2).toUpperCase()}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700}}>{user?.name||'—'}</div>
                <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono}}>{user?.code||'—'} · {user?.role||'—'} · {user?.branch||'—'}</div>
              </div>
            </div>
          </div>
        </div>

        <div style={{padding:'0 18px 8px'}}>
          <Btn full danger onClick={doSignOut}>Sign out</Btn>
          <div style={{textAlign:'center',fontSize:10,color:T.ink4,marginTop:14,fontFamily:T.mono}}>4S INTERIORS · BUILD 2026.05.20 · v2.2-pwa</div>
        </div>
        <div style={{height:24}}/>
      </div>
      <BottomNav screen="settings" nav={nav}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════
const loadingEl = document.getElementById('app-loading');
if(loadingEl) loadingEl.style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{width:'100%',display:'flex',justifyContent:'center',background:'#d9d5cc'}}>
    <div class="app-shell"><App/></div>
  </div>
);
</script>

<!-- ═══════════════════════════════════════════════════════════
     SERVICE WORKER REGISTRATION
     Must run after the page loads (not inside Babel script tag)
     ════════════════════════════════════════════════════════ -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// PWA install prompt (Android Chrome "Add to Home Screen" banner)
let deferredInstallPrompt = null;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show our banner after 3 s so it doesn't interrupt the first load
  setTimeout(() => { if (banner) banner.classList.add('visible'); }, 3000);
});

if (banner) {
  banner.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    banner.classList.remove('visible');
    console.log('Install outcome:', outcome);
  });
}

window.addEventListener('appinstalled', () => {
  banner.classList.remove('visible');
  console.log('PWA installed successfully');
});
</script>
