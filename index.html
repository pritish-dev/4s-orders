// ═══════════════════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════════════════
function getApiUrl() { return localStorage.getItem('4s_api_url') || ''; }

async function apiGet(action, params = {}) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured. Go to Settings.');
  const cb  = 'cb' + Date.now();
  const qs  = new URLSearchParams({ action, callback: cb, ...params }).toString();
  return new Promise((res, rej) => {
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); rej(new Error('Request timed out.')); }, 15000);
    function cleanup() { clearTimeout(timeout); delete window[cb]; script.remove(); }
    window[cb] = (data) => { cleanup(); res(data); };
    script.onerror = () => { cleanup(); rej(new Error('Network error — check API URL.')); };
    script.src = url + '?' + qs;
    document.head.appendChild(script);
  });
}

async function apiPost(body) {
  const url = getApiUrl();
  if (!url) throw new Error('API URL not configured.');
  const r = await fetch(url, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'text/plain' }, // avoid CORS preflight
    redirect: 'follow',
  });
  if (!r.ok) throw new Error('Server error: ' + r.status);
  return r.json();
}

function Pill({children,tone='neutral',size='md',mono=false}) {
  const map = {neutral:{bg:T.paper2,fg:T.ink2,bd:T.line},ok:{bg:T.okSoft,fg:T.ok,bd:'#b7dbc1'},warn:{bg:T.warnSoft,fg:T.warn,bd:'#e6cc95'},bad:{bg:T.badSoft,fg:T.bad,bd:'#e0b7ae'},green:{bg:T.greenSoft,fg:T.green,bd:T.greenLine},ink:{bg:T.ink,fg:'#fff',bd:T.ink}};
  const c = map[tone]||map.neutral;
  const s = size==='sm'?{fs:10,px:6,py:2,h:16}:{fs:11,px:8,py:3,h:20};
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,height:s.h,padding:`0 ${s.px}px`,borderRadius:4,background:c.bg,color:c.fg,border:`1px solid ${c.bd}`,fontFamily:mono?T.mono:T.sans,fontSize:s.fs,fontWeight:600,letterSpacing:mono?0:0.2,textTransform:mono?'none':'uppercase',whiteSpace:'nowrap'}}>{children}</span>;
}

function Btn({children,primary,danger,ghost,full,size='md',icon,onClick,disabled,type='button'}) {
  const h = size==='lg'?52:size==='sm'?32:44;
  const fs = size==='lg'?16:size==='sm'?13:14;
  let bg=T.card,fg=T.ink,bd=T.line2;
  if(primary){bg=T.green;fg='#fff';bd=T.green;}
  if(danger){bg=T.bad;fg='#fff';bd=T.bad;}
  if(ghost){bg='transparent';fg=T.ink;bd='transparent';}
  if(disabled){bg=T.paper2;fg=T.ink4;bd=T.line;}
  return <button type={type} onClick={onClick} disabled={disabled} style={{height:h,padding:'0 16px',borderRadius:6,background:bg,color:fg,border:`1px solid ${bd}`,fontFamily:T.sans,fontWeight:600,fontSize:fs,letterSpacing:-0.1,width:full?'100%':undefined,cursor:disabled?'not-allowed':'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,flexShrink:0,opacity:disabled?.5:1}}>{icon}{children}</button>;
}

function Field({label,value,onChange,mono,hint,required,action,onAction,multiline,type='text',placeholder,readOnly}) {
  const [focused,setFocused] = React.useState(false);
  const style = {fontSize:15,fontFamily:mono?T.mono:T.sans,color:T.ink,fontWeight:mono?500:400,lineHeight:'22px',background:'transparent',border:'none',outline:'none',width:'100%',resize:'none',padding:0};
  return (
    <div style={{borderBottom:`1px solid ${focused?T.green:T.line}`,padding:'11px 14px',background:'#fff',transition:'border-color .15s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}}>
        <span style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:0.8,textTransform:'uppercase',fontFamily:T.sans}}>{label}{required&&<span style={{color:T.bad,marginLeft:3}}>*</span>}</span>
        {action&&<span onClick={onAction} style={{fontSize:11,color:T.green,fontWeight:600,fontFamily:T.sans,cursor:'pointer'}}>{action}</span>}
      </div>
      {multiline
        ? <textarea value={value} onChange={e=>onChange&&onChange(e.target.value)} rows={3} placeholder={placeholder||'Tap to fill'} readOnly={readOnly} style={{...style,lineHeight:'20px',fontSize:14}} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>
        : <input type={type} value={value} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder||'Tap to fill'} readOnly={readOnly} style={style} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>}
      {hint&&<div style={{fontSize:11,color:T.ink4,marginTop:3}}>{hint}</div>}
    </div>
  );
}

function StockChip({branch,count,low}) {
  const tone = count===0?'bad':low?'warn':'ok';
  const bdc = tone==='bad'?'#e0b7ae':tone==='warn'?'#e6cc95':'#b7dbc1';
  const bg  = tone==='bad'?T.badSoft:tone==='warn'?T.warnSoft:T.okSoft;
  const fg  = tone==='bad'?T.bad:tone==='warn'?T.warn:T.ok;
  return <span style={{display:'inline-flex',alignItems:'center',borderRadius:4,overflow:'hidden',border:`1px solid ${bdc}`,fontFamily:T.mono,fontSize:10,fontWeight:600,height:18}}><span style={{background:T.ink,color:'#fff',padding:'0 5px',height:'100%',display:'inline-flex',alignItems:'center',letterSpacing:.5}}>{branch}</span><span style={{background:bg,color:fg,padding:'0 6px',height:'100%',display:'inline-flex',alignItems:'center'}}>{count}</span></span>;
}

function SectionHead({n,label,action,onAction}) {
  return <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'baseline',justifyContent:'space-between',background:T.paper}}><div style={{display:'flex',alignItems:'baseline',gap:8}}><span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:700}}>{n}</span><span style={{fontSize:12,fontWeight:700,color:T.ink2,letterSpacing:1,textTransform:'uppercase'}}>{label}</span></div>{action&&<span onClick={onAction} style={{fontSize:11,color:T.green,fontWeight:700,cursor:'pointer'}}>{action}</span>}</div>;

function Spinner({size=20,color=T.green}) {
  return <div style={{width:size,height:size,border:`2px solid ${color}22`,borderTopColor:color,borderRadius:'50%',animation:'spin .7s linear infinite',flexShrink:0}}/>;

function Toast({msg,type='ok',onClose}) {
  React.useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  const bg = type==='ok'?T.green:type==='warn'?T.warn:T.bad;
  return <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.2)',animation:'slideUp .2s ease'}}>{msg}</div>;
}

function BottomNav({screen,nav}) {
  const tabs = [
    {id:'home',  label:'Home',   icon: c => Icon.home(c)},
    {id:'search',label:'Stock',  icon: c => Icon.search(c)},
    {id:'order', label:'New',    icon: c => Icon.plus(c), primary:true},
    {id:'history',label:'Orders',icon: c => Icon.doc(c)},
    {id:'settings',label:'Me',  icon: c => Icon.user(c)},
  ];
  return (
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-around',padding:'8px 6px 24px',background:'#fff',borderTop:`1px solid ${T.line}`,flexShrink:0}}>
      {tabs.map(t=>{
        const isActive = t.id===screen;
        const c = t.primary?'#fff':isActive?T.green:T.ink4;
        return <div key={t.id} onClick={()=>nav(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}>
          <div style={{width:t.primary?44:32,height:t.primary?44:32,borderRadius:t.primary?12:6,background:t.primary?T.green:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>{t.icon(c)}</div>
          <div style={{fontSize:10,color:isActive?T.green:T.ink4,fontWeight:600}}>{t.label}</div>
        </div>;
      })}
    </div>
  );
}

function StockRibbon({syncedAt}) {
  const stale = syncedAt && (Date.now()-new Date(syncedAt).getTime() > 12*60*60*1000);
  const label = syncedAt ? new Date(syncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : 'Not synced';
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 14px',background:stale?T.warnSoft:T.greenSoft,borderBottom:`1px solid ${stale?'#e6cc95':T.greenLine}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:7,height:7,borderRadius:99,background:stale?T.warn:T.ok,flexShrink:0}}/>
        <span style={{fontSize:10,fontWeight:700,color:stale?T.warn:T.green,letterSpacing:.3,textTransform:'uppercase'}}>STOCK · {new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:T.mono,fontSize:10,color:stale?T.warn:T.green}}>{label}</span>
      </div>
    </div>
  );
}

// PDF GENERATOR  — matches physical Order Confirmation Form
// ═══════════════════════════════════════════════════════════
function generatePDF(order) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const pw  = 210;
  const ph  = 297;
  const m   = 10;   // side margin
  const cw  = pw - m*2;  // content width = 190mm

  const subtotal = order.items.reduce((s,i)=>s+i.total,0);
  const cgst     = Math.round(subtotal*0.09);
  const sgst     = Math.round(subtotal*0.09);
  const total    = subtotal+cgst+sgst;
  const balance  = total-(Number(order.earnest)||0);
  const serialNo = order.internalNo ? String(order.internalNo) : (order.no||'—');
  const R=240,G=64,B=64;  // #F04040 coral red

  // ── Header band ──────────────────────────────────────────
  doc.setFillColor(R,G,B);
  doc.rect(0,0,pw,22,'F');

  // "interio" brand text (left side of header)
  doc.setTextColor(255,255,255);
  doc.setFont('times','bolditalic');
  doc.setFontSize(22);
  doc.text('interio', m+1, 14);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.text('by Godrej', m+1, 19.5);

  // Thin white separator line
  doc.setDrawColor(255,255,255);
  doc.setLineWidth(0.3);
  doc.line(m+37, 8, m+37, 20);

  // 4S Interiors dealer info (right of separator)
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.text('4S INTERIORS', m+41, 12);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.text('Patia Square, Chandrasekharpur, Bhubaneswar - 751024', m+41, 16.5);
  doc.text('Ph: 0674-2744906  |  GSTIN: 21ADAPS1043C1ZE', m+41, 20.5);

  // Serial number top-right
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.text('SL #'+serialNo, pw-m, 12, {align:'right'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.text('ORDER CONFIRMATION FORM', pw-m, 18, {align:'right'});

  // ── Title strip ──────────────────────────────────────────
  let y = 22;
  doc.setFillColor(245,245,245);
  doc.rect(0,y,pw,8,'F');
  doc.setDrawColor(220,220,220);
  doc.line(0,y,pw,y);
  doc.line(0,y+8,pw,y+8);
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(R,G,B);
  doc.text('ORDER CONFIRMATION', pw/2, y+5.5, {align:'center'});
  y += 8;

  // ── WON / Order meta row ─────────────────────────────────
  doc.setDrawColor(200,200,200);
  doc.setLineWidth(0.3);

  const col1 = m;

  // Deliver-to

  doc.setFontSize(7);
  doc.setTextColor(R,G,B);

  // ── Instructions / Discount / Payment strip ───────────────

  // ── Items table ──────────────────────────────────────────
  // Columns: Sl | Br | Item Code | Qty | Product Description | MRP | CPL/Unit Price | Disc% | Total
  const cols = {
    sl:   {x:m,      w:7},

    up:   {x:m+140,  w:20},

    tot:  {x:m+173,  w:cw-(173)},

  // Header row

  doc.rect(m, y, cw, thH, 'F');

  doc.setFont('helvetica','bold');
  doc.setFontSize(6.5);
  const headers = [
    [cols.sl,   'Sl.'],
    [cols.br,   'Br.'],
    [cols.code, 'Item Code'],
    [cols.qty,  'Qty'],
    [cols.desc, 'Product Description'],
    [cols.mrp,  'MRP (₹)'],
    [cols.up,   'Unit Price'],
    [cols.disc, 'Disc%'],
    [cols.tot,  'Total (₹)'],
  ];
  headers.forEach(([c,lbl]) => doc.text(lbl, c.x+1, y+5.5));
  y += thH;

  // Item rows
  const rowH = 12;
  order.items.forEach((it, i) => {
    if (i%2===0) { doc.setFillColor(255,255,255); } else { doc.setFillColor(252,248,248); }
    doc.rect(m, y, cw, rowH, 'F');
    doc.setDrawColor(220,210,210);
    doc.line(m, y+rowH, m+cw, y+rowH);

    doc.setTextColor(100,100,100);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.text(String(i+1), cols.sl.x+1, y+5);
    doc.text(it.branch||'KB', cols.br.x+1, y+5);
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.text(it.code||'', cols.code.x+1, y+5);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.text(String(it.qty), cols.qty.x+cols.qty.w/2, y+7.5, {align:'center'});

    // Description (bold name + code hint)

    doc.setFontSize(7.5);
    doc.setTextColor(30,30,30);
    const nameLines = doc.splitTextToSize(it.name, cols.desc.w-3);
    doc.text(nameLines[0], cols.desc.x+1, y+5.5);
    if (nameLines[1]) { doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100); doc.text(nameLines[1], cols.desc.x+1, y+9.5); }

    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.setTextColor(30,30,30);
    const mrpVal = it.mrp||it.cpl||0;
    doc.text(mrpVal>0?mrpVal.toLocaleString('en-IN'):'—', cols.mrp.x+cols.mrp.w-1, y+7.5, {align:'right'});
    doc.text((it.unitPrice||it.cpl||0).toLocaleString('en-IN'), cols.up.x+cols.up.w-1, y+7.5, {align:'right'});
    doc.text(it.disc||'—', cols.disc.x+cols.disc.w/2, y+7.5, {align:'center'});

    doc.text(it.total.toLocaleString('en-IN'), cols.tot.x+cols.tot.w-1, y+7.5, {align:'right'});
    y += rowH;
  });

  // Outer border for table
  doc.setDrawColor(200,180,180);
  doc.rect(m, y-rowH*order.items.length-thH, cw, rowH*order.items.length+thH, 'S');

  // ── Totals section ────────────────────────────────────────
  y += 3;
  const totLX = m + cw*0.55;
  const totW  = cw*0.45;

  const tRow = (k, v, bold=false, clr=[30,30,30]) => {

  };

  doc.setDrawColor(200,180,180);
  doc.rect(totLX, y-2, totW, 38, 'S');
  doc.setFillColor(250,245,245);
  doc.rect(totLX, y-2, totW, 8, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(7.5);
  doc.setTextColor(R,G,B);
  doc.text('INVOICE SUMMARY', totLX+2, y+3.5);
  y += 8;

  tRow('Sub Total (excl. GST)', '₹'+subtotal.toLocaleString('en-IN'));
  tRow('CGST @ 9%', '₹'+cgst.toLocaleString('en-IN'));
  tRow('SGST @ 9%', '₹'+sgst.toLocaleString('en-IN'));
  doc.setDrawColor(R,G,B);
  doc.setLineWidth(0.4);
  doc.line(totLX, y, totR, y);
  y += 3;
  tRow('TOTAL AMOUNT', '₹'+total.toLocaleString('en-IN'), true, [R,G,B]);
  doc.setLineWidth(0.3);
  doc.setDrawColor(200,180,180);
  doc.line(totLX, y, totR, y);
  y += 2;
  tRow('Earnest / Advance Paid', '₹'+(Number(order.earnest)||0).toLocaleString('en-IN'));
  if (order.receiptNo) { doc.setFont('helvetica','italic'); doc.setFontSize(6.5); doc.setTextColor(120,120,120); doc.text('Rcpt: '+order.receiptNo, totLX+2, y-1); }
  doc.setDrawColor(30,30,30);
  doc.line(totLX, y, totR, y);
  y += 2;
  tRow('BALANCE DUE', '₹'+balance.toLocaleString('en-IN'), true, [30,30,30]);

  // ── Note / Terms row ──────────────────────────────────────
  const noteY = y + 4;
  doc.setLineWidth(0.3);
  doc.setDrawColor(200,200,200);
  doc.rect(m, noteY, cw, 12, 'S');
  doc.setFont('helvetica','bold');
  doc.setFontSize(6.5);
  doc.setTextColor(R,G,B);
  doc.text('NOTE:', m+2, noteY+4);
  doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);
  doc.setTextColor(80,80,80);
  doc.text('1. Prices are inclusive of taxes as applicable.   2. Goods once sold will not be taken back.   3. Delivery subject to stock availability.   4. Balance to be cleared before delivery.', m+12, noteY+4);
  doc.text('5. This is a computer-generated document and does not require a physical signature unless otherwise specified.', m+2, noteY+9);
  y = noteY + 12;

  // ── Signature row ─────────────────────────────────────────
  const sigH = 18;
  doc.rect(m, y, cw, sigH, 'S');
  doc.line(m+cw/3, y, m+cw/3, y+sigH);
  doc.line(m+cw*2/3, y, m+cw*2/3, y+sigH);
  [
    [m+2,          'Customer Signature'],
    [m+cw/3+2,     'Sales Executive'],
    [m+cw*2/3+2,   'Store Manager / Auth. Signatory'],
  ].forEach(([sx,lbl]) => {
    doc.setFont('helvetica','normal');
    doc.setFontSize(6.5);
    doc.setTextColor(120,120,120);
    doc.text(lbl, sx, y+sigH-2);

  y += sigH;

  // ── Footer ────────────────────────────────────────────────
  doc.setFillColor(R,G,B);
  doc.rect(0, y, pw, 14, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.text('4S INTERIORS', m, y+5);
  doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);
  doc.text('Patia Square, Chandrasekharpur, Bhubaneswar - 751024  |  Ph: 0674-2744906  |  GSTIN: 21ADAPS1043C1ZE', m, y+10);
  doc.setFont('times','italic');
  doc.setFontSize(8);
  doc.text('interio by Godrej', pw-m, y+7, {align:'right'});

  return doc;
}


// ═══════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════
const { useState, useEffect, useRef, useCallback } = React;

const BLANK_ORDER = () => ({
  no:'', customer:'', phone:'', alt:'', email:'',
  billing:'', delivery:'', liftAvailable:'Yes',
  customerCode:'', poRef:'', source:'Walk-in',
  discountCode:'', plannedDly:'', installNote:'',
  paymentMode:'', earnest:'', receiptNo:'',
  followUp:'', salesExec:'', won:'',
  orderType:'B2C', items:[],
});

function App() {
  const [screen,   setScreen]  = useState('loading');
  const [user,     setUser]    = useState(null);
  const [items,    setItems]   = useState([]);
  const [orders,   setOrders]  = useState([]);
  const [syncedAt, setSyncedAt]= useState(null);
  const [order,    setOrder]   = useState(BLANK_ORDER());
  const [selOrder, setSelOrder]= useState(null);
  const [toast,    setToast]   = useState(null);
  const [loading,  setLoading] = useState(false);

  const showToast = (msg,type='ok') => setToast({msg,type});
  const nav = useCallback((s) => setScreen(s), []);

  // Restore session
  useEffect(() => {
    const saved = localStorage.getItem('4s_user');
    const apiUrl = localStorage.getItem('4s_api_url');
    if (saved) {
      try { setUser(JSON.parse(saved)); setScreen(apiUrl ? 'home' : 'settings'); }
      catch { setScreen(apiUrl ? 'login' : 'setup'); }
    } else {
      setScreen(apiUrl ? 'login' : 'setup');
    }
  }, []);

  // Load stock on login
  useEffect(() => {
    if (!user) return;
    const cached = localStorage.getItem('4s_items');
    if (cached) try { setItems(JSON.parse(cached)); } catch {}
    syncStock();
  }, [user]);

  // Handle deep-link action from PWA shortcut (?action=...)
  useEffect(() => {
    const sp = new URLSearchParams(window.location.search);
    const action = sp.get('action');
    if (action === 'new-order' && user) { setOrder({...BLANK_ORDER(),salesExec:user?.name||''}); nav('order'); }
    if (action === 'history' && user) nav('history');
  }, [user]);

  async function syncStock() {
    setLoading(true);
    try {
      const res = await apiGet('stock');
      if (res.ok) {
        setItems(res.items);
        setSyncedAt(res.syncedAt || new Date().toISOString());
        localStorage.setItem('4s_items', JSON.stringify(res.items));
        showToast(res.items.length + ' items synced ✓');
      } else {
        showToast(res.error || 'Sync failed — check sheet data', 'bad');
      }
    } catch(e) {
      showToast('Sync failed: ' + e.message, 'bad');
    } finally {
      setLoading(false);
    }
  }

  async function loadOrders() {
    setLoading(true);
    try {
      const res = await apiGet('orders', { exec: user?.name || '' });
      if (res.ok) {
        setOrders(res.orders);
        localStorage.setItem('4s_orders', JSON.stringify(res.orders));
      } else showToast(res.error||'Failed to load orders','bad');
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doLogin(username, password) {
    setLoading(true);
    try {
      const res = await apiGet('login', { username, password });
      if (res.ok) {
        setUser(res.user);
        localStorage.setItem('4s_user', JSON.stringify(res.user));
        showToast('Welcome, '+res.user.name+'!');
        nav('home');
      } else {
        showToast(res.error||'Login failed','bad');
      }
    } catch(e) { showToast(e.message,'bad'); }
    finally { setLoading(false); }
  }

  async function doSaveOrder(draft) {
    setLoading(true);
    try {
      const subtotal = draft.items.reduce((s,i)=>s+i.total,0);
      const cgst = Math.round(subtotal*.09);
      const sgst = Math.round(subtotal*.09);
      const res = await apiPost({ action:'saveOrder', order:{ ...draft, totalWithTax: subtotal+cgst+sgst } });
      if (res.ok) {
        const saved = {...draft, no: res.orderNo, internalNo: res.internalNo};
        setOrder(saved);
        showToast('Order '+res.orderNo+' saved ✓');
        return saved;
      } else {
        showToast(res.error||'Save failed','bad');
        return null;
      }
    } catch(e) {
      showToast('Saved offline — sync needed','warn');
      const q = JSON.parse(localStorage.getItem('4s_queue')||'[]');
      q.push(draft);
      localStorage.setItem('4s_queue', JSON.stringify(q));
      return draft;
    } finally { setLoading(false); }
  }

  async function doUpdateWON(orderNo, internalNo, won) {
    setLoading(true);
    try {
      const res = await apiPost({ action:'updateWON', orderNo, internalNo, won, updatedBy: user?.name });
      if (res.ok) { showToast('WON updated ✓'); loadOrders(); return true; }
      else { showToast(res.error||'Update failed','bad'); return false; }
    } catch(e) { showToast(e.message,'bad'); return false; }
    finally { setLoading(false); }
  }

  function doSignOut() {
    localStorage.removeItem('4s_user');
    setUser(null);
    setOrder(BLANK_ORDER());
    setOrders([]);
    nav('login');
  }

  const ctx = { user, items, orders, syncedAt, order, setOrder, selOrder, setSelOrder, loading, showToast, nav, doLogin, doSaveOrder, doUpdateWON, doSignOut, syncStock, loadOrders };

  const screens = {
    loading: <LoadingScreen/>,
    setup:   <SetupScreen   ctx={ctx}/>,
    login:   <LoginScreen   ctx={ctx}/>,
    home:    <HomeScreen    ctx={ctx}/>,
    search:  <SearchScreen  ctx={ctx}/>,
    order:   <OrderFormScreen ctx={ctx}/>,
    pdf:     <PDFPreviewScreen ctx={ctx}/>,
    history: <HistoryScreen ctx={ctx}/>,
    won:     <WONUpdateScreen ctx={ctx}/>,
    settings:<SettingsScreen ctx={ctx}/>,
  };

  return (
    <div className="app-shell">
      {screens[screen] || screens.home}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {loading && <div style={{position:'fixed',top:16,right:16,zIndex:9998}}><Spinner size={22}/></div>}
    </div>
  );
}

    ctx.showToast('API URL saved ✓');

  return (
    <div className="screen" style={{padding:'40px 24px',background:T.paper}}>
      <FSLogo size={36}/>
      <h1 style={{fontSize:28,fontWeight:700,letterSpacing:-1,lineHeight:1.1,marginTop:24,color:T.ink}}>First-time setup</h1>
      <p style={{fontSize:13,color:T.ink3,lineHeight:1.6,marginTop:8}}>Paste your Google Apps Script Web App URL below. You only need to do this once per device.</p>
      <div style={{marginTop:24,background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,overflow:'hidden'}}>
        <div style={{padding:'12px 14px',borderBottom:`1px solid ${T.line}`}}>
          <div style={{fontSize:10,fontWeight:700,color:T.ink4,letterSpacing:.8,textTransform:'uppercase',marginBottom:6}}>APPS SCRIPT URL</div>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={{width:'100%',border:'none',outline:'none',fontSize:13,fontFamily:T.mono,color:T.ink,padding:0,background:'transparent'}}/>
        </div>
      </div>
      <div style={{marginTop:16,padding:14,background:T.greenSoft,border:`1px solid ${T.greenLine}`,borderRadius:8,fontSize:12,color:T.ink3,lineHeight:1.6}}>
        <b style={{color:T.green}}>How to get this URL:</b><br/>
        1. Open script.google.com → paste Code.gs<br/>
        2. Run → ensureSheets (one-time)<br/>
        3. Deploy → New deployment → Web app<br/>
        4. Execute as: Me | Anyone can access<br/>
        5. Copy the URL here
      </div>
      <div style={{marginTop:20}}>
        <Btn primary full size="lg" onClick={save}>Save & Continue →</Btn>
      </div>
      <div style={{marginTop:12,textAlign:'center'}}>
        <span onClick={()=>ctx.nav('login')} style={{fontSize:12,color:T.ink4,cursor:'pointer',textDecoration:'underline'}}>Skip (use existing URL)</span>
      </div>
    </div>
  );
}

// ─── Login ──────────────────────────────────────────────────
function LoginScreen({ctx}) {
  const [username,setUsername] = useState('');
  const [password,setPassword] = useState('');
  const [show,setShow]         = useState(false);
  function submit(e) { e.preventDefault(); if(username&&password) ctx.doLogin(username,password); }
  return (
    <div className="screen" style={{background:T.paper}}>
      <div style={{flex:1,padding:'60px 28px 0',display:'flex',flexDirection:'column'}}>
        <FSLogo size={36}/>
        <div style={{marginTop:36,fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1.2,textTransform:'uppercase'}}>STAFF SIGN-IN</div>
        <h1 style={{fontSize:30,fontWeight:700,lineHeight:1.05,letterSpacing:-1,margin:'10px 0 6px',color:T.ink}}>Order desk.<br/><span style={{color:T.green}}>Patia store.</span></h1>
        <p style={{fontSize:13,color:T.ink3,lineHeight:1.5,marginBottom:28}}>Sales team only. Use the username issued by your store manager.</p>

// ─── Stock Search ────────────────────────────────────────────
function SearchScreen({ctx}) {
  const {items,syncedAt,nav,order,setOrder} = ctx;
  const [q,setQ]       = useState('');
  const [cat,setCat]   = useState('All');
  const [addMode]      = useState(!!order.items);
  const cats = ['All',...Array.from(new Set((items||[]).map(i=>i.cat)))];
  const filtered = (items||[]).filter(i=>{
    const qOk = !q||i.name.toLowerCase().includes(q.toLowerCase())||i.code.toLowerCase().includes(q.toLowerCase());
    const cOk = cat==='All'||i.cat===cat;
    return qOk&&cOk;
  });
  function addToOrder(item) {
    const disc      = order.discountCode||'0%';
    const pct       = parseFloat(disc)/100||0;
    const unitPrice = Math.round(item.cpl*(1-pct));
    const exists    = (order.items||[]).findIndex(x=>x.code===item.code);
    let newItems;
    if (exists>=0) {
      newItems = order.items.map((x,idx)=>idx===exists?{...x,qty:x.qty+1,total:(x.qty+1)*(x.unitPrice||x.cpl)}:x);
    } else {
      newItems = [...(order.items||[]),{
        code:item.code, name:item.name, cat:item.cat,
        qty:1, mrp:item.mrp||item.cpl, cpl:item.cpl,
        unitPrice, total:unitPrice, disc,
        branch:item.stock[0]?.b||'KB',
        inStock:(item.stock||[]).reduce((s,x)=>s+x.q,0),
      }];
    }
    setOrder({...order,items:newItems});
    const totalStock = (item.stock||[]).reduce((s,x)=>s+x.q,0);
    ctx.showToast(totalStock===0?item.name.slice(0,22)+'… added (OOS)':item.name.slice(0,30)+'… added', totalStock===0?'warn':'ok');
  }
  return (
    <div className="screen">
      <div style={{flexShrink:0}}>
        <StockRibbon syncedAt={syncedAt}/>
        <div style={{padding:'14px 18px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>STOCK · {items.length} SKUs</div>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>{addMode&&order.customer?'Add item':'Search items'}</div>
          </div>
          {addMode&&order.customer&&<Btn size="sm" onClick={()=>nav('order')} icon={Icon.back()}>Order</Btn>}
        </div>
        <div style={{padding:'0 18px 10px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#fff',border:`1.5px solid ${T.green}`,borderRadius:8,boxShadow:`0 0 0 4px ${T.greenSoft}`}}>
            {Icon.search(T.ink3)}
            <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by name or code…" style={{flex:1,border:'none',outline:'none',fontSize:15,color:T.ink,background:'transparent'}}/>
            {q&&<span onClick={()=>setQ('')} style={{cursor:'pointer'}}>{Icon.close(T.ink4)}</span>}
          </div>
        </div>
        <div style={{padding:'0 18px 10px',display:'flex',gap:6,overflowX:'auto'}}>
          {cats.map(c=><span key={c} onClick={()=>setCat(c)} style={{padding:'5px 11px',borderRadius:99,background:c===cat?T.ink:'#fff',color:c===cat?'#fff':T.ink2,border:`1px solid ${c===cat?T.ink:T.line}`,fontSize:12,fontWeight:600,whiteSpace:'nowrap',cursor:'pointer',flexShrink:0}}>{c}</span>)}
        </div>
      </div>
      <div className="scroll" style={{background:'#fff',borderTop:`1px solid ${T.line}`}}>
        {filtered.map(it=>{
          const total = (it.stock||[]).reduce((s,x)=>s+x.q,0);
          const oos   = total===0;
          const mrp   = it.mrp||it.cpl||0;
          return (
            <div key={it.code} style={{padding:'12px 18px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:10}}>
                <div style={{width:52,height:52,borderRadius:4,flexShrink:0,background:`repeating-linear-gradient(135deg,${T.paper2} 0 6px,${T.paper} 6px 12px)`,border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:T.mono,fontSize:9,color:T.ink4}}>IMG</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                    <span style={{fontFamily:T.mono,fontSize:10,color:T.ink4,fontWeight:600}}>{it.code}</span>
                    <Pill tone="neutral" size="sm">{it.cat.toUpperCase()}</Pill>
                    {oos&&<Pill tone="bad" size="sm">OUT OF STOCK</Pill>}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:T.ink,lineHeight:1.3,marginBottom:5}}>{it.name}</div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    {(it.stock||[]).length>0
                      ? it.stock.map(s=><StockChip key={s.b} branch={s.b} count={s.q} low={s.q>0&&s.q<2}/>)
                      : <span style={{fontSize:10,color:T.bad,fontWeight:600}}>No stock data</span>}
                  </div>
                </div>
                <div style={{flexShrink:0,textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                  <div>
                    <div style={{fontSize:9,color:T.ink4,fontWeight:600,letterSpacing:.5}}>MRP</div>
                    <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.ink}}>₹{mrp.toLocaleString('en-IN')}</div>
                    {it.cpl&&it.cpl!==mrp&&<div style={{fontFamily:T.mono,fontSize:9,color:T.ink4}}>CPL ₹{it.cpl.toLocaleString('en-IN')}</div>}
                  </div>
                  <button onClick={()=>addToOrder(it)} style={{height:30,padding:'0 10px',borderRadius:6,background:oos?T.warn:T.green,color:'#fff',border:'none',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                    {Icon.plus('#fff',14)}{oos?'Book':'Add'}
                  </button>
                  {oos&&<div style={{fontSize:9,color:T.warn,fontWeight:600,textAlign:'right',lineHeight:1.2}}>Can book on<br/>customer demand</div>}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{padding:32,textAlign:'center',fontSize:13,color:T.ink4}}>{q?'No results for "'+q+'"':'No items found.'}</div>}
        <div style={{height:8}}/>
      </div>
      <BottomNav screen="search" nav={nav}/>
    </div>
  );
}

// ─── Order Form ──────────────────────────────────────────────
function OrderFormScreen({ctx}) {
  const {order,setOrder,nav,user,doSaveOrder} = ctx;
  const o = order;
  const setF = (k,v) => setOrder(prev=>({...prev,[k]:v}));
  const subtotal = (o.items||[]).reduce((s,i)=>s+i.total,0);
  const cgst = Math.round(subtotal*.09);
  const sgst = Math.round(subtotal*.09);
  const total = subtotal+cgst+sgst;
  const balance = total-(Number(o.earnest)||0);

  function removeItem(idx) { setOrder(prev=>({...prev,items:prev.items.filter((_,i)=>i!==idx)})); }
  function updateItemQty(idx,delta) {
    setOrder(prev=>({...prev,items:prev.items.map((it,i)=>{
      if(i!==idx) return it;
      const newQty = Math.max(1,it.qty+delta);
      const up = it.unitPrice!==undefined ? it.unitPrice : Math.round(it.cpl*(1-(parseFloat(it.disc)||0)/100));
      return {...it,qty:newQty,unitPrice:up,total:newQty*up};
    })}));
  }

  async function handleSave() {
    if(!o.customer) return ctx.showToast('Customer name is required','bad');
    if(!o.phone)    return ctx.showToast('Phone number is required','bad');
    if(!o.items||o.items.length===0) return ctx.showToast('Add at least one item','bad');
    const saved = await doSaveOrder({...o,salesExec:o.salesExec||user?.name||''});
    if(saved) { setOrder(saved); nav('pdf'); }
  }

  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:T.paper,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>nav('home')} style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:-0.4}}>New order</div>
            <div style={{fontSize:10,color:T.ink4,fontFamily:T.mono}}>DRAFT{o.no?' · '+o.no:''}</div>
          </div>
        </div>
        <Pill tone={o.no?'ok':'warn'} size="sm">{o.no?'SAVED':'UNSAVED'}</Pill>
      </div>
      <StockRibbon syncedAt={ctx.syncedAt}/>
      <div className="scroll">
        <SectionHead n="01" label="Customer"/>
        <Field label="Customer Name" value={o.customer} onChange={v=>setF('customer',v)} required/>
        <Field label="Phone" value={o.phone} onChange={v=>setF('phone',v)} mono required type="tel" action="CALL" onAction={()=>o.phone&&window.open('tel:'+o.phone)}/>
        <Field label="Alt. Phone" value={o.alt} onChange={v=>setF('alt',v)} mono type="tel"/>
        <Field label="E-mail" value={o.email} onChange={v=>setF('email',v)} type="email" hint="Optional · for digital copy"/>
        <Field label="P.O. Reference" value={o.poRef} onChange={v=>setF('poRef',v)} mono hint="Leave blank — auto-assigned on save"/>
        <Field label="Lead Source" value={o.source} onChange={v=>setF('source',v)} hint="Walk-in / Reference / Digital / Repeat"/>
        <SectionHead n="02" label="Address"/>
        <Field label="Billing Address" value={o.billing} onChange={v=>setF('billing',v)} multiline required/>
        <Field label="Delivery Address" value={o.delivery} onChange={v=>setF('delivery',v)} multiline action="SAME AS BILLING" onAction={()=>setF('delivery',o.billing)}/>
        <Field label="Lift available?" value={o.liftAvailable} onChange={v=>setF('liftAvailable',v)} hint="If No — installation handling fee applies"/>
        <SectionHead n="03" label={`Items · ${(o.items||[]).length}`} action="+ ADD ITEM" onAction={()=>nav('search')}/>
        <div style={{background:'#fff'}}>
          {(o.items||[]).map((it,i)=>{
            const mrpVal   = it.mrp||it.cpl||0;
            const curPrice = it.unitPrice!==undefined ? it.unitPrice : Math.round(it.cpl*(1-(parseFloat(it.disc)||0)/100));
            return (
            <div key={it.code+i} style={{padding:'11px 14px',borderBottom:`1px solid ${T.line}`}}>
              <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3,flexWrap:'wrap'}}>

                  </div>
                  <div style={{fontSize:13,fontWeight:600,lineHeight:1.3}}>{it.name}</div>
                  {mrpVal>0&&<div style={{fontSize:10,color:T.ink4,marginTop:2}}>MRP: ₹{mrpVal.toLocaleString('en-IN')} /unit</div>}

                    />
                    <span style={{fontSize:10,color:T.ink4,fontWeight:700}}>DISC</span>
                    <input
                      value={it.disc||''}
                      onChange={e=>{const v=e.target.value;const pct=parseFloat(v||0)/100;const newUp=Math.round((it.mrp||it.cpl||0)*(1-pct));setOrder(prev=>({...prev,items:prev.items.map((x,j)=>j===i?{...x,disc:v,unitPrice:newUp,total:newUp*x.qty}:x)}));}}
                      style={{width:46,border:`1px solid ${T.line}`,borderRadius:4,padding:'2px 6px',fontFamily:T.mono,fontSize:12,textAlign:'center'}}
                      placeholder="0%"
                    />
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:T.mono,fontSize:15,fontWeight:700}}>₹{it.total.toLocaleString('en-IN')}</div>
                  <div style={{fontSize:9,color:T.ink4,marginTop:1}}>×{it.qty} unit{it.qty>1?'s':''}</div>
                  <button onClick={()=>removeItem(i)} style={{marginTop:8,fontSize:11,color:T.bad,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>REMOVE</button>

  const cgst = Math.round(subtotal*.09);
  const sgst = Math.round(subtotal*.09);
  const total = subtotal+cgst+sgst;
  const qrRef = useRef(null);

  useEffect(()=>{
    if(qrRef.current&&window.QRCode) {
      qrRef.current.innerHTML='';
      try {
        new window.QRCode(qrRef.current,{
          text:'https://4sinteriors.in/order/'+(o.no||'').replace('/','‑'),
          width:80,height:80,colorDark:T.ink,colorLight:'#ffffff',

// ─── Order History ───────────────────────────────────────────
function HistoryScreen({ctx}) {
  const {orders,nav,loadOrders} = ctx;
  const [tab,setTab] = useState('all');
  const [wonOrder,setWonOrder] = useState(null);
  useEffect(()=>{ loadOrders(); },[]);
  const tabs = [
    {id:'all',     label:'All',         filter:()=>true},
    {id:'pending', label:'Pend WON',    filter:o=>!o.won&&o.status!=='draft'},
    {id:'drafts',  label:'Drafts',      filter:o=>o.status==='draft'},
    {id:'delivered',label:'Delivered',  filter:o=>o.status==='delivered'},
  ];
  const active = tabs.find(t=>t.id===tab)||tabs[0];
  const shown  = orders.filter(active.filter);

  if(wonOrder) return <WONUpdateScreen ctx={ctx} orderOverride={wonOrder} onClose={()=>setWonOrder(null)}/>;

  return (
    <div className="screen">
      <div style={{flexShrink:0}}>
        <div style={{padding:'14px 18px 8px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          <div><div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>LEDGER · {orders.length} ORDERS</div><div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Orders</div></div>
          <Btn size="sm" icon={Icon.refresh(T.ink2,14)} onClick={loadOrders}>Refresh</Btn>
        </div>
        <div style={{padding:'4px 18px 10px',display:'flex',gap:6,overflowX:'auto'}}>
          {tabs.map(t=>{
            const n = orders.filter(t.filter).length;
            return <span key={t.id} onClick={()=>setTab(t.id)} style={{padding:'6px 11px',borderRadius:99,background:t.id===tab?T.ink:'#fff',color:t.id===tab?'#fff':T.ink2,border:`1px solid ${t.id===tab?T.ink:T.line}`,fontSize:12,fontWeight:600,display:'inline-flex',gap:5,alignItems:'center',cursor:'pointer',flexShrink:0}}>{t.label}<span style={{fontFamily:T.mono,opacity:.7,fontSize:11}}>{n}</span></span>;
          })}
        </div>
      </div>
      <div className="scroll">
        {shown.map(o=>(
          <div key={o.no} style={{background:'#fff',borderTop:`1px solid ${T.line}`,borderBottom:`1px solid ${T.line}`,padding:'12px 18px',display:'grid',gridTemplateColumns:'1fr auto',gap:10,cursor:'pointer'}} onClick={()=>{ctx.setOrder(o);nav('pdf');}}>
            <div style={{minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                <span style={{fontFamily:T.mono,fontSize:11,color:T.ink2,fontWeight:600}}>{o.no}</span>
                {o.won?<Pill tone="ok" mono size="sm">{o.won}</Pill>:<span onClick={e=>{e.stopPropagation();setWonOrder(o);}} style={{display:'inline-flex',alignItems:'center',height:16,padding:'0 6px',borderRadius:4,background:T.warnSoft,color:T.warn,border:'1px solid #e6cc95',fontSize:10,fontWeight:700,cursor:'pointer'}}>+ ADD WON</span>}
              </div>
              <div style={{fontSize:14,fontWeight:700,color:T.ink}}>{o.customer}</div>
              <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,marginTop:2}}>{o.salesExec} · {o.status.toUpperCase()}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontFamily:T.mono,fontWeight:700,color:T.ink,letterSpacing:-0.4}}>₹{o.amt.toLocaleString('en-IN')}</div>
              <div style={{display:'flex',gap:6,marginTop:6,justifyContent:'flex-end'}}>
                <span onClick={e=>{e.stopPropagation();const phone=(o.phone||'').replace(/\D/g,'');if(phone)window.open('https://wa.me/91'+phone);}} style={{width:28,height:24,borderRadius:4,background:'#25d36622',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.whatsapp('#25d366',13)}</span>
              </div>
            </div>
          </div>
        ))}
        {shown.length===0&&<div style={{padding:32,textAlign:'center',fontSize:13,color:T.ink4}}>No orders in this tab.</div>}
        <div style={{height:24}}/>
      </div>
      <BottomNav screen="history" nav={nav}/>
    </div>
  );
}

// ─── WON Update ──────────────────────────────────────────────
function WONUpdateScreen({ctx,orderOverride,onClose}) {
  const o = orderOverride || ctx.order;
  const {nav,doUpdateWON} = ctx;
  const [won,setWon] = useState(o.won||'');
  async function submit() {
    if(!won||won.length<6) return ctx.showToast('Enter a valid WON number','bad');
    const ok = await doUpdateWON(o.no, o.internalNo, won.toUpperCase().startsWith('WON')?won.toUpperCase():'WON'+won);
    if(ok) { if(onClose) onClose(); else nav('history'); }
  }
  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px 14px',flexShrink:0}}>
        <button onClick={()=>onClose?onClose():nav('history')} style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.4}}>Update WON / SO</div>
      </div>
      <div className="scroll" style={{padding:'0 18px'}}>
        <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
            <span style={{fontFamily:T.mono,fontSize:11,color:T.ink2,fontWeight:600}}>{o.no}</span>
            <Pill tone="warn" size="sm">PENDING WON</Pill>
          </div>
          <div style={{fontSize:16,fontWeight:700}}>{o.customer}</div>
          <div style={{fontSize:11,color:T.ink4,marginTop:2,fontFamily:T.mono}}>{o.date} · ₹{(o.amt||0).toLocaleString('en-IN')}</div>
        </div>
        <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1,marginBottom:8}}>GODREJ SO / WON NUMBER</div>
        <div style={{background:'#fff',border:`2px solid ${T.green}`,borderRadius:8,padding:'14px 16px',marginBottom:12}}>
          <input value={won} onChange={e=>setWon(e.target.value)} placeholder="WON036031" autoCapitalize="characters" style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:24,fontWeight:700,letterSpacing:1.5,color:T.ink,background:'transparent'}}/>
          <div style={{fontSize:11,color:T.ink4,marginTop:4}}>From Godrej confirmation email</div>
        </div>
        <div style={{padding:12,background:T.greenSoft,border:`1px solid ${T.greenLine}`,borderRadius:6,display:'flex',gap:10,marginBottom:20}}>
          {Icon.bolt(T.green,14)}
          <div style={{fontSize:11.5,color:T.ink2,lineHeight:1.5}}><b style={{color:T.green}}>This updates:</b> the saved PDF, customer QR copy, the Orders sheet, and the Change-log sheet.</div>
        </div>
        <Btn primary full size="lg" onClick={submit}>Update & re-issue PDF</Btn>
      </div>
    </div>
  );
}

<!-- ═══════════════════════════════════════════════════════════
     SERVICE WORKER REGISTRATION
     Must run after the page loads (not inside Babel script tag)
     ════════════════════════════════════════════════════════ -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// PWA install prompt (Android Chrome "Add to Home Screen" banner)
let deferredInstallPrompt = null;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show our banner after 3 s so it doesn't interrupt the first load
  setTimeout(() => { if (banner) banner.classList.add('visible'); }, 3000);
});

if (banner) {
  banner.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    banner.classList.remove('visible');
    console.log('Install outcome:', outcome);
  });
}

window.addEventListener('appinstalled', () => {
  banner.classList.remove('visible');
  console.log('PWA installed successfully');
});
</script>
</body>
</html>
