// ─── Order History ───────────────────────────────────────────
function HistoryScreen({ctx}) {
  const {orders,nav,loadOrders,doUpdateDelivery,doDeleteOrder,user} = ctx;
  const isAdmin = normRole(user?.role) === 'admin';
  const [tab,setTab] = useState('all');
  const [wonOrder,setWonOrder] = useState(null);
  const [query,setQuery] = useState('');
  const [salesFilter,setSalesFilter] = useState('');
  useEffect(()=>{ loadOrders(); },[]);
  const tabs = [
    {id:'all',      label:'All',        filter:()=>true},
    {id:'pending',  label:'Pend WON',   filter:o=>!o.won&&o.status!=='draft'},
    {id:'delivered',label:'Delivered',  filter:o=>/deliver/i.test(o.deliveryStatus||'')},
    {id:'completed',label:'Completed',  filter:o=>o.status==='completed'||/installation done/i.test(o.deliveryStatus||'')},
  ];
  const active = tabs.find(t=>t.id===tab)||tabs[0];

  // Distinct salespersons for the filter dropdown
  const salespeople = [...new Set(orders.map(o=>(o.salesExec||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const q = query.trim().toLowerCase();
  const matchesQuery = o => !q || String(o.no||'').toLowerCase().includes(q) || String(o.won||'').toLowerCase().includes(q);
  const matchesSales = o => !salesFilter || (o.salesExec||'').trim().toLowerCase()===salesFilter.toLowerCase();
  const shown = orders.filter(active.filter).filter(matchesQuery).filter(matchesSales);

  async function changeDelivery(o, val){
    if(val && val!==(o.deliveryStatus||'Pending')) await doUpdateDelivery(o.no, o.internalNo, val);
  }

  if(wonOrder) return <WONUpdateScreen ctx={ctx} orderOverride={wonOrder} onClose={()=>setWonOrder(null)}/>;

  const openOrder = o => { ctx.setOrder({...BLANK_ORDER(),...normalizeLoadedOrder(o)}); nav('order'); };

  async function deleteOrder(o) {
    if (!isAdmin) return;
    if (!window.confirm('Permanently delete order '+(o.no||'')+' for '+(o.customer||'this customer')+'? This removes it from the CRM sheet and cannot be undone.')) return;
    await doDeleteOrder(o.no, o.internalNo);
  }

  return (
    <div className="screen">
      <div style={{flexShrink:0}}>
        <div style={{padding:'14px 18px 8px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          <div><div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>LEDGER · {orders.length} ORDERS</div><div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Orders</div></div>
          <Btn size="sm" icon={Icon.refresh(T.ink2,14)} onClick={loadOrders}>Refresh</Btn>
        </div>
        {/* Search by Order ID or SO No (WON) */}
        <div style={{padding:'2px 18px 8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:'8px 12px'}}>
            {Icon.search(T.ink4,16)}
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by Order ID or SO No (WON)" style={{flex:1,border:'none',outline:'none',fontSize:14,fontFamily:T.sans,color:T.ink,background:'transparent'}}/>
            {query&&<span onClick={()=>setQuery('')} style={{cursor:'pointer'}}>{Icon.close(T.ink4,14)}</span>}
          </div>
        </div>
        {/* Filter by salesperson */}
        <div style={{padding:'0 18px 8px',display:'flex',gap:6,overflowX:'auto',alignItems:'center'}}>
          <span style={{fontSize:11,color:T.ink4,fontWeight:700,flexShrink:0}}>SALES</span>
          <span onClick={()=>setSalesFilter('')} style={{padding:'5px 10px',borderRadius:99,background:!salesFilter?T.green:'#fff',color:!salesFilter?'#fff':T.ink2,border:`1px solid ${!salesFilter?T.green:T.line}`,fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0}}>All</span>
          {salespeople.map(sp=>(
            <span key={sp} onClick={()=>setSalesFilter(sp)} style={{padding:'5px 10px',borderRadius:99,background:salesFilter===sp?T.green:'#fff',color:salesFilter===sp?'#fff':T.ink2,border:`1px solid ${salesFilter===sp?T.green:T.line}`,fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>{sp}</span>
          ))}
        </div>
        <div style={{padding:'0 18px 10px',display:'flex',gap:6,overflowX:'auto'}}>
          {tabs.map(t=>{
            const n = orders.filter(t.filter).length;
            return <span key={t.id} onClick={()=>setTab(t.id)} style={{padding:'6px 11px',borderRadius:99,background:t.id===tab?T.ink:'#fff',color:t.id===tab?'#fff':T.ink2,border:`1px solid ${t.id===tab?T.ink:T.line}`,fontSize:12,fontWeight:600,display:'inline-flex',gap:5,alignItems:'center',cursor:'pointer',flexShrink:0}}>{t.label}<span style={{fontFamily:T.mono,opacity:.7,fontSize:11}}>{n}</span></span>;
          })}
        </div>
      </div>
      <div className="scroll">
        {shown.map(o=>(
          <div key={o.no} style={{background:'#fff',borderTop:`1px solid ${T.line}`,borderBottom:`1px solid ${T.line}`,padding:'12px 18px',display:'grid',gridTemplateColumns:'1fr auto',gap:10,cursor:'pointer'}} onClick={()=>openOrder(o)}>
            <div style={{minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                <span style={{fontFamily:T.mono,fontSize:11,color:T.ink2,fontWeight:600}}>{o.no}</span>
                {o.won?<Pill tone="ok" mono size="sm">{o.won}</Pill>:null}
                <span onClick={e=>{e.stopPropagation();setWonOrder(o);}} style={{display:'inline-flex',alignItems:'center',height:16,padding:'0 6px',borderRadius:4,background:T.warnSoft,color:T.warn,border:'1px solid #e6cc95',fontSize:10,fontWeight:700,cursor:'pointer'}}>{o.won?'+ SO':'+ ADD SO'}</span>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:T.ink}}>{o.customer}</div>
              <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,marginTop:2}}>{o.salesExec}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontFamily:T.mono,fontWeight:700,color:T.ink,letterSpacing:-0.4}}>₹{(o.amt||0).toLocaleString('en-IN')}</div>
              <div style={{display:'flex',gap:6,marginTop:6,justifyContent:'flex-end',alignItems:'center'}}>
                <select value={o.deliveryStatus||'Pending'} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();changeDelivery(o,e.target.value);}}
                  style={{padding:'4px 6px',borderRadius:4,border:`1px solid ${T.line}`,background:'#fff',color:T.ink2,fontSize:11,fontWeight:600,cursor:'pointer',WebkitAppearance:'none',appearance:'none',maxWidth:130}}>
                  {DELIVERY_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <span title="Edit order" onClick={e=>{e.stopPropagation();openOrder(o);}} style={{width:28,height:24,borderRadius:4,background:T.greenSoft,display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.edit(T.green,13)}</span>
                <span title="Order PDF" onClick={e=>{e.stopPropagation();ctx.setOrder({...BLANK_ORDER(),...normalizeLoadedOrder(o)});nav('pdf');}} style={{width:28,height:24,borderRadius:4,background:T.paper2,display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.doc(T.ink3,13)}</span>
                <span onClick={e=>{e.stopPropagation();const phone=(o.phone||'').replace(/\D/g,'');if(phone)window.open('https://wa.me/91'+phone);}} style={{width:28,height:24,borderRadius:4,background:'#25d36622',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.whatsapp('#25d366',13)}</span>
                {isAdmin&&<span title="Delete order (admin)" onClick={e=>{e.stopPropagation();deleteOrder(o);}} style={{width:28,height:24,borderRadius:4,background:T.badSoft||'#fdecec',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.trash(T.bad,13)}</span>}
              </div>
            </div>
          </div>
        ))}
        {shown.length===0&&<div style={{padding:32,textAlign:'center',fontSize:13,color:T.ink4}}>No orders match.</div>}
        <div style={{height:24}}/>
      </div>
      <BottomNav screen="history" nav={nav}/>
    </div>
  );
}

// ─── WON Update ──────────────────────────────────────────────
function WONUpdateScreen({ctx,orderOverride,onClose}) {
  const o = orderOverride || ctx.order;
  const {nav,doUpdateWON} = ctx;
  const [won,setWon] = useState('');
  const items = o.items || [];
  // Pre-select the items that don't yet carry a SO/WON.
  const [sel,setSel] = useState(()=>items.map(it=>!String(it.won||'').trim()));
  const toggle = i => setSel(prev=>prev.map((v,j)=>j===i?!v:v));
  const anySel = sel.some(Boolean);

  async function submit() {
    if(!won||won.length<6) return ctx.showToast('Enter a valid SO / WON number','bad');
    if(items.length && !anySel) return ctx.showToast('Select at least one item for this SO No','bad');
    const wonFmt = won.toUpperCase().startsWith('WON')?won.toUpperCase():'WON'+won.toUpperCase();
    // When every item is selected (or the order has no reconstructed items) send
    // no index list → apply to the whole order.
    const idxs = items.length && !sel.every(Boolean) ? sel.map((v,i)=>v?i:-1).filter(i=>i>=0) : null;
    const ok = await doUpdateWON(o.no, o.internalNo, wonFmt, idxs);
    if(ok) { if(onClose) onClose(); else nav('history'); }
  }
  return (
    <div className="screen">
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px 14px',flexShrink:0}}>
        <button onClick={()=>onClose?onClose():nav('history')} title="Back" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.back()}</button>
        <button onClick={()=>{ if(onClose) onClose(); nav('home'); }} title="Home" style={{width:32,height:32,borderRadius:6,background:'#fff',border:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Icon.home(T.ink2,18)}</button>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.4}}>Update SO No / WON</div>
      </div>
      <div className="scroll" style={{padding:'0 18px'}}>
        <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
            <span style={{fontFamily:T.mono,fontSize:11,color:T.ink2,fontWeight:600}}>{o.no}</span>
            {o.won?<Pill tone="ok" mono size="sm">{o.won}</Pill>:<Pill tone="warn" size="sm">PENDING SO</Pill>}
          </div>
          <div style={{fontSize:16,fontWeight:700}}>{o.customer}</div>
          <div style={{fontSize:11,color:T.ink4,marginTop:2,fontFamily:T.mono}}>{o.date} · ₹{(o.amt||0).toLocaleString('en-IN')}</div>
        </div>
        <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1,marginBottom:8}}>GODREJ SO / WON NUMBER</div>
        <div style={{background:'#fff',border:`2px solid ${T.green}`,borderRadius:8,padding:'14px 16px',marginBottom:14}}>
          <input value={won} onChange={e=>setWon(e.target.value)} placeholder="WON036031" autoCapitalize="characters" style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:24,fontWeight:700,letterSpacing:1.5,color:T.ink,background:'transparent'}}/>
          <div style={{fontSize:11,color:T.ink4,marginTop:4}}>From Godrej confirmation email</div>
        </div>
        {items.length>0&&(
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
              <span style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1}}>APPLY TO ITEMS</span>
              <span onClick={()=>setSel(items.map(()=>!sel.every(Boolean)))} style={{fontSize:11,color:T.green,fontWeight:700,cursor:'pointer'}}>{sel.every(Boolean)?'Clear all':'Select all'}</span>
            </div>
            <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,overflow:'hidden',marginBottom:16}}>
              {items.map((it,i)=>(
                <label key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderBottom:i<items.length-1?`1px solid ${T.line}`:'none',cursor:'pointer'}}>
                  <input type="checkbox" checked={!!sel[i]} onChange={()=>toggle(i)} style={{width:16,height:16,accentColor:T.green,cursor:'pointer'}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{it.name||it.code||('Item '+(i+1))}</div>
                    <div style={{fontSize:10,color:T.ink4,fontFamily:T.mono,marginTop:1}}>{it.code} · ×{it.qty}{it.won?' · SO '+it.won:''}</div>
                  </div>
                  {it.won?<Pill tone="ok" mono size="sm">{it.won}</Pill>:null}
                </label>
              ))}
            </div>
          </>
        )}
        <div style={{padding:12,background:T.greenSoft,border:`1px solid ${T.greenLine}`,borderRadius:6,display:'flex',gap:10,marginBottom:20}}>
          {Icon.bolt(T.green,14)}
          <div style={{fontSize:11.5,color:T.ink2,lineHeight:1.5}}><b style={{color:T.green}}>Multiple SO numbers:</b> select only the items this SO No covers. Run this again with another SO No for the remaining items.</div>
        </div>
        <Btn primary full size="lg" onClick={submit}>Update SO No</Btn>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── Settings ────────────────────────────────────────────────
function SettingsScreen({ctx}) {
  const {user,syncedAt,priceSyncedAt,priceSyncError,priceItems,nav,syncStock,syncPriceList,doSignOut,showToast,loading} = ctx;
  const [apiUrl,setApiUrl]         = useState(localStorage.getItem('4s_api_url')||'');
  const [pingResult,setPingResult] = useState(null);
  const [pinging,setPinging]       = useState(false);
  const [debugResult,setDebugResult] = useState(null);
  const [debugging,setDebugging]   = useState(false);

  async function runDebug() {
    setDebugging(true); setDebugResult(null);
    try {
      const res = await apiGet('debugPriceList', {}, 20000);
      setDebugResult(res);
    } catch(e) {
      setDebugResult({ ok:false, error: e.message });
    } finally { setDebugging(false); }
  }

  function saveUrl() {
    const trimmed = apiUrl.trim();
    localStorage.setItem('4s_api_url', trimmed);
    setPingResult(null);
    showToast('URL saved ✓ — tap "Test connection" to verify');
  }

  async function testConnection() {
    const url = (apiUrl||'').trim() || localStorage.getItem('4s_api_url');
    if (!url) { showToast('Paste your Apps Script URL first', 'warn'); return; }
    setPinging(true); setPingResult(null);
    try {
      const res = await apiGet('ping', {}, 20000);
      if (res && res.ok) {
        const opsOk    = res.opsSheet?.ok;
        const opsSheets = res.opsSheet?.sheets || [];
        setPingResult({
          ok: true,
          msg: 'Connected ✓' + (opsOk ? ' · OPS sheet found' : ' · OPS sheet missing'),
          detail: opsSheets.join(', '),
          sheetUrl: res.opsSheet?.url || '',
        });
        showToast('Connection OK ✓');
      } else {
        setPingResult({ ok:false, msg: res?.error || 'Server returned an error' });
      }
    } catch(e) {
      setPingResult({ ok:false, msg: e.message });
    } finally { setPinging(false); }
  }

  return (
    <div className="screen">
      <div style={{flexShrink:0,padding:'14px 18px 12px'}}>
        <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono,letterSpacing:1}}>SETTINGS</div>
        <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Sync & data</div>
      </div>
      <div className="scroll">

        {/* ── Apps Script URL card (moved to top) ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>APPS SCRIPT URL</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,overflow:'hidden'}}>
            <div style={{padding:'12px 14px',borderBottom:`1px solid ${T.line}`}}>
              <input value={apiUrl} onChange={e=>setApiUrl(e.target.value)}
                style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:11,color:T.ink,background:'transparent'}}
                placeholder="https://script.google.com/macros/s/…/exec"/>
            </div>
            <div style={{display:'flex',gap:8,padding:'10px 12px'}}>
              <Btn full onClick={saveUrl}>Save URL</Btn>
              <Btn full primary onClick={testConnection} disabled={pinging}>
                {pinging ? 'Testing…' : 'Test connection'}

            </div>
          </div>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,margin:'14px 0 6px'}}>GOOGLE REVIEW LINK (for PDF QR)</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:'12px 14px'}}>

              style={{width:'100%',border:'none',outline:'none',fontFamily:T.mono,fontSize:11,color:T.ink,background:'transparent'}}
              placeholder="https://g.page/r/…/review"/>
            <div style={{fontSize:10,color:T.ink4,marginTop:6,lineHeight:1.5}}>Used for the "Scan to review us" QR on the order PDF. Or drop a <b>review-qr.png</b> into the app folder to use your exact QR image.</div>
          </div>
          {pingResult && (
            <div style={{marginTop:8,padding:'12px',borderRadius:6,background:pingResult.ok?T.okSoft:T.badSoft,border:`1px solid ${pingResult.ok?T.ok:T.bad}`}}>
              <div style={{fontSize:13,fontWeight:700,color:pingResult.ok?T.ok:T.bad}}>{pingResult.msg}</div>
              {pingResult.detail && <div style={{fontSize:11,color:T.ink3,marginTop:3,fontFamily:T.mono}}>Sheets found: {pingResult.detail}</div>}

                  <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:.5,marginBottom:4}}>OPS SPREADSHEET</div>

                    style={{fontSize:11,color:T.green,fontFamily:T.mono,wordBreak:'break-all',textDecoration:'underline'}}>
                    Open OPS sheet (APP_ORDERING_CREDS tab → manage logins) ↗
                  </a>
                </div>
              )}
              {!pingResult.ok && <div style={{fontSize:11,color:T.ink3,marginTop:6,lineHeight:1.6}}>
                Make sure the Web App is deployed with <b>Execute as: Me</b> and <b>Anyone can access</b>. Then copy the latest deployment URL and paste above.
              </div>}
            </div>
          )}

        {/* ── Price list sync card ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>PRICE LIST SYNC</div>
          <div style={{background:'#fff',border:`2px solid ${priceSyncError?T.bad:priceSyncedAt?T.greenLine:T.warn}`,borderRadius:8,padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,letterSpacing:-0.3}}>Home Storage, Furniture &amp; Mattress</div>
                <div style={{fontSize:11,color:T.ink3,marginTop:4,lineHeight:1.5}}>
                  {priceSyncedAt
                    ? <>Last synced: <b>{new Date(priceSyncedAt).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</b></>
                    : <span style={{color:priceSyncError?T.bad:T.warn,fontWeight:600}}>{priceSyncError?'Last sync failed':'Not synced yet'}</span>}
                </div>
              </div>
              <Pill tone={priceSyncedAt?'ok':priceSyncError?'bad':'warn'} mono>{priceSyncedAt?'FRESH':priceSyncError?'ERROR':'STALE'}</Pill>
            </div>

            {/* Persistent error display */}
            {priceSyncError && (
              <div style={{marginTop:10,padding:'10px 12px',background:T.badSoft,border:`1px solid ${T.bad}`,borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:700,color:T.bad,marginBottom:4}}>Error details:</div>
                <div style={{fontSize:11,color:T.ink2,lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:T.mono}}>{priceSyncError}</div>
              </div>
            )}

            <div style={{marginTop:10,padding:'10px 12px',background:T.paper,border:`1px solid ${T.line}`,borderRadius:6,fontFamily:T.mono,fontSize:11}}>
              {(priceItems||[]).length > 0 ? (
                <>
                  {[...new Set((priceItems||[]).map(i=>i.sheet))].sort().map(s=>{
                    const n = (priceItems||[]).filter(i=>i.sheet===s).length;
                    return <div key={s} style={{display:'flex',justifyContent:'space-between',color:T.ink2,marginBottom:3}}><span>{s}</span><span style={{fontWeight:700,color:T.ink}}>{n} SKUs</span></div>;
                  })}
                  <div style={{display:'flex',justifyContent:'space-between',color:T.ink2,marginTop:4,borderTop:`1px solid ${T.line}`,paddingTop:6}}>
                    <span>Total SKUs</span>
                    <span style={{fontWeight:700,color:T.ok}}>{(priceItems||[]).length}</span>
                  </div>
                </>
              ) : (
                <div style={{color:T.warn}}>No items loaded — tap "Sync now" to fetch from OPS sheet</div>
              )}
            </div>
            <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>
              <Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncPriceList} disabled={loading}>
                {loading?'Loading…':(priceItems||[]).length===0?'Load price list':'Sync now'}
              </Btn>
              <Btn full icon={Icon.refresh(T.green,14)} onClick={runDebug} disabled={debugging}>
                {debugging?'Checking…':'Debug'}
              </Btn>
            </div>

            {/* Debug result */}
            {debugResult && (
              <div style={{marginTop:10,padding:'10px 12px',background:T.paper,border:`1px solid ${debugResult.ok?T.greenLine:T.bad}`,borderRadius:6}}>
                {debugResult.ok ? (
                  <>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:T.green}}>OPS: {debugResult.opsName}</div>
                      <span style={{fontSize:9,fontFamily:T.mono,background:debugResult.scriptVersion?T.okSoft:T.badSoft,color:debugResult.scriptVersion?T.ok:T.bad,padding:'2px 6px',borderRadius:3,fontWeight:700}}>
                        API {debugResult.scriptVersion||'OLD — REDEPLOY!'}
                      </span>
                    </div>
                    {!debugResult.scriptVersion && (
                      <div style={{fontSize:11,color:T.bad,marginBottom:8,padding:'6px 8px',background:T.badSoft,borderRadius:4}}>
                        ⚠ The deployed Apps Script did not report a version. Copy the latest Code.gs → save in Apps Script → Deploy → Manage deployments → Edit → New version.
                      </div>
                    )}
                    {debugResult.scriptVersion && debugResult.scriptVersion!=='v31' && (
                      <div style={{fontSize:10,color:T.ink4,marginBottom:8}}>
                        Latest available is v31 — a redeploy is optional but recommended for the newest fixes.
                      </div>
                    )}
                    {debugResult.discontinued && (
                      <div style={{fontSize:10,color:T.ink3,marginBottom:8,padding:'8px 10px',background:'#fff',borderRadius:4,border:`1px solid ${T.line}`}}>
                        <div style={{fontWeight:700,color:T.ink,marginBottom:3}}>Discontinued Products tab</div>
                        {!debugResult.discontinued.found
                          ? <span style={{color:T.bad}}>Not found</span>
                          : <>
                              <div>Alt-code column: <b>{debugResult.discontinued.altColHeader||'(none)'}</b> · rows with alt code: <b>{debugResult.discontinued.rowsWithAlt}</b></div>
                              {(debugResult.discontinued.samples||[]).slice(0,4).map((s,i)=>(
                                <div key={i} style={{fontFamily:T.mono,fontSize:9,color:T.ink4,marginTop:2}}>{s.code} → <b style={{color:T.green}}>{s.alt}</b> ({s.remarks})</div>
                              ))}
                            </>}
                      </div>
                    )}
                    <div style={{fontSize:10,fontWeight:700,color:T.ink4,marginBottom:4}}>
                      PRICE LIST TABS ({(debugResult.priceConfig||[]).length} configured):
                    </div>
                    {(debugResult.priceConfig||[]).map(cfg => {
                      const info = (debugResult.tabInfo||{})[cfg.tab] || {};
                      const hdr  = (info.header||[]).filter(Boolean);
                      const samp = (info.sample||[]).filter(Boolean);
                      const hasError = !!info.error;
                      return (
                        <div key={cfg.tab} style={{marginBottom:6,padding:'8px 10px',background:'#fff',borderRadius:4,border:`1px solid ${hasError?T.bad:T.line}`}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div style={{fontSize:10,fontWeight:700,color:hasError?T.bad:T.ink}}>{cfg.tab}</div>
                            <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono}}>{info.totalRows||0} rows</div>
                          </div>
                          <div style={{fontSize:9,color:T.ink3,marginTop:2}}>Category: <b>{cfg.cat}</b></div>
                          {hasError
                            ? <div style={{fontSize:9,color:T.bad,marginTop:2}}>{info.error}</div>
                            : <>
                                <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono,marginTop:3}}>
                                  Header: {hdr.length ? hdr.slice(0,8).join(' | ') : '(empty)'}
                                </div>
                                {samp.length > 0 && (
                                  <div style={{fontSize:9,color:T.ink4,fontFamily:T.mono,marginTop:1,opacity:0.7}}>
                                    Row 2: {samp.slice(0,6).join(' | ')}
                                  </div>
                                )}
                              </>
                          }
                        </div>
                      );
                    })}
                    {!(debugResult.priceConfig||[]).length && (
                      <div style={{fontSize:11,color:T.bad}}>Price_Lists sheet is empty or missing.</div>
                    )}
                  </>
                ) : (
                  <div style={{fontSize:11,color:T.bad,fontFamily:T.mono,whiteSpace:'pre-wrap'}}>{debugResult.error}</div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* ── Stock sync card ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>STOCK SYNC</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,letterSpacing:-0.3}}>Stock Master</div>
                <div style={{fontSize:11,color:T.ink3,marginTop:4}}>Last synced: {syncedAt?new Date(syncedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'Never'}</div>
              </div>
              <Pill tone={syncedAt?'ok':'warn'} mono>{syncedAt?'FRESH':'STALE'}</Pill>
            </div>
            <div style={{marginTop:12}}><Btn primary full icon={Icon.refresh('#fff',15)} onClick={syncStock}>Sync stock now</Btn></div>
          </div>
        </div>

        {/* ── Account ── */}
        <div style={{padding:'0 18px 14px'}}>
          <div style={{fontSize:10,color:T.ink4,fontWeight:700,letterSpacing:1.2,marginBottom:6}}>ACCOUNT</div>
          <div style={{background:'#fff',border:`1px solid ${T.line}`,borderRadius:8,padding:'14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:40,height:40,borderRadius:8,background:T.green,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:T.mono,fontSize:16,fontWeight:700}}>{(user?.name||'?').slice(0,2).toUpperCase()}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700}}>{user?.name||'—'}</div>
                <div style={{fontSize:11,color:T.ink4,fontFamily:T.mono}}>{user?.code||'—'} · {user?.role||'—'} · {user?.branch||'—'}</div>
              </div>
            </div>
          </div>
        </div>

        <div style={{padding:'0 18px 8px'}}>
          <Btn full danger onClick={doSignOut}>Sign out</Btn>
          <div style={{textAlign:'center',fontSize:10,color:T.ink4,marginTop:14,fontFamily:T.mono}}>4S INTERIORS · BUILD 2026.05.20 · v2.2-pwa</div>
        </div>
        <div style={{height:24}}/>
      </div>
      <BottomNav screen="settings" nav={nav}/>
    </div>
  );
}

if(loadingEl) loadingEl.style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{width:'100%',display:'flex',justifyContent:'center',background:'#d9d5cc'}}>
    <div class="app-shell"><App/></div>
  </div>
);
</script>

<!-- ═══════════════════════════════════════════════════════════
     SERVICE WORKER REGISTRATION
     Must run after the page loads (not inside Babel script tag)
     ════════════════════════════════════════════════════════ -->
<script>
if ('serviceWorker' in navigator) {
  // Reload once when a new service worker takes control, so the page always
  // ends up running the freshest deployed code (guarded against reload loops).
  let _swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_swRefreshing) return;
    _swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    // updateViaCache:'none' → the browser bypasses its HTTP cache when checking
    // sw.js, so a new worker (and thus new code) is detected immediately.
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
      .then(reg => {
        console.log('SW registered:', reg.scope);
        try { reg.update(); } catch (e) {}                 // check for a new SW now
        setInterval(() => { try { reg.update(); } catch (e) {} }, 60 * 60 * 1000); // and hourly
      })
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// PWA install prompt (Android Chrome "Add to Home Screen" banner)
let deferredInstallPrompt = null;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show our banner after 3 s so it doesn't interrupt the first load
  setTimeout(() => { if (banner) banner.classList.add('visible'); }, 3000);
});

if (banner) {
  banner.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    banner.classList.remove('visible');
    console.log('Install outcome:', outcome);
  });
}

window.addEventListener('appinstalled', () => {
  banner.classList.remove('visible');
  console.log('PWA installed successfully');
});
</script>
